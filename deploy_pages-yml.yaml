name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]           # cambia si tu rama es master u otra
  workflow_dispatch:             # permite correr manual desde Actions

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false      # ← clave: NO cancela jobs anteriores, espera

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # No build necesario (HTML/JS/CSS estático)
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .                  # todo el repo (dashboard.html, index.html, etc.)

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
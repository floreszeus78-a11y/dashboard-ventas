name: Analizar Todo el Proyecto

on:
  workflow_dispatch:

jobs:
  analizar-completo:
    runs-on: ubuntu-latest
    permissions:
      contents: read  # Solo lectura, suficiente para clonar
    
    steps:
    - name: Clonar repositorio
      uses: actions/checkout@v4
    
    - name: Analizar y generar archivo con todo el contenido
      run: |
        cat > analizador.py << 'EOF'
        import os
        from datetime import datetime
        
        archivos_procesados = []
        
        def escribir_estructura(f, ruta_inicio='.'):
            f.write("=" * 100 + "\n")
            f.write("📁 ESTRUCTURA COMPLETA DEL PROYECTO\n")
            f.write("=" * 100 + "\n\n")
            
            for root, dirs, files in os.walk(ruta_inicio):
                dirs[:] = [d for d in dirs if d not in ['.git', '__pycache__', '.github']]
                nivel = root.replace(ruta_inicio, '').count(os.sep)
                indent = '  ' * nivel
                nombre_carpeta = "📦 " + os.path.basename(os.getcwd()) if nivel == 0 else "📂 " + os.path.basename(root)
                f.write(f"{indent}{nombre_carpeta}/\n")
                subindent = '  ' * (nivel + 1)
                for archivo in sorted(files):
                    if not archivo.startswith('.') and archivo != 'analisis_completo.txt':
                        f.write(f"{subindent}📄 {archivo}\n")
        
        def escribir_contenido_archivos(f, ruta_inicio='.'):
            f.write("\n\n" + "=" * 100 + "\n")
            f.write("📝 CONTENIDO COMPLETO DE TODOS LOS ARCHIVOS\n")
            f.write("=" * 100 + "\n\n")
            
            extensiones = ['.html', '.js', '.css', '.json', '.md', '.txt', '.yml', '.yaml']
            for root, dirs, files in os.walk(ruta_inicio):
                dirs[:] = [d for d in dirs if d not in ['.git', '__pycache__', '.github']]
                for archivo in sorted(files):
                    ruta_completa = os.path.join(root, archivo)
                    if any(archivo.endswith(ext) for ext in extensiones) and archivo != 'analisis_completo.txt':
                        try:
                            f.write("\n" + "=" * 100 + "\n")
                            f.write(f"📄 ARCHIVO: {ruta_completa}\n")
                            f.write("=" * 100 + "\n\n")
                            with open(ruta_completa, 'r', encoding='utf-8') as arch:
                                f.write(arch.read())
                            f.write("\n\n" + "~" * 100 + "\n\n")
                            archivos_procesados.append(ruta_completa)
                        except Exception as e:
                            f.write(f"⚠️ No se pudo leer el archivo: {e}\n\n")
        
        def escribir_resumen(f):
            f.write("\n\n" + "=" * 100 + "\n")
            f.write("📊 RESUMEN DEL ANÁLISIS\n")
            f.write("=" * 100 + "\n\n")
            f.write(f"✅ Archivos procesados: {len(archivos_procesados)}\n")
            f.write(f"📅 Fecha: {datetime.now().strftime('%Y-%m-%d %H:%M:%S')}\n")
            f.write("\n📋 Lista de archivos analizados:\n")
            for arch in archivos_procesados:
                f.write(f"   - {arch}\n")
        
        with open('analisis_completo_proyecto.txt', 'w', encoding='utf-8') as f:
            f.write("=" * 100 + "\n")
            f.write("🎯 ANÁLISIS COMPLETO DEL PROYECTO\n")
            f.write("=" * 100 + "\n\n")
            escribir_estructura(f)
            escribir_contenido_archivos(f)
            escribir_resumen(f)
        
        print(f"✅ Análisis completado. Archivo generado: analisis_completo_proyecto.txt")
        EOF
        
        python3 analizador.py
    
    - name: Subir archivo como artifact
      uses: actions/upload-artifact@v4
      with:
        name: analisis-completo-proyecto
        path: analisis_completo_proyecto.txt
        retention-days: 30

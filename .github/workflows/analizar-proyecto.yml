name: Analizar Todo el Proyecto

on:
  workflow_dispatch:  # Para ejecutarlo manualmente cuando quieras

jobs:
  analizar-completo:
    runs-on: ubuntu-latest
    
    steps:
    - name: Clonar repositorio
      uses: actions/checkout@v3
      
    - name: Analizar y generar archivo con todo el contenido
      run: |
        cat > analizador.py << 'EOF'
        import os
        import sys
        from pathlib import Path
        from datetime import datetime
        
        # Archivos y carpetas a incluir
        archivos_procesados = []
        
        def escribir_estructura(f, ruta_inicio='.'):
            """Escribe la estructura de carpetas y archivos"""
            f.write("=" * 100 + "\n")
            f.write("📁 ESTRUCTURA COMPLETA DEL PROYECTO\n")
            f.write("=" * 100 + "\n\n")
            
            for root, dirs, files in os.walk(ruta_inicio):
                # Ignorar carpetas que no queremos analizar
                dirs[:] = [d for d in dirs if d not in ['.git', '__pycache__', '.github/workflows']]
                
                nivel = root.replace(ruta_inicio, '').count(os.sep)
                indent = '  ' * nivel
                
                if nivel == 0:
                    nombre_carpeta = "📦 " + os.path.basename(os.getcwd())
                else:
                    nombre_carpeta = "📂 " + os.path.basename(root)
                
                f.write(f"{indent}{nombre_carpeta}/\n")
                
                # Mostrar archivos en esta carpeta
                subindent = '  ' * (nivel + 1)
                for archivo in sorted(files):
                    if not archivo.startswith('.') and archivo != 'analisis_completo.txt':
                        f.write(f"{subindent}📄 {archivo}\n")
        
        def escribir_contenido_archivos(f, ruta_inicio='.'):
            """Escribe el contenido de todos los archivos del proyecto"""
            f.write("\n\n" + "=" * 100 + "\n")
            f.write("📝 CONTENIDO COMPLETO DE TODOS LOS ARCHIVOS\n")
            f.write("=" * 100 + "\n\n")
            
            # Extensiones a procesar
            extensiones = ['.html', '.js', '.css', '.json', '.md', '.txt', '.yml', '.yaml']
            
            # Recorrer todos los archivos
            for root, dirs, files in os.walk(ruta_inicio):
                # Ignorar carpetas
                dirs[:] = [d for d in dirs if d not in ['.git', '__pycache__', '.github/workflows']]
                
                for archivo in sorted(files):
                    ruta_completa = os.path.join(root, archivo)
                    
                    # Procesar solo archivos con extensiones relevantes
                    if any(archivo.endswith(ext) for ext in extensiones):
                        if archivo != 'analisis_completo.txt':
                            try:
                                f.write("\n" + "=" * 100 + "\n")
                                f.write(f"📄 ARCHIVO: {ruta_completa}\n")
                                f.write(f"📏 Tamaño: {os.path.getsize(ruta_completa)} bytes\n")
                                f.write(f"🕐 Última modificación: {datetime.fromtimestamp(os.path.getmtime(ruta_completa))}\n")
                                f.write("=" * 100 + "\n\n")
                                
                                with open(ruta_completa, 'r', encoding='utf-8') as arch:
                                    contenido = arch.read()
                                    f.write(contenido)
                                    f.write("\n\n" + "~" * 100 + "\n\n")
                                    
                                archivos_procesados.append(ruta_completa)
                                
                            except Exception as e:
                                f.write(f"⚠️ No se pudo leer el archivo: {e}\n\n")
        
        def escribir_resumen(f):
            """Escribe un resumen del análisis"""
            f.write("\n\n" + "=" * 100 + "\n")
            f.write("📊 RESUMEN DEL ANÁLISIS\n")
            f.write("=" * 100 + "\n\n")
            f.write(f"✅ Archivos procesados: {len(archivos_procesados)}\n")
            f.write(f"📅 Fecha del análisis: {datetime.now().strftime('%Y-%m-%d %H:%M:%S')}\n")
            f.write("\n📋 Lista de archivos analizados:\n")
            for arch in archivos_procesados:
                f.write(f"   - {arch}\n")
        
        # Generar el archivo de análisis
        with open('analisis_completo_proyecto.txt', 'w', encoding='utf-8') as f:
            f.write("=" * 100 + "\n")
            f.write("🎯 ANÁLISIS COMPLETO DEL PROYECTO: floreszeus78-a11y\n")
            f.write("=" * 100 + "\n\n")
            
            escribir_estructura(f)
            escribir_contenido_archivos(f)
            escribir_resumen(f)
        
        print(f"✅ Análisis completado. Archivo generado: analisis_completo_proyecto.txt")
        print(f"📊 Total archivos procesados: {len(archivos_procesados)}")
        EOF
        
        python3 analizador.py
        
    - name: Subir archivo como artifact
      uses: actions/upload-artifact@v3
      with:
        name: analisis-completo-proyecto
        path: analisis_completo_proyecto.txt
        retention-days: 30
        
    - name: Crear release con el análisis
      uses: softprops/action-gh-release@v1
      with:
        tag_name: analisis-${{ github.run_number }}
        name: "Análisis Completo del Proyecto #${{ github.run_number }}"
        body: |
          📊 **Análisis completo del proyecto**
          
          - 📅 Fecha: $(date)
          - 🔢 Número de ejecución: ${{ github.run_number }}
          - 📁 Archivo generado: analisis_completo_proyecto.txt
          - 📄 Contiene toda la estructura y contenido del proyecto
        files: analisis_completo_proyecto.txt
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

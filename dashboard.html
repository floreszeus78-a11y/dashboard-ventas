<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard de Ventas - Punto de Venta</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  /* =========================================================
     VARIABLES DE TEMA
     ========================================================= */
  :root {
    --fondo: #0a0e1a;
    --superficie: #111827;
    --superficie2: #1e293b;
    --borde: #1e2d45;
    --acento: #0ea5e9;
    --texto: #e2e8f0;
    --texto-suave: #94a3b8;
    --verde: #22c55e;
    --verde-bg: rgba(34,197,94,0.15);
    --rojo: #ef4444;
    --rojo-bg: rgba(239,68,68,0.15);
    --naranja: #f97316;
    --naranja-bg: rgba(249,115,22,0.15);
    --sombra: 0 4px 20px rgba(0,0,0,0.5);
    
    /* Colores GPV */
    --gpv-excelente: #22c55e;
    --gpv-bueno: #f97316;
    --gpv-bajo: #64748b;
    --gpv-inactivo: #ef4444;
  }

  [data-theme="light"] {
    --fondo: #f8fafc;
    --superficie: #ffffff;
    --superficie2: #f1f5f9;
    --borde: #e2e8f0;
    --acento: #0284c7;
    --texto: #0f172a;
    --texto-suave: #64748b;
    --verde: #16a34a;
    --verde-bg: rgba(22,163,74,0.15);
    --rojo: #dc2626;
    --rojo-bg: rgba(220,38,38,0.15);
    --naranja: #ea580c;
    --naranja-bg: rgba(234,88,12,0.15);
    --sombra: 0 4px 20px rgba(0,0,0,0.1);
    
    --gpv-excelente: #16a34a;
    --gpv-bueno: #ea580c;
    --gpv-bajo: #475569;
    --gpv-inactivo: #dc2626;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; transition: background-color 0.3s, color 0.3s; }
  
  body {
    font-family: 'Inter', sans-serif;
    background: var(--fondo);
    color: var(--texto);
    min-height: 100vh;
  }

  /* =========================================================
     HEADER
     ========================================================= */
  .cabecera {
    background: linear-gradient(135deg, #0f172a, #0a1628);
    border-bottom: 1px solid var(--borde);
    padding: 20px 32px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  
  [data-theme="light"] .cabecera {
    background: linear-gradient(135deg, #f1f5f9, #e2e8f0);
  }

  .titulo h1 {
    font-size: 28px;
    font-weight: 800;
    background: linear-gradient(135deg, var(--acento), #7c3aed);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .titulo p {
    color: var(--texto-suave);
    font-size: 14px;
    margin-top: 4px;
  }

  .botones {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
  }

  .btn {
    padding: 12px 24px;
    border-radius: 30px;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    border: 1px solid var(--borde);
    background: var(--superficie);
    color: var(--texto);
    transition: all 0.3s;
  }

  .btn:hover {
    transform: translateY(-2px);
    border-color: var(--acento);
    box-shadow: 0 8px 25px rgba(14,165,233,0.2);
  }

  .btn-primario {
    background: linear-gradient(135deg, var(--acento), #7c3aed);
    color: white;
    border: none;
  }

  .theme-toggle {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: 1px solid var(--borde);
    background: var(--superficie);
    color: var(--texto);
    cursor: pointer;
    font-size: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .contenedor {
    max-width: 1600px;
    margin: 0 auto;
    padding: 24px 32px;
  }

  /* =========================================================
     FILTROS
     ========================================================= */
  .filtros {
    background: var(--superficie);
    border: 1px solid var(--borde);
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 30px;
    box-shadow: var(--sombra);
  }

  .fila-filtros {
    display: flex;
    gap: 20px;
    align-items: center;
    flex-wrap: wrap;
  }

  .etiqueta-filtro {
    font-weight: 700;
    font-size: 12px;
    text-transform: uppercase;
    color: var(--texto-suave);
    letter-spacing: 1px;
  }

  .pestanas-mes {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .pestana-mes {
    padding: 10px 24px;
    border-radius: 30px;
    border: 1px solid var(--borde);
    background: var(--superficie2);
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.3s;
    color: var(--texto);
  }

  .pestana-mes:hover {
    border-color: var(--acento);
    color: var(--acento);
  }

  .pestana-mes.activo {
    background: linear-gradient(135deg, var(--acento), #7c3aed);
    color: white;
    border: none;
  }

  .selector-ejecutivo select {
    min-width: 250px;
    padding: 12px 24px;
    border-radius: 30px;
    border: 1px solid var(--borde);
    background: var(--superficie2);
    color: var(--texto);
    font-size: 14px;
    cursor: pointer;
  }

  /* Leyenda GPV */
  .leyenda-gpv {
    display: flex;
    gap: 16px;
    margin-left: auto;
    font-size: 12px;
    font-weight: 600;
  }
  
  .leyenda-item {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  
  .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
  }
  
  .dot-green { background: var(--gpv-excelente); }
  .dot-orange { background: var(--gpv-bueno); }
  .dot-gray { background: var(--gpv-bajo); }
  .dot-red { background: var(--gpv-inactivo); }

  /* =========================================================
     RESUMEN KPIs (4 tarjetas superiores)
     ========================================================= */
  .grid-resumen {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 20px;
    margin-bottom: 30px;
  }

  .tarjeta-resumen {
    background: var(--superficie);
    border: 1px solid var(--borde);
    border-radius: 24px;
    padding: 24px;
    box-shadow: var(--sombra);
  }

  .tarjeta-resumen .titulo {
    font-size: 14px;
    font-weight: 600;
    color: var(--texto-suave);
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .tarjeta-resumen .valor {
    font-size: 42px;
    font-weight: 800;
    background: linear-gradient(135deg, var(--acento), #7c3aed);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    line-height: 1;
    margin-bottom: 8px;
  }

  .tarjeta-resumen .detalle {
    color: var(--texto-suave);
    font-size: 14px;
  }

  /* =========================================================
     GRÁFICAS
     ========================================================= */
  .grid-graficas {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
    gap: 24px;
    margin-bottom: 30px;
  }

  .tarjeta-grafica {
    background: var(--superficie);
    border: 1px solid var(--borde);
    border-radius: 24px;
    padding: 24px;
    box-shadow: var(--sombra);
  }

  .titulo-grafica {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 20px;
    color: var(--texto);
  }

  .contenedor-grafica {
    position: relative;
    height: 300px;
  }

  /* =========================================================
     RENDIMIENTO POR EJECUTIVO (EXACTAMENTE COMO LO TENÍAS)
     ========================================================= */
  .titulo-seccion {
    margin: 30px 0 20px;
    font-size: 24px;
    font-weight: 700;
    color: var(--texto);
  }

  .grid-ejecutivos {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 20px;
    margin-bottom: 30px;
  }

  .tarjeta-ejecutivo {
    background: var(--superficie);
    border: 1px solid var(--borde);
    border-radius: 24px;
    padding: 24px;
    cursor: pointer;
    transition: all 0.3s;
  }

  .tarjeta-ejecutivo:hover {
    transform: translateY(-4px);
    border-color: var(--acento);
  }

  .tarjeta-ejecutivo.seleccionado {
    border: 2px solid var(--acento);
  }

  .nombre-ejecutivo {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 16px;
    color: var(--texto);
  }

  .metricas-rapidas {
    display: flex;
    justify-content: space-between;
    margin: 16px 0;
  }

  .metrica {
    text-align: center;
  }

  .metrica .valor {
    font-weight: 700;
    font-size: 16px;
    color: var(--texto);
  }

  .metrica .etiqueta {
    color: var(--texto-suave);
    font-size: 11px;
  }

  .barra-progreso {
    margin: 16px 0;
  }

  .barra-progreso .encabezado {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    margin-bottom: 8px;
    color: var(--texto-suave);
  }

  .barra {
    height: 8px;
    background: var(--superficie2);
    border-radius: 4px;
    overflow: hidden;
  }

  .barra .lleno {
    height: 100%;
    background: linear-gradient(135deg, var(--acento), #7c3aed);
    border-radius: 4px;
  }

  .insignias-estado {
    display: flex;
    gap: 8px;
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid var(--borde);
  }

  .insignia {
    flex: 1;
    text-align: center;
    padding: 8px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 600;
  }

  .insignia-verde { background: var(--verde-bg); color: var(--verde); }
  .insignia-naranja { background: var(--naranja-bg); color: var(--naranja); }
  .insignia-rojo { background: var(--rojo-bg); color: var(--rojo); }

  /* =========================================================
     TABLA SIMPLIFICADA CON COLORES GPV
     ========================================================= */
  .seccion-tabla {
    background: var(--superficie);
    border: 1px solid var(--borde);
    border-radius: 24px;
    padding: 24px;
    box-shadow: var(--sombra);
  }

  .encabezado-tabla {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .titulo-tabla {
    font-size: 20px;
    font-weight: 700;
    color: var(--texto);
  }

  .buscador {
    padding: 10px 20px;
    border-radius: 30px;
    border: 1px solid var(--borde);
    background: var(--superficie2);
    color: var(--texto);
    font-size: 14px;
    width: 300px;
  }

  .buscador::placeholder {
    color: var(--texto-suave);
  }

  .contenedor-tabla {
    overflow-x: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
  }

  th {
    text-align: left;
    padding: 16px;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    color: var(--texto-suave);
    background: var(--superficie2);
    border-bottom: 2px solid var(--borde);
  }

  td {
    padding: 16px;
    border-bottom: 1px solid var(--borde);
    color: var(--texto);
  }

  tr:hover td {
    background: var(--superficie2);
  }

  /* Colores GPV en tabla */
  .gpv-excelente { color: var(--gpv-excelente); font-weight: 700; }
  .gpv-bueno { color: var(--gpv-bueno); font-weight: 700; }
  .gpv-bajo { color: var(--gpv-bajo); font-weight: 600; }
  .gpv-inactivo { color: var(--gpv-inactivo); font-weight: 700; }

  .badge-estado {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
  }

  .badge-activo { background: var(--verde-bg); color: var(--verde); }
  .badge-regular { background: var(--naranja-bg); color: var(--naranja); }
  .badge-inactivo { background: var(--rojo-bg); color: var(--rojo); }

  .comercio-cell {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .comercio-nombre {
    font-weight: 700;
  }

  .comercio-serie {
    font-size: 12px;
    color: var(--texto-suave);
    font-family: monospace;
  }

  .comercio-ruc {
    font-size: 11px;
    color: var(--texto-suave);
  }

  .multi-badge {
    display: inline-block;
    background: linear-gradient(135deg, var(--acento), #7c3aed);
    color: white;
    padding: 2px 8px;
    border-radius: 12px;
    font-size: 10px;
    font-weight: 700;
    margin-left: 8px;
  }

  /* =========================================================
     LOADING
     ========================================================= */
  .loading {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: var(--fondo);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 1000;
  }

  .spinner {
    width: 60px;
    height: 60px;
    border: 4px solid var(--superficie2);
    border-top-color: var(--acento);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 768px) {
    .grid-graficas { grid-template-columns: 1fr; }
    .fila-filtros { flex-direction: column; align-items: stretch; }
    .leyenda-gpv { margin-left: 0; margin-top: 12px; }
    .buscador { width: 100%; }
  }
</style>
</head>
<body>

<div class="loading" id="loading">
  <div class="spinner"></div>
  <div style="margin-top: 20px; color: var(--texto-suave);">Cargando dashboard...</div>
</div>

<header class="cabecera">
  <div class="titulo">
    <h1>📊 Dashboard de Ventas</h1>
    <p>Punto de Venta · Cada fila = 1 equipo</p>
  </div>
  <div class="botones">
    <button class="btn" onclick="exportarExcel()">📥 Exportar Excel</button>
    <button class="btn btn-primario" onclick="cargarDatos(true)">🔄 Actualizar</button>
    <button class="theme-toggle" onclick="toggleTheme()" title="Cambiar tema">🌓</button>
  </div>
</header>

<main class="contenedor" id="mainContent" style="display: none;">
  
  <!-- Filtros -->
  <div class="filtros">
    <div class="fila-filtros">
      <div>
        <span class="etiqueta-filtro">📅 Mes:</span>
        <div class="pestanas-mes" id="monthTabs">
          <button class="pestana-mes activo" onclick="cambiarMes('TODOS')">📅 TODOS</button>
        </div>
      </div>
      
      <div class="selector-ejecutivo">
        <span class="etiqueta-filtro">👤 Ejecutivo:</span>
        <select id="execSelect" onchange="cambiarEjecutivo(this.value)">
          <option value="TODOS">Todos los ejecutivos</option>
        </select>
      </div>

      <div class="leyenda-gpv">
        <div class="leyenda-item"><span class="dot dot-green"></span> ≥S/ 700</div>
        <div class="leyenda-item"><span class="dot dot-orange"></span> S/ 400-699</div>
        <div class="leyenda-item"><span class="dot dot-gray"></span> S/ 1-399</div>
        <div class="leyenda-item"><span class="dot dot-red"></span> S/ 0</div>
      </div>
    </div>
  </div>

  <!-- KPIs -->
  <div class="grid-resumen" id="resumenCards"></div>

  <!-- Gráficas -->
  <div class="grid-graficas">
    <div class="tarjeta-grafica">
      <div class="titulo-grafica">📈 GPV por Ejecutivo</div>
      <div class="contenedor-grafica">
        <canvas id="chartEjecutivos"></canvas>
      </div>
    </div>
    <div class="tarjeta-grafica">
      <div class="titulo-grafica">🎯 Distribución por Rangos GPV</div>
      <div class="contenedor-grafica">
        <canvas id="chartDistribucion"></canvas>
      </div>
    </div>
  </div>

  <!-- Rendimiento por Ejecutivo (IGUAL QUE LO TENÍAS) -->
  <h2 class="titulo-seccion">👥 Rendimiento por Ejecutivo</h2>
  <div class="grid-ejecutivos" id="ejecutivosGrid"></div>

  <!-- Tabla Simplificada -->
  <div class="seccion-tabla">
    <div class="encabezado-tabla">
      <div class="titulo-tabla">📋 Detalle de Equipos</div>
      <input type="text" class="buscador" id="buscador" placeholder="🔍 Buscar comercio, serie o RUC..." onkeyup="filtrarTabla()">
    </div>
    
    <div class="contenedor-tabla">
      <table>
        <thead>
          <tr>
            <th>Comercio</th>
            <th>Ejecutivo</th>
            <th style="text-align: right;">GPV M0</th>
            <th style="text-align: center;">TRX</th>
            <th>Última Transacción</th>
            <th style="text-align: center;">Estado Uso</th>
          </tr>
        </thead>
        <tbody id="tablaCuerpo"></tbody>
      </table>
    </div>
  </div>
</main>

<script>
// ============================================================
// CONFIGURACIÓN
// ============================================================
const URL_API = 'https://script.google.com/macros/s/AKfycbwD_CP5UvEQiF5nPU2TTmHDrqwQ5xo6TkeaOsrS9XByeThAm6M6pxsZgQuLb0EfYyKW/exec';
const META_VENTAS = 10;

let DATOS_COMPLETOS = null;
let mesActual = 'TODOS';
let ejecutivoActual = 'TODOS';
let chartEjecutivos = null;
let chartDistribucion = null;

// ============================================================
// TEMAS
// ============================================================
function toggleTheme() {
  const html = document.documentElement;
  const current = html.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  
  // Actualizar gráficas si existen
  if (chartEjecutivos) {
    chartEjecutivos.destroy();
    chartDistribucion.destroy();
    renderizarGraficas();
  }
}

// Cargar tema guardado
const savedTheme = localStorage.getItem('theme') || 'dark';
document.documentElement.setAttribute('data-theme', savedTheme);

// ============================================================
// COLORES GPV
// ============================================================
function getGPVColorClass(gpv) {
  if (!gpv || gpv === 0) return 'gpv-inactivo';
  if (gpv >= 700) return 'gpv-excelente';
  if (gpv >= 400) return 'gpv-bueno';
  return 'gpv-bajo';
}

// ============================================================
// CARGA DE DATOS
// ============================================================
async function cargarDatos(forzar = false) {
  const loading = document.getElementById('loading');
  const main = document.getElementById('mainContent');
  
  loading.style.display = 'flex';
  main.style.display = 'none';
  
  try {
    const res = await fetch(URL_API);
    DATOS_COMPLETOS = await res.json();
    
    if (DATOS_COMPLETOS.error) throw new Error(DATOS_COMPLETOS.mensaje);
    
    inicializarFiltros();
    renderizarTodo();
    
    loading.style.display = 'none';
    main.style.display = 'block';
    
  } catch (err) {
    loading.innerHTML = `<div style="color: var(--rojo); text-align: center;">❌ Error: ${err.message}</div>`;
  }
}

function inicializarFiltros() {
  // Meses
  const tabs = document.getElementById('monthTabs');
  tabs.innerHTML = '<button class="pestana-mes activo" onclick="cambiarMes(\'TODOS\')">📅 TODOS</button>';
  DATOS_COMPLETOS.meses_disponibles?.forEach(mes => {
    tabs.innerHTML += `<button class="pestana-mes" onclick="cambiarMes('${mes}')">${mes}</button>`;
  });
  
  // Ejecutivos
  const select = document.getElementById('execSelect');
  select.innerHTML = '<option value="TODOS">Todos los ejecutivos</option>';
  DATOS_COMPLETOS.ejecutivos?.forEach(exec => {
    select.innerHTML += `<option value="${exec}">${exec}</option>`;
  });
}

function renderizarTodo() {
  renderizarResumen();
  renderizarGraficas();
  renderizarEjecutivos(); // Mantengo exactamente tu función original
  renderizarTabla();
}

// ============================================================
// RESUMEN KPIs (4 tarjetas)
// ============================================================
function renderizarResumen() {
  let equipos = getEquiposFiltrados();
  
  const totalGPV = equipos.reduce((sum, e) => sum + (e.gpv_mes_actual || 0), 0);
  const totalTRX = equipos.reduce((sum, e) => sum + (e.transacciones_mes_actual || 0), 0);
  const activos = equipos.filter(e => e.estado === 'ACTIVO').length;
  const ticketPromedio = totalTRX > 0 ? totalGPV / totalTRX : 0;
  
  document.getElementById('resumenCards').innerHTML = `
    <div class="tarjeta-resumen">
      <div class="titulo">💰 GPV TOTAL</div>
      <div class="valor">S/ ${formatearNumero(totalGPV)}</div>
      <div class="detalle">${equipos.length} equipos</div>
    </div>
    <div class="tarjeta-resumen">
      <div class="titulo">🛒 TRANSACCIONES</div>
      <div class="valor">${formatearNumero(totalTRX, 0)}</div>
      <div class="detalle">${equipos.length > 0 ? (totalTRX / equipos.length).toFixed(1) : '0'} por equipo</div>
    </div>
    <div class="tarjeta-resumen">
      <div class="titulo">🎫 TICKET PROMEDIO</div>
      <div class="valor">S/ ${formatearNumero(ticketPromedio)}</div>
      <div class="detalle">por transacción</div>
    </div>
    <div class="tarjeta-resumen">
      <div class="titulo">✅ EQUIPOS ACTIVOS</div>
      <div class="valor">${activos}/${equipos.length}</div>
      <div class="detalle">${equipos.length > 0 ? Math.round(activos/equipos.length*100) : 0}% del total</div>
    </div>
  `;
}

// ============================================================
// GRÁFICAS
// ============================================================
function renderizarGraficas() {
  const equipos = getEquiposFiltrados();
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  const textColor = isDark ? '#94a3b8' : '#64748b';
  
  // Destruir anteriores
  if (chartEjecutivos) chartEjecutivos.destroy();
  if (chartDistribucion) chartDistribucion.destroy();
  
  // Datos por ejecutivo
  const porEjecutivo = {};
  equipos.forEach(e => {
    const exec = e.responsable_real || 'Sin asignar';
    if (!porEjecutivo[exec]) porEjecutivo[exec] = 0;
    porEjecutivo[exec] += e.gpv_mes_actual || 0;
  });
  
  // Gráfica 1: Barras por ejecutivo
  const ctx1 = document.getElementById('chartEjecutivos').getContext('2d');
  chartEjecutivos = new Chart(ctx1, {
    type: 'bar',
    data: {
      labels: Object.keys(porEjecutivo),
      datasets: [{
        label: 'GPV (S/)',
        data: Object.values(porEjecutivo),
        backgroundColor: isDark ? 'rgba(14, 165, 233, 0.8)' : 'rgba(2, 132, 199, 0.8)',
        borderRadius: 8,
        borderSkipped: false
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        y: {
          beginAtZero: true,
          grid: { color: isDark ? 'rgba(148, 163, 184, 0.1)' : 'rgba(100, 116, 139, 0.1)' },
          ticks: { color: textColor }
        },
        x: {
          grid: { display: false },
          ticks: { color: textColor }
        }
      }
    }
  });
  
  // Gráfica 2: Distribución por rangos
  const rangos = [
    equipos.filter(e => (e.gpv_mes_actual || 0) >= 700).length,
    equipos.filter(e => { const g = e.gpv_mes_actual || 0; return g >= 400 && g < 700 }).length,
    equipos.filter(e => { const g = e.gpv_mes_actual || 0; return g > 0 && g < 400 }).length,
    equipos.filter(e => !e.gpv_mes_actual || e.gpv_mes_actual === 0).length
  ];
  
  const ctx2 = document.getElementById('chartDistribucion').getContext('2d');
  chartDistribucion = new Chart(ctx2, {
    type: 'doughnut',
    data: {
      labels: ['≥ S/ 700', 'S/ 400-699', 'S/ 1-399', 'S/ 0'],
      datasets: [{
        data: rangos,
        backgroundColor: [
          'var(--gpv-excelente)',
          'var(--gpv-bueno)',
          'var(--gpv-bajo)',
          'var(--gpv-inactivo)'
        ],
        borderWidth: 0
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {
          position: 'bottom',
          labels: { color: textColor, padding: 20, usePointStyle: true }
        }
      }
    }
  });
}

// ============================================================
// RENDIMIENTO POR EJECUTIVO (EXACTAMENTE COMO LO TENÍAS)
// ============================================================
function renderizarEjecutivos() {
  const grid = document.getElementById('ejecutivosGrid');
  grid.innerHTML = '';
  
  let equiposFiltrados = DATOS_COMPLETOS.equipos || [];
  
  if (mesActual !== 'TODOS') {
    equiposFiltrados = equiposFiltrados.filter(e => e.mes_venta === mesActual);
  }
  
  if (equiposFiltrados.length === 0) {
    grid.innerHTML = '<div style="color: var(--texto-suave); padding: 20px;">No hay equipos vendidos en este mes</div>';
    return;
  }
  
  const ejecutivosMap = new Map();
  
  equiposFiltrados.forEach(eq => {
    const exec = eq.responsable_real || 'SIN ASIGNAR';
    if (!ejecutivosMap.has(exec)) {
      ejecutivosMap.set(exec, {
        total_equipos: 0,
        gpv_total: 0,
        transacciones_total: 0,
        activos: 0,
        regulares: 0,
        inactivos: 0
      });
    }
    
    const stats = ejecutivosMap.get(exec);
    stats.total_equipos++;
    stats.gpv_total += eq.gpv_mes_actual || 0;
    stats.transacciones_total += eq.transacciones_mes_actual || 0;
    
    if (eq.estado === 'ACTIVO') stats.activos++;
    else if (eq.estado === 'REGULAR') stats.regulares++;
    else if (eq.estado === 'INACTIVO') stats.inactivos++;
  });
  
  const ejecutivosArray = Array.from(ejecutivosMap.entries()).map(([nombre, stats]) => {
    const ticketPromedio = stats.transacciones_total > 0 ? stats.gpv_total / stats.transacciones_total : 0;
    return {
      nombre: nombre,
      total_equipos: stats.total_equipos,
      gpv_total: stats.gpv_total,
      transacciones_total: stats.transacciones_total,
      ticket_promedio: ticketPromedio,
      activos: stats.activos,
      regulares: stats.regulares,
      inactivos: stats.inactivos
    };
  });
  
  ejecutivosArray.sort((a, b) => b.total_equipos - a.total_equipos);
  
  const textoPeriodo = mesActual === 'TODOS' ? 'total' : mesActual;
  
  ejecutivosArray.forEach(exec => {
    const pct = Math.min(100, Math.round((exec.total_equipos / META_VENTAS) * 100));
    const seleccionado = ejecutivoActual === exec.nombre ? 'seleccionado' : '';
    const nombreEscapado = exec.nombre.replace(/'/g, "\\'");
    
    grid.innerHTML += `
      <div class="tarjeta-ejecutivo ${seleccionado}" onclick="seleccionarEjecutivo('${nombreEscapado}')">
        <div class="nombre-ejecutivo">${exec.nombre}</div>
        <div style="font-size: 32px; font-weight: 800; background: linear-gradient(135deg, var(--acento), #7c3aed); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
          ${exec.total_equipos}
        </div>
        <div style="color: var(--texto-suave); margin-bottom: 16px;">equipos vendidos en ${textoPeriodo}</div>
        
        <div class="metricas-rapidas">
          <div class="metrica">
            <div class="valor">S/ ${formatearNumero(exec.gpv_total)}</div>
            <div class="etiqueta">GPV</div>
          </div>
          <div class="metrica">
            <div class="valor">${formatearNumero(exec.transacciones_total, 0)}</div>
            <div class="etiqueta">TRX</div>
          </div>
          <div class="metrica">
            <div class="valor">S/ ${formatearNumero(exec.ticket_promedio)}</div>
            <div class="etiqueta">Ticket</div>
          </div>
        </div>
        
        <div class="barra-progreso">
          <div class="encabezado">
            <span>Meta: ${META_VENTAS} equipos</span>
            <span>${pct}%</span>
          </div>
          <div class="barra">
            <div class="lleno" style="width: ${pct}%"></div>
          </div>
        </div>
        
        <div class="insignias-estado">
          <div class="insignia insignia-verde">✅ ${exec.activos || 0}</div>
          <div class="insignia insignia-naranja">🟠 ${exec.regulares || 0}</div>
          <div class="insignia insignia-rojo">❌ ${exec.inactivos || 0}</div>
        </div>
      </div>
    `;
  });
}

// ============================================================
// TABLA SIMPLIFICADA CON COLORES GPV
// ============================================================
function renderizarTabla() {
  let equipos = getEquiposFiltrados();
  
  // Detectar comercios con múltiples equipos
  const comerciosCount = {};
  equipos.forEach(e => {
    const key = `${e.ruc}_${e.comercio}`;
    comerciosCount[key] = (comerciosCount[key] || 0) + 1;
  });
  
  const tbody = document.getElementById('tablaCuerpo');
  
  if (equipos.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding:40px; color: var(--texto-suave);">No hay equipos para mostrar</td></tr>';
    return;
  }
  
  tbody.innerHTML = equipos.map(eq => {
    const gpv = eq.gpv_mes_actual || 0;
    const gpvClass = getGPVColorClass(gpv);
    const esMulti = comerciosCount[`${eq.ruc}_${eq.comercio}`] > 1;
    
    // Badge de estado
    let estadoBadge = '<span class="badge-estado badge-inactivo">● Sin datos</span>';
    if (eq.estado === 'ACTIVO') estadoBadge = '<span class="badge-estado badge-activo">● Activo</span>';
    else if (eq.estado === 'REGULAR') estadoBadge = '<span class="badge-estado badge-regular">● Regular</span>';
    else if (eq.estado === 'INACTIVO') estadoBadge = '<span class="badge-estado badge-inactivo">● Inactivo</span>';
    
    return `
      <tr>
        <td>
          <div class="comercio-cell">
            <div class="comercio-nombre">
              ${eq.comercio || 'Sin nombre'}
              ${esMulti ? `<span class="multi-badge">+${comerciosCount[`${eq.ruc}_${eq.comercio}`] - 1}</span>` : ''}
            </div>
            <div class="comercio-serie">${eq.numero_serie || 'N/A'}</div>
            <div class="comercio-ruc">RUC: ${eq.ruc || '-'}</div>
          </div>
        </td>
        <td>${eq.responsable_real || 'Sin asignar'}</td>
        <td style="text-align: right;" class="${gpvClass}">
          S/ ${formatearNumero(gpv)}
        </td>
        <td style="text-align: center;">${eq.transacciones_mes_actual || 0}</td>
        <td>${formatearFecha(eq.ultima_transaccion) || '-'}</td>
        <td style="text-align: center;">${estadoBadge}</td>
      </tr>
    `;
  }).join('');
}

function filtrarTabla() {
  const texto = document.getElementById('buscador').value.toLowerCase();
  const filas = document.querySelectorAll('#tablaCuerpo tr');
  
  filas.forEach(fila => {
    const contenido = fila.textContent.toLowerCase();
    fila.style.display = contenido.includes(texto) ? '' : 'none';
  });
}

// ============================================================
// UTILIDADES
// ============================================================
function getEquiposFiltrados() {
  let equipos = DATOS_COMPLETOS?.equipos || [];
  if (mesActual !== 'TODOS') equipos = equipos.filter(e => e.mes_venta === mesActual);
  if (ejecutivoActual !== 'TODOS') equipos = equipos.filter(e => e.responsable_real === ejecutivoActual);
  return equipos;
}

function cambiarMes(mes) {
  mesActual = mes;
  ejecutivoActual = 'TODOS';
  document.getElementById('execSelect').value = 'TODOS';
  
  document.querySelectorAll('.pestana-mes').forEach(t => {
    const texto = t.textContent.trim();
    const esActivo = (mes === 'TODOS' && texto.includes('TODOS')) || texto === mes;
    t.classList.toggle('activo', esActivo);
  });
  
  renderizarTodo();
}

function cambiarEjecutivo(val) {
  ejecutivoActual = val;
  renderizarTodo();
}

function seleccionarEjecutivo(exec) {
  ejecutivoActual = ejecutivoActual === exec ? 'TODOS' : exec;
  document.getElementById('execSelect').value = ejecutivoActual;
  renderizarTodo();
}

function formatearNumero(num, decimales = 2) {
  if (num === undefined || num === null || num === '' || isNaN(num)) return decimales === 0 ? '0' : '0.00';
  const n = typeof num === 'string' ? parseFloat(num) : Number(num);
  if (isNaN(n)) return decimales === 0 ? '0' : '0.00';
  return n.toLocaleString('es-PE', { minimumFractionDigits: decimales, maximumFractionDigits: decimales });
}

function formatearFecha(fecha) {
  if (!fecha || fecha === 'Invalid Date') return '';
  if (typeof fecha === 'string' && fecha.includes('-')) {
    const partes = fecha.split('-');
    if (partes.length === 3) return `${partes[2]}/${partes[1]}/${partes[0]}`;
  }
  if (fecha instanceof Date) {
    return `${fecha.getDate().toString().padStart(2,'0')}/${(fecha.getMonth()+1).toString().padStart(2,'0')}/${fecha.getFullYear()}`;
  }
  return fecha.toString();
}

function exportarExcel() {
  const equipos = getEquiposFiltrados();
  if (equipos.length === 0) return alert('No hay datos');
  
  const csv = [
    ['Comercio', 'Serie', 'Ejecutivo', 'RUC', 'GPV M0', 'TRX M0', 'Última TRX', 'Estado'].join(','),
    ...equipos.map(e => [
      `"${(e.comercio || '').replace(/"/g, '""')}"`,
      e.numero_serie,
      e.responsable_real,
      e.ruc,
      e.gpv_mes_actual || 0,
      e.transacciones_mes_actual || 0,
      e.ultima_transaccion || '',
      e.estado || 'SIN_DATOS'
    ].join(','))
  ].join('\n');
  
  const blob = new Blob(['\ufeff' + csv], { type: 'text/csv' });
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = `dashboard_${new Date().toISOString().split('T')[0]}.csv`;
  link.click();
}

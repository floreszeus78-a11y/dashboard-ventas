<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>Dashboard de Ventas — Ejecutivos</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  /* TEMA OSCURO (por defecto) */
  :root {
    --bg: #0a0e1a;
    --bg-gradient: linear-gradient(135deg, #0f172a, #0a1628);
    --surface: #111827;
    --surface-hover: #1a2236;
    --surface2: #1e293b;
    --border: #1e2d45;
    --border-hover: #2d3a4f;
    --accent: #0ea5e9;
    --accent-gradient: linear-gradient(135deg, #0ea5e9, #7c3aed);
    --accent2: #38bdf8;
    --text: #e2e8f0;
    --text-muted: #94a3b8;
    --muted: #64748b;
    --green: #22c55e;
    --green-bg: rgba(34,197,94,0.15);
    --yellow: #eab308;
    --yellow-bg: rgba(234,179,8,0.15);
    --red: #ef4444;
    --red-bg: rgba(239,68,68,0.15);
    --orange: #f97316;
    --orange-bg: rgba(249,115,22,0.15);
    --blue: #0ea5e9;
    --blue-bg: rgba(14,165,233,0.15);
    --card-shadow: 0 4px 20px rgba(0,0,0,0.5);
    --transition: all 0.3s ease;
  }

  /* TEMA CLARO */
  body.light-theme {
    --bg: #f3f4f6;
    --bg-gradient: linear-gradient(135deg, #ffffff, #f3f4f6);
    --surface: #ffffff;
    --surface-hover: #f8fafc;
    --surface2: #e2e8f0;
    --border: #cbd5e1;
    --border-hover: #94a3b8;
    --accent: #0284c7;
    --accent-gradient: linear-gradient(135deg, #0284c7, #7c3aed);
    --accent2: #0ea5e9;
    --text: #0f172a;
    --text-muted: #334155;
    --muted: #64748b;
    --green: #059669;
    --green-bg: rgba(5,150,105,0.1);
    --yellow: #b45309;
    --yellow-bg: rgba(180,83,9,0.1);
    --red: #b91c1c;
    --red-bg: rgba(185,28,28,0.1);
    --orange: #c2410c;
    --orange-bg: rgba(194,65,12,0.1);
    --blue: #0284c7;
    --blue-bg: rgba(2,132,199,0.1);
    --card-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    transition: background-color 0.3s, color 0.3s;
  }

  /* HEADER MEJORADO */
  .header {
    background: var(--bg-gradient);
    border-bottom: 1px solid var(--border);
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(10px);
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .logo {
    width: 48px;
    height: 48px;
    background: var(--accent-gradient);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    box-shadow: 0 4px 15px rgba(14,165,233,0.3);
  }

  .header-title h1 {
    font-family: 'Syne', sans-serif;
    font-size: 24px;
    font-weight: 800;
    background: var(--accent-gradient);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -0.5px;
  }

  .header-title p {
    font-size: 13px;
    color: var(--muted);
    margin-top: 2px;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  /* BOTONES MEJORADOS */
  .btn {
    padding: 10px 20px;
    border-radius: 12px;
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: var(--transition);
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    display: inline-flex;
    align-items: center;
    gap: 8px;
    box-shadow: var(--card-shadow);
  }

  .btn:hover {
    transform: translateY(-2px);
    border-color: var(--accent);
    box-shadow: 0 8px 25px rgba(14,165,233,0.2);
  }

  .btn-primary {
    background: var(--accent-gradient);
    color: white;
    border: none;
  }

  .btn-group {
    display: flex;
    gap: 8px;
  }

  /* CONTAINER */
  .container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 24px 32px;
  }

  /* LOADING OVERLAY */
  .loading-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    gap: 24px;
  }

  .spinner {
    width: 60px;
    height: 60px;
    border: 4px solid var(--surface2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    color: var(--muted);
    font-size: 16px;
    font-weight: 500;
  }

  /* FILTERS SECTION */
  .filters-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 30px;
    box-shadow: var(--card-shadow);
  }

  .filters-row {
    display: flex;
    align-items: center;
    gap: 20px;
    flex-wrap: wrap;
  }

  .filter-label {
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
  }

  /* MONTH TABS */
  .month-tabs {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .month-tab {
    padding: 10px 24px;
    border-radius: 30px;
    border: 1px solid var(--border);
    background: var(--surface-hover);
    color: var(--text-muted);
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: var(--transition);
  }

  .month-tab:hover {
    border-color: var(--accent);
    color: var(--accent);
    transform: translateY(-2px);
  }

  .month-tab.active {
    background: var(--accent-gradient);
    color: white;
    border: none;
    box-shadow: 0 4px 15px rgba(14,165,233,0.3);
  }

  /* EXECUTIVE SELECT */
  .exec-select {
    min-width: 250px;
    position: relative;
  }

  .exec-select select {
    width: 100%;
    padding: 12px 20px;
    border-radius: 30px;
    border: 1px solid var(--border);
    background: var(--surface-hover);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    outline: none;
    transition: var(--transition);
    appearance: none;
  }

  .exec-select::after {
    content: '▾';
    position: absolute;
    right: 20px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    pointer-events: none;
  }

  .exec-select select:hover {
    border-color: var(--accent);
  }

  /* KPIS CARDS */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
    margin-bottom: 30px;
  }

  .kpi-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 24px;
    box-shadow: var(--card-shadow);
    transition: var(--transition);
  }

  .kpi-card:hover {
    transform: translateY(-4px);
    border-color: var(--accent);
  }

  .kpi-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }

  .kpi-icon {
    width: 48px;
    height: 48px;
    background: var(--blue-bg);
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
  }

  .kpi-title {
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .kpi-value {
    font-family: 'Syne', sans-serif;
    font-size: 42px;
    font-weight: 800;
    background: var(--accent-gradient);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    line-height: 1;
    margin-bottom: 8px;
  }

  .kpi-label {
    color: var(--muted);
    font-size: 14px;
  }

  /* EXECUTIVE CARDS GRID */
  .exec-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 20px;
    margin-bottom: 30px;
  }

  .exec-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 24px;
    cursor: pointer;
    transition: var(--transition);
    position: relative;
    overflow: hidden;
    box-shadow: var(--card-shadow);
  }

  .exec-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: var(--accent-gradient);
    opacity: 0;
    transition: var(--transition);
  }

  .exec-card:hover {
    transform: translateY(-4px);
    border-color: var(--accent);
  }

  .exec-card:hover::before {
    opacity: 1;
  }

  .exec-card.selected {
    border: 2px solid var(--accent);
    box-shadow: 0 8px 30px rgba(14,165,233,0.3);
  }

  .exec-name {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 16px;
    color: var(--text);
  }

  .exec-stats {
    display: flex;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 16px;
  }

  .exec-count {
    font-family: 'Syne', sans-serif;
    font-size: 48px;
    font-weight: 800;
    background: var(--accent-gradient);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    line-height: 1;
  }

  .exec-label {
    color: var(--muted);
    font-size: 14px;
  }

  /* PROGRESS BAR */
  .progress-container {
    margin: 16px 0;
  }

  .progress-header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 8px;
    font-size: 13px;
    color: var(--muted);
  }

  .progress-bar {
    height: 8px;
    background: var(--surface2);
    border-radius: 4px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent-gradient);
    border-radius: 4px;
    transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  /* STATUS BADGES */
  .status-badges {
    display: flex;
    gap: 12px;
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }

  .badge {
    flex: 1;
    text-align: center;
    padding: 8px;
    border-radius: 12px;
    font-size: 12px;
    font-weight: 600;
  }

  .badge-green {
    background: var(--green-bg);
    color: var(--green);
  }

  .badge-orange {
    background: var(--orange-bg);
    color: var(--orange);
  }

  .badge-red {
    background: var(--red-bg);
    color: var(--red);
  }

  /* TABLE SECTION */
  .table-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 24px;
    box-shadow: var(--card-shadow);
  }

  .table-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 16px;
  }

  .table-title {
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    font-weight: 700;
  }

  .table-title span {
    color: var(--accent);
  }

  .table-count {
    background: var(--surface2);
    padding: 8px 16px;
    border-radius: 30px;
    font-size: 14px;
    color: var(--text-muted);
  }

  .table-container {
    overflow-x: auto;
    border-radius: 16px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    min-width: 1000px;
  }

  th {
    text-align: left;
    padding: 16px;
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    background: var(--surface2);
  }

  td {
    padding: 16px;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
  }

  tr:hover td {
    background: var(--surface-hover);
  }

  .status-indicator {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 12px;
    border-radius: 30px;
    font-size: 12px;
    font-weight: 600;
  }

  .status-active {
    background: var(--green-bg);
    color: var(--green);
  }

  .status-partial {
    background: var(--orange-bg);
    color: var(--orange);
  }

  .status-inactive {
    background: var(--red-bg);
    color: var(--red);
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }

  .dot-green { background: var(--green); }
  .dot-orange { background: var(--orange); }
  .dot-red { background: var(--red); }

  .amount {
    font-family: 'Syne', sans-serif;
    font-weight: 600;
  }

  .amount-positive { color: var(--green); }
  .amount-negative { color: var(--red); }

  /* FOOTER */
  .footer {
    text-align: center;
    padding: 30px 0 20px;
    color: var(--muted);
    font-size: 13px;
    border-top: 1px solid var(--border);
    margin-top: 40px;
  }

  /* ANIMACIONES */
  @keyframes slideUp {
    from {
      opacity: 0;
      transform: translateY(20px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .fade-in {
    animation: slideUp 0.5s ease forwards;
  }
</style>
</head>
<body>

<!-- LOADING OVERLAY -->
<div class="loading-overlay" id="loading">
  <div class="spinner"></div>
  <div class="loading-text" id="loadingText">Cargando dashboard...</div>
</div>

<!-- HEADER -->
<header class="header">
  <div class="header-left">
    <div class="logo">📊</div>
    <div class="header-title">
      <h1>Dashboard de Ventas</h1>
      <p>Punto de Venta · Actualizado en tiempo real</p>
    </div>
  </div>
  
  <div class="header-right">
    <button class="btn" onclick="toggleTheme()" id="themeToggle">
      <span>🌙</span> Modo Oscuro
    </button>
    
    <div class="btn-group">
      <button class="btn" onclick="descargarExcel()">
        <span>📊</span> Excel
      </button>
      <button class="btn btn-primary" onclick="descargarPDF()">
        <span>📄</span> PDF
      </button>
    </div>
    
    <button class="btn btn-primary" onclick="cargarDatos(true)">
      <span>🔄</span> Actualizar
    </button>
  </div>
</header>

<!-- MAIN CONTENT -->
<div class="container" id="mainContent" style="display: none;">
  
  <!-- FILTERS SECTION -->
  <div class="filters-section fade-in">
    <div class="filters-row">
      <span class="filter-label">📅 Mes:</span>
      <div class="month-tabs" id="monthTabs"></div>
      
      <span class="filter-label">👤 Ejecutivo:</span>
      <div class="exec-select">
        <select id="execSelect" onchange="setExec(this.value)">
          <option value="TODOS">Todos los ejecutivos</option>
        </select>
      </div>
    </div>
  </div>
  
  <!-- KPI CARDS -->
  <div class="kpi-grid" id="kpiCards"></div>
  
  <!-- EXECUTIVE CARDS -->
  <div style="margin-bottom: 20px;">
    <h2 style="font-family: 'Syne', sans-serif; margin-bottom: 20px;">👥 Ejecutivos</h2>
    <div class="exec-grid" id="execGrid"></div>
  </div>
  
  <!-- TABLE SECTION -->
  <div class="table-section fade-in">
    <div class="table-header">
      <div class="table-title">
        Detalle de Ventas · <span id="detailTitle">TODOS</span>
      </div>
      <div class="table-count" id="detailCount">0 registros</div>
    </div>
    
    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Comercio</th>
            <th>Ejecutivo</th>
            <th>Fecha</th>
            <th>GPV M0</th>
            <th>TRX M0</th>
            <th>GPV M1</th>
            <th>TRX M1</th>
            <th>Estado</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>
  
  <!-- FOOTER -->
  <div class="footer">
    <p>© 2026 Dashboard de Ventas · Los datos se actualizan cada 5 minutos</p>
  </div>
</div>

<!-- LIBRERÍAS PARA PDF Y EXCEL -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

<script>
// CONFIGURACIÓN
const URL_API = 'https://script.google.com/macros/s/AKfycbwTIebLiwhrLCrDxbbAatiMjHf1EyRgh5lkZ1d59wq_NbmPv7cFsQsgLf5POxtixJhz/exec';
const META_VENTAS = 10;

let DATA = [];
let EXEC_LIST = [];
let MESES_DISPONIBLES = [];
let currentMonth = "";
let currentExec = "TODOS";
let darkMode = true;

// ============================================
// FUNCIONES DE TEMA
// ============================================
function toggleTheme() {
  const body = document.body;
  const themeBtn = document.getElementById('themeToggle');
  
  darkMode = !darkMode;
  
  if (darkMode) {
    body.classList.remove('light-theme');
    themeBtn.innerHTML = '<span>🌙</span> Modo Oscuro';
  } else {
    body.classList.add('light-theme');
    themeBtn.innerHTML = '<span>☀️</span> Modo Claro';
  }
  
  localStorage.setItem('darkMode', darkMode);
}

function cargarTema() {
  const saved = localStorage.getItem('darkMode');
  if (saved !== null) {
    darkMode = saved === 'true';
    if (!darkMode) {
      document.body.classList.add('light-theme');
      document.getElementById('themeToggle').innerHTML = '<span>☀️</span> Modo Claro';
    }
  }
}

// ============================================
// CARGA DE DATOS
// ============================================
async function cargarDatos(forzar = false) {
  const loading = document.getElementById('loading');
  const loadingText = document.getElementById('loadingText');
  const mainContent = document.getElementById('mainContent');
  
  loading.style.display = 'flex';
  mainContent.style.display = 'none';
  
  try {
    loadingText.textContent = 'Conectando con Google Sheets...';
    
    const response = await fetch(URL_API);
    const respuesta = await response.json();
    
    if (respuesta.error) throw new Error(respuesta.error);
    
    loadingText.textContent = 'Procesando datos...';
    
    DATA = respuesta.datos;
    EXEC_LIST = respuesta.ejecutivos;
    MESES_DISPONIBLES = respuesta.meses;
    
    // Procesar fechas
    DATA = DATA.map(item => {
      if (item.fecha && item.fecha.includes('GMT')) {
        const fecha = new Date(item.fecha);
        const año = fecha.getFullYear();
        const mes = String(fecha.getMonth() + 1).padStart(2, '0');
        const dia = String(fecha.getDate()).padStart(2, '0');
        item.fecha = `${año}-${mes}-${dia}`;
      }
      
      // Redondear números
      item.gpv_m0 = Number(item.gpv_m0?.toFixed(2) || 0);
      item.gpv_m1 = Number(item.gpv_m1?.toFixed(2) || 0);
      item.trx_m0 = Number(item.trx_m0 || 0);
      item.trx_m1 = Number(item.trx_m1 || 0);
      
      return item;
    });
    
    // Ordenar meses
    const ordenMeses = ['ENERO', 'FEBRERO', 'MARZO', 'ABRIL', 'MAYO', 'JUNIO', 
                       'JULIO', 'AGOSTO', 'SETIEMBRE', 'OCTUBRE', 'NOVIEMBRE', 'DICIEMBRE'];
    MESES_DISPONIBLES.sort((a, b) => ordenMeses.indexOf(a) - ordenMeses.indexOf(b));
    
    currentMonth = MESES_DISPONIBLES[MESES_DISPONIBLES.length - 1];
    
    inicializarFiltros();
    renderizarTodo();
    
    loading.style.display = 'none';
    mainContent.style.display = 'block';
    
  } catch (error) {
    loadingText.textContent = 'Error: ' + error.message;
    console.error(error);
  }
}

function inicializarFiltros() {
  // Tabs de meses
  const monthTabs = document.getElementById('monthTabs');
  monthTabs.innerHTML = '';
  
  MESES_DISPONIBLES.forEach(mes => {
    const btn = document.createElement('button');
    btn.className = `month-tab ${mes === currentMonth ? 'active' : ''}`;
    btn.textContent = mes;
    btn.onclick = () => setMonth(mes);
    monthTabs.appendChild(btn);
  });
  
  // Select de ejecutivos
  const select = document.getElementById('execSelect');
  select.innerHTML = '<option value="TODOS">Todos los ejecutivos</option>';
  EXEC_LIST.forEach(exec => {
    select.innerHTML += `<option value="${exec}">${exec}</option>`;
  });
}

// ============================================
// FUNCIONES DE ESTADO Y CÁLCULO
// ============================================
function getStatus(row) {
  const gpv = row.mes === currentMonth ? row.gpv_m0 : row.gpv_m1;
  const trx = row.mes === currentMonth ? row.trx_m0 : row.trx_m1;
  
  if (gpv >= 700 && trx >= 5) return 'activo';
  if (gpv >= 700 || trx >= 5) return 'parcial';
  return 'inactivo';
}

function getExecStats(exec) {
  const rows = DATA.filter(r => r.mes === currentMonth && r.exec === exec);
  const activos = rows.filter(r => getStatus(r) === 'activo').length;
  const parciales = rows.filter(r => getStatus(r) === 'parcial').length;
  
  return {
    count: rows.length,
    activos,
    parciales,
    inactivos: rows.length - activos - parciales
  };
}

function calcularKPIs() {
  let rows = DATA.filter(r => r.mes === currentMonth);
  if (currentExec !== 'TODOS') rows = rows.filter(r => r.exec === currentExec);
  
  const totalGPV = rows.reduce((sum, r) => sum + r.gpv_m0, 0);
  const totalTRX = rows.reduce((sum, r) => sum + r.trx_m0, 0);
  const ticketPromedio = totalTRX > 0 ? totalGPV / totalTRX : 0;
  const ejecutivosUnicos = new Set(rows.map(r => r.exec)).size;
  
  return { totalGPV, totalTRX, ticketPromedio, ejecutivosUnicos };
}

// ============================================
// RENDERIZADO
// ============================================
function renderizarTodo() {
  renderKPIs();
  renderExecCards();
  renderTable();
}

function renderKPIs() {
  const kpis = calcularKPIs();
  const grid = document.getElementById('kpiCards');
  
  grid.innerHTML = `
    <div class="kpi-card">
      <div class="kpi-header">
        <div class="kpi-icon">💰</div>
        <div class="kpi-title">GPV Total</div>
      </div>
      <div class="kpi-value">S/ ${formatNumber(kpis.totalGPV)}</div>
      <div class="kpi-label">Volumen de ventas</div>
    </div>
    
    <div class="kpi-card">
      <div class="kpi-header">
        <div class="kpi-icon">🛒</div>
        <div class="kpi-title">Transacciones</div>
      </div>
      <div class="kpi-value">${formatNumber(kpis.totalTRX)}</div>
      <div class="kpi-label">Total de operaciones</div>
    </div>
    
    <div class="kpi-card">
      <div class="kpi-header">
        <div class="kpi-icon">🎫</div>
        <div class="kpi-title">Ticket Promedio</div>
      </div>
      <div class="kpi-value">S/ ${formatNumber(kpis.ticketPromedio)}</div>
      <div class="kpi-label">Por transacción</div>
    </div>
    
    <div class="kpi-card">
      <div class="kpi-header">
        <div class="kpi-icon">👥</div>
        <div class="kpi-title">Ejecutivos</div>
      </div>
      <div class="kpi-value">${kpis.ejecutivosUnicos}</div>
      <div class="kpi-label">Con ventas este mes</div>
    </div>
  `;
}

function renderExecCards() {
  const grid = document.getElementById('execGrid');
  grid.innerHTML = '';
  
  EXEC_LIST.forEach(exec => {
    const stats = getExecStats(exec);
    const pct = Math.min(100, Math.round((stats.count / META_VENTAS) * 100));
    const selectedClass = currentExec === exec ? 'selected' : '';
    
    grid.innerHTML += `
      <div class="exec-card ${selectedClass}" onclick="selectExec('${exec.replace(/'/g, "\\'")}')">
        <div class="exec-name">${exec}</div>
        <div class="exec-stats">
          <span class="exec-count">${stats.count}</span>
          <span class="exec-label">ventas</span>
        </div>
        
        <div class="progress-container">
          <div class="progress-header">
            <span>Meta: ${META_VENTAS} ventas</span>
            <span>${pct}%</span>
          </div>
          <div class="progress-bar">
            <div class="progress-fill" style="width: ${pct}%"></div>
          </div>
        </div>
        
        <div class="status-badges">
          <div class="badge badge-green">✅ ${stats.activos}</div>
          <div class="badge badge-orange">🟠 ${stats.parciales}</div>
          <div class="badge badge-red">❌ ${stats.inactivos}</div>
        </div>
      </div>
    `;
  });
}

function renderTable() {
  let rows = DATA.filter(r => r.mes === currentMonth);
  if (currentExec !== 'TODOS') rows = rows.filter(r => r.exec === currentExec);
  
  document.getElementById('detailTitle').textContent = currentExec === 'TODOS' ? 'Todos los ejecutivos' : currentExec;
  document.getElementById('detailCount').textContent = `${rows.length} registros`;
  
  const tbody = document.getElementById('tableBody');
  if (rows.length === 0) {
    tbody.innerHTML = '<tr><td colspan="9" style="text-align:center; padding:40px;">No hay registros para mostrar</td></tr>';
    return;
  }
  
  tbody.innerHTML = rows.map((r, i) => {
    const status = getStatus(r);
    const gpvClass = r.gpv_m0 >= 700 ? 'amount-positive' : 'amount-negative';
    const trxClass = r.trx_m0 >= 5 ? 'amount-positive' : 'amount-negative';
    
    let statusClass = 'status-inactive';
    let statusDot = 'dot-red';
    if (status === 'activo') {
      statusClass = 'status-active';
      statusDot = 'dot-green';
    } else if (status === 'parcial') {
      statusClass = 'status-partial';
      statusDot = 'dot-orange';
    }
    
    return `<tr>
      <td>${i + 1}</td>
      <td><strong>${r.comercio}</strong></td>
      <td>${r.exec}</td>
      <td>${r.fecha.split('-').reverse().join('/')}</td>
      <td class="amount ${gpvClass}">S/ ${formatNumber(r.gpv_m0)}</td>
      <td class="amount ${trxClass}">${formatNumber(r.trx_m0)}</td>
      <td class="amount">S/ ${formatNumber(r.gpv_m1)}</td>
      <td class="amount">${formatNumber(r.trx_m1)}</td>
      <td><span class="status-indicator ${statusClass}"><span class="dot ${statusDot}"></span> ${status.toUpperCase()}</span></td>
    </tr>`;
  }).join('');
}

function formatNumber(num) {
  if (num === undefined || num === null) return '0';
  return num.toLocaleString('es-PE', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

// ============================================
// MANEJO DE FILTROS
// ============================================
function setMonth(month) {
  currentMonth = month;
  document.querySelectorAll('.month-tab').forEach(t => {
    t.classList.toggle('active', t.textContent === month);
  });
  renderizarTodo();
}

function setExec(val) {
  currentExec = val;
  renderizarTodo();
}

function selectExec(exec) {
  currentExec = currentExec === exec ? 'TODOS' : exec;
  document.getElementById('execSelect').value = currentExec;
  renderizarTodo();
}

// ============================================
// EXPORTACIONES
// ============================================
function descargarExcel() {
  let rows = DATA.filter(r => r.mes === currentMonth);
  if (currentExec !== 'TODOS') rows = rows.filter(r => r.exec === currentExec);
  
  const excelData = rows.map((r, i) => ({
    '#': i + 1,
    'Comercio': r.comercio,
    'Ejecutivo': r.exec,
    'Fecha': r.fecha.split('-').reverse().join('/'),
    'GPV M0 (S/)': r.gpv_m0,
    'TRX M0': r.trx_m0,
    'GPV M1 (S/)': r.gpv_m1,
    'TRX M1': r.trx_m1,
    'Estado': getStatus(r).toUpperCase()
  }));
  
  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.json_to_sheet(excelData);
  
  ws['!cols'] = [
    { wch: 5 },   // #
    { wch: 40 },  // Comercio
    { wch: 30 },  // Ejecutivo
    { wch: 12 },  // Fecha
    { wch: 15 },  // GPV M0
    { wch: 10 },  // TRX M0
    { wch: 15 },  // GPV M1
    { wch: 10 },  // TRX M1
    { wch: 12 }   // Estado
  ];
  
  XLSX.utils.book_append_sheet(wb, ws, 'Ventas');
  
  const fecha = new Date().toISOString().split('T')[0];
  const ejecutivo = currentExec === 'TODOS' ? 'todos' : currentExec.replace(/\s+/g, '_');
  XLSX.writeFile(wb, `ventas_${currentMonth}_${ejecutivo}_${fecha}.xlsx`);
}

function descargarPDF() {
  let rows = DATA.filter(r => r.mes === currentMonth);
  if (currentExec !== 'TODOS') rows = rows.filter(r => r.exec === currentExec);
  
  const kpis = calcularKPIs();
  
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF('landscape');
  
  // Título
  doc.setFontSize(20);
  doc.setTextColor(14, 165, 233);
  doc.text('Reporte de Ventas', 14, 15);
  
  // Subtítulo
  doc.setFontSize(12);
  doc.setTextColor(100, 116, 139);
  const titulo = currentExec === 'TODOS' ? 'Todos los ejecutivos' : currentExec;
  doc.text(`${titulo} - ${currentMonth} 2026`, 14, 25);
  
  // Resumen
  doc.setFontSize(10);
  doc.setTextColor(0, 0, 0);
  doc.text(`GPV Total: S/ ${formatNumber(kpis.totalGPV)}`, 14, 35);
  doc.text(`Transacciones: ${formatNumber(kpis.totalTRX)}`, 14, 42);
  doc.text(`Ticket Promedio: S/ ${formatNumber(kpis.ticketPromedio)}`, 14, 49);
  doc.text(`Registros: ${rows.length}`, 14, 56);
  
  // Fecha
  const fechaGen = new Date().toLocaleString('es-PE');
  doc.text(`Generado: ${fechaGen}`, 14, 63);
  
  // Tabla
  const tableData = rows.map((r, i) => [
    i + 1,
    r.comercio,
    r.exec,
    r.fecha.split('-').reverse().join('/'),
    `S/ ${r.gpv_m0.toFixed(2)}`,
    r.trx_m0,
    `S/ ${r.gpv_m1.toFixed(2)}`,
    r.trx_m1,
    getStatus(r).toUpperCase()
  ]);
  
  doc.autoTable({
    startY: 70,
    head: [['#', 'Comercio', 'Ejecutivo', 'Fecha', 'GPV M0', 'TRX M0', 'GPV M1', 'TRX M1', 'Estado']],
    body: tableData,
    theme: 'striped',
    headStyles: { fillColor: [14, 165, 233] },
    styles: { fontSize: 8 },
    columnStyles: {
      0: { cellWidth: 8 },
      1: { cellWidth: 45 },
      2: { cellWidth: 35 },
      3: { cellWidth: 20 },
      4: { cellWidth: 22 },
      5: { cellWidth: 15 },
      6: { cellWidth: 22 },
      7: { cellWidth: 15 },
      8: { cellWidth: 18 }
    }
  });
  
  const ejecutivo = currentExec === 'TODOS' ? 'todos' : currentExec.replace(/\s+/g, '_');
  const fecha = new Date().toISOString().split('T')[0];
  doc.save(`ventas_${currentMonth}_${ejecutivo}_${fecha}.pdf`);
}

// ============================================
// INICIALIZACIÓN
// ============================================
window.onload = function() {
  cargarTema();
  cargarDatos();
  
  // Auto-refresh cada 5 minutos
  setInterval(() => cargarDatos(true), 300000);
};
</script>

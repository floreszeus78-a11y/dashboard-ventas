<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard de Ventas - Punto de Venta</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  :root {
    /* Tema Oscuro (Default) */
    --bg-primary: #0a0e1a;
    --bg-secondary: #111827;
    --bg-tertiary: #1e293b;
    --border: #1e2d45;
    --text-primary: #f1f5f9;
    --text-secondary: #94a3b8;
    --accent: #0ea5e9;
    --accent-gradient: linear-gradient(135deg, #0ea5e9, #7c3aed);
    
    /* Estados GPV */
    --gpv-excelente: #22c55e;
    --gpv-bueno: #f97316;
    --gpv-bajo: #64748b;
    --gpv-inactivo: #ef4444;
    
    /* Sombras */
    --shadow: 0 4px 20px rgba(0,0,0,0.5);
    --shadow-lg: 0 10px 40px rgba(0,0,0,0.6);
  }

  [data-theme="light"] {
    --bg-primary: #f8fafc;
    --bg-secondary: #ffffff;
    --bg-tertiary: #f1f5f9;
    --border: #e2e8f0;
    --text-primary: #0f172a;
    --text-secondary: #64748b;
    --accent: #0284c7;
    --accent-gradient: linear-gradient(135deg, #0284c7, #6d28d9);
    --shadow: 0 4px 20px rgba(0,0,0,0.1);
    --shadow-lg: 0 10px 40px rgba(0,0,0,0.15);
    
    --gpv-excelente: #16a34a;
    --gpv-bueno: #ea580c;
    --gpv-bajo: #475569;
    --gpv-inactivo: #dc2626;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; transition: background-color 0.3s, color 0.3s; }
  
  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
  }

  /* Header */
  .header {
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    padding: 20px 32px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: var(--shadow);
  }

  .brand h1 {
    font-size: 26px;
    font-weight: 800;
    background: var(--accent-gradient);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 4px;
  }

  .brand p {
    color: var(--text-secondary);
    font-size: 13px;
    font-weight: 500;
  }

  .controls {
    display: flex;
    gap: 12px;
    align-items: center;
  }

  .btn {
    padding: 10px 20px;
    border-radius: 12px;
    font-weight: 600;
    font-size: 13px;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--bg-tertiary);
    color: var(--text-primary);
    transition: all 0.3s;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }

  .btn:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow);
    border-color: var(--accent);
  }

  .btn-primary {
    background: var(--accent-gradient);
    color: white;
    border: none;
  }

  .theme-toggle {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--bg-tertiary);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
  }

  /* Layout */
  .container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 24px;
  }

  /* Filtros */
  .filters-card {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 24px;
    box-shadow: var(--shadow);
  }

  .filters-row {
    display: flex;
    gap: 20px;
    align-items: center;
    flex-wrap: wrap;
  }

  .filter-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .filter-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    color: var(--text-secondary);
    letter-spacing: 0.5px;
  }

  .filter-tabs {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .tab {
    padding: 8px 16px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--bg-tertiary);
    font-weight: 600;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .tab:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .tab.active {
    background: var(--accent-gradient);
    color: white;
    border: none;
  }

  select {
    padding: 8px 16px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--bg-tertiary);
    color: var(--text-primary);
    font-size: 13px;
    cursor: pointer;
    min-width: 200px;
  }

  /* KPI Cards */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
  }

  .kpi-card {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    box-shadow: var(--shadow);
    position: relative;
    overflow: hidden;
  }

  .kpi-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 4px;
    height: 100%;
    background: var(--accent-gradient);
  }

  .kpi-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .kpi-value {
    font-size: 32px;
    font-weight: 800;
    color: var(--text-primary);
    margin-bottom: 4px;
  }

  .kpi-detail {
    font-size: 13px;
    color: var(--text-secondary);
    font-weight: 500;
  }

  /* Charts Section */
  .charts-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
    gap: 20px;
    margin-bottom: 24px;
  }

  .chart-card {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    box-shadow: var(--shadow);
  }

  .chart-title {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 16px;
    color: var(--text-primary);
  }

  .chart-container {
    position: relative;
    height: 300px;
  }

  /* Tabla Mejorada */
  .table-card {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  .table-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .table-title {
    font-size: 18px;
    font-weight: 700;
  }

  .search-box {
    padding: 10px 16px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--bg-tertiary);
    color: var(--text-primary);
    width: 300px;
    font-size: 13px;
  }

  .search-box::placeholder {
    color: var(--text-secondary);
  }

  .table-container {
    overflow-x: auto;
    border-radius: 12px;
    border: 1px solid var(--border);
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  thead {
    background: var(--bg-tertiary);
  }

  th {
    padding: 14px 16px;
    text-align: left;
    font-weight: 700;
    text-transform: uppercase;
    font-size: 11px;
    color: var(--text-secondary);
    letter-spacing: 0.5px;
    white-space: nowrap;
  }

  td {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    color: var(--text-primary);
  }

  tr:hover td {
    background: var(--bg-tertiary);
  }

  tr:last-child td {
    border-bottom: none;
  }

  /* Badges y Colores GPV */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
  }

  .badge-estado-activo { background: rgba(34,197,94,0.15); color: var(--gpv-excelente); }
  .badge-estado-regular { background: rgba(249,115,22,0.15); color: var(--gpv-bueno); }
  .badge-estado-inactivo { background: rgba(239,68,68,0.15); color: var(--gpv-inactivo); }

  /* Color coding GPV */
  .gpv-excelente { color: var(--gpv-excelente); font-weight: 700; }
  .gpv-bueno { color: var(--gpv-bueno); font-weight: 700; }
  .gpv-bajo { color: var(--gpv-bajo); font-weight: 600; }
  .gpv-inactivo { color: var(--gpv-inactivo); font-weight: 700; }

  .gpv-cell {
    font-family: 'Courier New', monospace;
    font-size: 14px;
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    display: inline-block;
  }

  .dot-green { background: var(--gpv-excelente); }
  .dot-orange { background: var(--gpv-bueno); }
  .dot-gray { background: var(--gpv-bajo); }
  .dot-red { background: var(--gpv-inactivo); }

  /* Info del comercio */
  .comercio-info {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .comercio-nombre {
    font-weight: 700;
    color: var(--text-primary);
  }

  .comercio-serie {
    font-size: 11px;
    color: var(--text-secondary);
    font-family: monospace;
  }

  .multi-equipo {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: var(--accent-gradient);
    color: white;
    padding: 2px 8px;
    border-radius: 12px;
    font-size: 10px;
    font-weight: 700;
    margin-left: 8px;
  }

  /* Loading */
  .loading {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: var(--bg-primary);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    gap: 20px;
  }

  .spinner {
    width: 50px;
    height: 50px;
    border: 4px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Responsive */
  @media (max-width: 768px) {
    .charts-grid { grid-template-columns: 1fr; }
    .filters-row { flex-direction: column; align-items: stretch; }
    .search-box { width: 100%; }
    .header { flex-direction: column; gap: 16px; }
  }
</style>
</head>
<body>

<div class="loading" id="loading">
  <div class="spinner"></div>
  <div style="color: var(--text-secondary); font-weight: 500;">Cargando dashboard...</div>
</div>

<header class="header">
  <div class="brand">
    <h1>📊 Dashboard de Ventas</h1>
    <p>Punto de Venta · Cada fila = 1 equipo</p>
  </div>
  <div class="controls">
    <button class="btn" onclick="exportarExcel()">📥 Exportar</button>
    <button class="btn btn-primary" onclick="cargarDatos(true)">🔄 Actualizar</button>
    <button class="theme-toggle" onclick="toggleTheme()" title="Cambiar tema">🌓</button>
  </div>
</header>

<main class="container" id="mainContent" style="display: none;">
  
  <!-- Filtros -->
  <div class="filters-card">
    <div class="filters-row">
      <div class="filter-group">
        <span class="filter-label">📅 Período</span>
        <div class="filter-tabs" id="monthTabs">
          <button class="tab active" onclick="cambiarMes('TODOS')">Todos</button>
        </div>
      </div>
      
      <div class="filter-group">
        <span class="filter-label">👤 Ejecutivo</span>
        <select id="execSelect" onchange="cambiarEjecutivo(this.value)">
          <option value="TODOS">Todos los ejecutivos</option>
        </select>
      </div>

      <div class="filter-group">
        <span class="filter-label">🎨 Estado GPV</span>
        <div style="display: flex; gap: 12px; font-size: 12px;">
          <span style="display: flex; align-items: center; gap: 4px;"><span class="dot dot-green"></span> ≥700</span>
          <span style="display: flex; align-items: center; gap: 4px;"><span class="dot dot-orange"></span> 400-699</span>
          <span style="display: flex; align-items: center; gap: 4px;"><span class="dot dot-gray"></span> 1-399</span>
          <span style="display: flex; align-items: center; gap: 4px;"><span class="dot dot-red"></span> 0</span>
        </div>
      </div>
    </div>
  </div>

  <!-- KPIs -->
  <div class="kpi-grid" id="kpiGrid"></div>

  <!-- Gráficas -->
  <div class="charts-grid">
    <div class="chart-card">
      <div class="chart-title">📈 GPV por Ejecutivo</div>
      <div class="chart-container">
        <canvas id="chartEjecutivos"></canvas>
      </div>
    </div>
    <div class="chart-card">
      <div class="chart-title">🎯 Distribución por Rangos GPV</div>
      <div class="chart-container">
        <canvas id="chartDistribucion"></canvas>
      </div>
    </div>
  </div>

  <!-- Tabla Simplificada -->
  <div class="table-card">
    <div class="table-header">
      <div class="table-title">📋 Detalle de Equipos <span id="countBadge" style="background: var(--bg-tertiary); padding: 4px 12px; border-radius: 20px; font-size: 13px; margin-left: 8px;">0</span></div>
      <input type="text" class="search-box" id="searchInput" placeholder="🔍 Buscar comercio, serie o RUC..." onkeyup="filtrarTabla()">
    </div>
    
    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>Comercio</th>
            <th>Ejecutivo</th>
            <th style="text-align: right;">GPV M0</th>
            <th style="text-align: center;">TRX</th>
            <th>Última Transacción</th>
            <th style="text-align: center;">Estado</th>
          </tr>
        </thead>
        <tbody id="tablaCuerpo"></tbody>
      </table>
    </div>
  </div>
</main>

<script>
// Configuración
const URL_API = 'https://script.google.com/macros/s/AKfycbwD_CP5UvEQiF5nPU2TTmHDrqwQ5xo6TkeaOsrS9XByeThAm6M6pxsZgQuLb0EfYyKW/exec';
let DATOS_COMPLETOS = null;
let mesActual = 'TODOS';
let ejecutivoActual = 'TODOS';
let chartEjecutivos = null;
let chartDistribucion = null;

// Tema
function toggleTheme() {
  const html = document.documentElement;
  const current = html.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
}

// Cargar tema guardado
const savedTheme = localStorage.getItem('theme') || 'dark';
document.documentElement.setAttribute('data-theme', savedTheme);

// Color coding GPV
function getGPVClass(gpv) {
  if (!gpv || gpv === 0) return 'gpv-inactivo';
  if (gpv >= 700) return 'gpv-excelente';
  if (gpv >= 400) return 'gpv-bueno';
  return 'gpv-bajo';
}

function getGPVDot(gpv) {
  if (!gpv || gpv === 0) return 'dot-red';
  if (gpv >= 700) return 'dot-green';
  if (gpv >= 400) return 'dot-orange';
  return 'dot-gray';
}

// Carga de datos
async function cargarDatos(forzar = false) {
  const loading = document.getElementById('loading');
  const main = document.getElementById('mainContent');
  
  loading.style.display = 'flex';
  main.style.display = 'none';
  
  try {
    const res = await fetch(URL_API);
    DATOS_COMPLETOS = await res.json();
    
    if (DATOS_COMPLETOS.error) throw new Error(DATOS_COMPLETOS.mensaje);
    
    inicializarFiltros();
    renderizarTodo();
    
    loading.style.display = 'none';
    main.style.display = 'block';
    
  } catch (err) {
    document.getElementById('loading').innerHTML = `
      <div style="color: var(--gpv-inactivo); text-align: center; padding: 20px;">
        <div style="font-size: 48px; margin-bottom: 16px;">❌</div>
        <div style="font-weight: 700; margin-bottom: 8px;">Error al cargar</div>
        <div style="color: var(--text-secondary);">${err.message}</div>
      </div>`;
  }
}

function inicializarFiltros() {
  // Meses
  const tabs = document.getElementById('monthTabs');
  tabs.innerHTML = '<button class="tab active" onclick="cambiarMes(\'TODOS\')">Todos</button>';
  DATOS_COMPLETOS.meses_disponibles?.forEach(mes => {
    tabs.innerHTML += `<button class="tab" onclick="cambiarMes('${mes}')">${mes}</button>`;
  });
  
  // Ejecutivos
  const select = document.getElementById('execSelect');
  select.innerHTML = '<option value="TODOS">Todos los ejecutivos</option>';
  DATOS_COMPLETOS.ejecutivos?.forEach(exec => {
    select.innerHTML += `<option value="${exec}">${exec}</option>`;
  });
}

function renderizarTodo() {
  renderizarKPIs();
  renderizarGraficas();
  renderizarTabla();
}

function renderizarKPIs() {
  let equipos = getEquiposFiltrados();
  
  const totalGPV = equipos.reduce((sum, e) => sum + (e.gpv_mes_actual || 0), 0);
  const totalTRX = equipos.reduce((sum, e) => sum + (e.transacciones_mes_actual || 0), 0);
  
  const rangos = {
    excelente: equipos.filter(e => (e.gpv_mes_actual || 0) >= 700).length,
    bueno: equipos.filter(e => { const g = e.gpv_mes_actual || 0; return g >= 400 && g < 700 }).length,
    bajo: equipos.filter(e => { const g = e.gpv_mes_actual || 0; return g > 0 && g < 400 }).length,
    inactivo: equipos.filter(e => !e.gpv_mes_actual || e.gpv_mes_actual === 0).length
  };
  
  document.getElementById('kpiGrid').innerHTML = `
    <div class="kpi-card">
      <div class="kpi-label">Total Equipos</div>
      <div class="kpi-value">${equipos.length}</div>
      <div class="kpi-detail">Equipos activos en período</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">GPV Total</div>
      <div class="kpi-value">S/ ${formatearNumero(totalGPV)}</div>
      <div class="kpi-detail">Generado este mes</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Transacciones</div>
      <div class="kpi-value">${formatearNumero(totalTRX, 0)}</div>
      <div class="kpi-detail">Ticket promedio: S/ ${totalTRX > 0 ? formatearNumero(totalGPV/totalTRX) : '0.00'}</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Rendimiento</div>
      <div class="kpi-value" style="color: var(--gpv-excelente);">${rangos.excelente}</div>
      <div class="kpi-detail">Equipos ≥ S/ 700</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Atención</div>
      <div class="kpi-value" style="color: var(--gpv-inactivo);">${rangos.inactivo}</div>
      <div class="kpi-detail">Equipos sin ventas (0 GPV)</div>
    </div>
  `;
}

function renderizarGraficas() {
  const equipos = getEquiposFiltrados();
  
  // Datos por ejecutivo
  const porEjecutivo = {};
  equipos.forEach(e => {
    const exec = e.responsable_real || 'Sin asignar';
    if (!porEjecutivo[exec]) porEjecutivo[exec] = 0;
    porEjecutivo[exec] += e.gpv_mes_actual || 0;
  });
  
  // Destruir gráficas anteriores
  if (chartEjecutivos) chartEjecutivos.destroy();
  if (chartDistribucion) chartDistribucion.destroy();
  
  // Gráfica 1: GPV por Ejecutivo
  const ctx1 = document.getElementById('chartEjecutivos').getContext('2d');
  chartEjecutivos = new Chart(ctx1, {
    type: 'bar',
    data: {
      labels: Object.keys(porEjecutivo),
      datasets: [{
        label: 'GPV (S/)',
        data: Object.values(porEjecutivo),
        backgroundColor: 'rgba(14, 165, 233, 0.8)',
        borderRadius: 8,
        borderSkipped: false
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false }
      },
      scales: {
        y: {
          beginAtZero: true,
          grid: { color: 'rgba(148, 163, 184, 0.1)' },
          ticks: { color: 'var(--text-secondary)' }
        },
        x: {
          grid: { display: false },
          ticks: { color: 'var(--text-secondary)' }
        }
      }
    }
  });
  
  // Gráfica 2: Distribución por rangos
  const rangos = [
    equipos.filter(e => (e.gpv_mes_actual || 0) >= 700).length,
    equipos.filter(e => { const g = e.gpv_mes_actual || 0; return g >= 400 && g < 700 }).length,
    equipos.filter(e => { const g = e.gpv_mes_actual || 0; return g > 0 && g < 400 }).length,
    equipos.filter(e => !e.gpv_mes_actual || e.gpv_mes_actual === 0).length
  ];
  
  const ctx2 = document.getElementById('chartDistribucion').getContext('2d');
  chartDistribucion = new Chart(ctx2, {
    type: 'doughnut',
    data: {
      labels: ['≥ S/ 700 (Excelente)', 'S/ 400-699 (Bueno)', 'S/ 1-399 (Bajo)', 'S/ 0 (Inactivo)'],
      datasets: [{
        data: rangos,
        backgroundColor: [
          'var(--gpv-excelente)',
          'var(--gpv-bueno)',
          'var(--gpv-bajo)',
          'var(--gpv-inactivo)'
        ],
        borderWidth: 0
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {
          position: 'bottom',
          labels: { color: 'var(--text-secondary)', padding: 20 }
        }
      }
    }
  });
}

function renderizarTabla() {
  let equipos = getEquiposFiltrados();
  
  // Buscar comercios con múltiples equipos para marcarlos
  const comerciosCount = {};
  equipos.forEach(e => {
    const key = `${e.ruc}_${e.comercio}`;
    comerciosCount[key] = (comerciosCount[key] || 0) + 1;
  });
  
  const tbody = document.getElementById('tablaCuerpo');
  document.getElementById('countBadge').textContent = equipos.length;
  
  if (equipos.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 40px; color: var(--text-secondary);">No hay equipos para mostrar</td></tr>';
    return;
  }
  
  tbody.innerHTML = equipos.map(eq => {
    const gpv = eq.gpv_mes_actual || 0;
    const gpvClass = getGPVClass(gpv);
    const gpvDot = getGPVDot(gpv);
    const esMulti = comerciosCount[`${eq.ruc}_${eq.comercio}`] > 1;
    
    // Badge de estado basado en última transacción
    let estadoBadge = '<span class="badge badge-estado-inactivo">● Sin datos</span>';
    if (eq.estado === 'ACTIVO') estadoBadge = '<span class="badge badge-estado-activo">● Activo</span>';
    else if (eq.estado === 'REGULAR') estadoBadge = '<span class="badge badge-estado-regular">● Regular</span>';
    else if (eq.estado === 'INACTIVO') estadoBadge = '<span class="badge badge-estado-inactivo">● Inactivo</span>';
    
    return `
      <tr>
        <td>
          <div class="comercio-info">
            <div class="comercio-nombre">
              ${eq.comercio || 'Sin nombre'}
              ${esMulti ? '<span class="multi-equipo" title="Comercio con múltiples equipos">+' + (comerciosCount[`${eq.ruc}_${eq.comercio}`] - 1) + '</span>' : ''}
            </div>
            <div class="comercio-serie">${eq.numero_serie || 'N/A'}</div>
            <div style="font-size: 11px; color: var(--text-secondary); margin-top: 2px;">RUC: ${eq.ruc || '-'}</div>
          </div>
        </td>
        <td>${eq.responsable_real || 'Sin asignar'}</td>
        <td style="text-align: right;" class="gpv-cell ${gpvClass}">
          <span class="dot ${gpvDot}" style="margin-right: 6px;"></span>
          S/ ${formatearNumero(gpv)}
        </td>
        <td style="text-align: center;">${eq.transacciones_mes_actual || 0}</td>
        <td>${formatearFecha(eq.ultima_transaccion) || '-'}</td>
        <td style="text-align: center;">${estadoBadge}</td>
      </tr>
    `;
  }).join('');
}

function getEquiposFiltrados() {
  let equipos = DATOS_COMPLETOS?.equipos || [];
  if (mesActual !== 'TODOS') equipos = equipos.filter(e => e.mes_venta === mesActual);
  if (ejecutivoActual !== 'TODOS') equipos = equipos.filter(e => e.responsable_real === ejecutivoActual);
  return equipos;
}

function filtrarTabla() {
  const texto = document.getElementById('searchInput').value.toLowerCase();
  const filas = document.querySelectorAll('#tablaCuerpo tr');
  
  filas.forEach(fila => {
    const contenido = fila.textContent.toLowerCase();
    fila.style.display = contenido.includes(texto) ? '' : 'none';
  });
}

function cambiarMes(mes) {
  mesActual = mes;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  renderizarTodo();
}

function cambiarEjecutivo(val) {
  ejecutivoActual = val;
  renderizarTodo();
}

function formatearNumero(num, dec = 2) {
  if (!num || isNaN(num)) return dec === 0 ? '0' : '0.00';
  return Number(num).toLocaleString('es-PE', { minimumFractionDigits: dec, maximumFractionDigits: dec });
}

function formatearFecha(fecha) {
  if (!fecha) return '';
  if (typeof fecha === 'string' && fecha.includes('-')) {
    const p = fecha.split('-');
    return `${p[2]}/${p[1]}/${p[0]}`;
  }
  return fecha;
}

function exportarExcel() {
  const equipos = getEquiposFiltrados();
  if (equipos.length === 0) return alert('No hay datos');
  
  const csv = [
    ['Comercio', 'Serie', 'Ejecutivo', 'RUC', 'GPV M0', 'TRX M0', 'Última TRX', 'Estado'].join(','),
    ...equipos.map(e => [
      `"${(e.comercio || '').replace(/"/g, '""')}"`,
      e.numero_serie,
      e.responsable_real,
      e.ruc,
      e.gpv_mes_actual || 0,
      e.transacciones_mes_actual || 0,
      e.ultima_transaccion || '',
      e.estado || 'SIN_DATOS'
    ].join(','))
  ].join('\n');
  
  const blob = new Blob(['\ufeff' + csv], { type: 'text/csv' });
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = `dashboard_ventas_${new Date().toISOString().split('T')[0]}.csv`;
  link.click();
}

window.onload = () => cargarDatos();
</script>
</body>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard de Ventas — Ejecutivos</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2236;
    --border: #1e2d45;
    --accent: #0ea5e9;
    --text: #e2e8f0;
    --muted: #64748b;
    --green: #22c55e;
    --green-bg: rgba(34,197,94,0.12);
    --yellow: #eab308;
    --yellow-bg: rgba(234,179,8,0.12);
    --red: #ef4444;
    --red-bg: rgba(239,68,68,0.12);
    --orange: #f97316;
    --orange-bg: rgba(249,115,22,0.12);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  header {
    background: linear-gradient(135deg, #0f172a 0%, #0a1628 100%);
    border-bottom: 1px solid var(--border);
    padding: 20px 32px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  header .logo-icon {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, var(--accent), #7c3aed);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
  }
  .container { padding: 28px 32px; max-width: 1400px; margin: 0 auto; }
  
  /* LOADING */
  .loading-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    gap: 20px;
  }
  .spinner {
    width: 50px;
    height: 50px;
    border: 3px solid var(--surface);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  
  /* FILTERS */
  .filters-row {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }
  .month-tabs { display: flex; gap: 6px; flex-wrap: wrap; }
  .month-tab {
    padding: 8px 20px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
  }
  .month-tab.active {
    background: linear-gradient(135deg, var(--accent), #0369a1);
    color: #fff;
  }
  
  /* EXECUTIVE SELECT */
  .exec-select-wrap {
    display: flex;
    align-items: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0 14px;
    height: 40px;
    min-width: 220px;
  }
  .exec-select-wrap select {
    background: transparent;
    border: none;
    color: var(--text);
    width: 100%;
    height: 100%;
    outline: none;
  }
  
  /* SUMMARY CARDS */
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 14px;
    margin-bottom: 28px;
  }
  .exec-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px;
    cursor: pointer;
    position: relative;
  }
  .exec-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    border-radius: 14px 14px 0 0;
  }
  .exec-card.status-green::before { background: var(--green); }
  .exec-card.status-yellow::before { background: var(--yellow); }
  .exec-card.status-red::before { background: var(--red); }
  .exec-card.selected { border-color: var(--accent); }
  
  .exec-card .exec-name {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 12px;
  }
  .exec-card .ventas-count {
    font-family: 'Syne', sans-serif;
    font-size: 36px;
    font-weight: 800;
  }
  
  /* TABLE */
  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow-x: auto;
  }
  table { width: 100%; border-collapse: collapse; min-width: 800px; }
  thead tr { background: var(--surface2); }
  thead th {
    padding: 12px 16px;
    text-align: left;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    color: var(--muted);
  }
  tbody td {
    padding: 12px 16px;
    border-top: 1px solid var(--border);
  }
  .td-green { color: var(--green); }
  .td-red { color: var(--red); }
  
  .refresh-btn {
    background: linear-gradient(135deg, var(--accent), #0369a1);
    border: none;
    color: white;
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'Syne', sans-serif;
  }
</style>
</head>
<body>

<div class="loading-overlay" id="loading">
  <div class="spinner"></div>
  <div class="loading-text" id="loadingText">Cargando datos...</div>
</div>

<header>
  <div class="logo-icon">📊</div>
  <h1>Dashboard de Ventas</h1>
</header>

<div class="container" id="mainContent" style="display: none;">
  <div class="filters-row">
    <div class="month-tabs" id="monthTabs"></div>
    <div class="exec-select-wrap">
      <select id="execSelect" onchange="setExec(this.value)">
        <option value="TODOS">(TODOS)</option>
      </select>
    </div>
    <button class="refresh-btn" onclick="cargarDatos(true)">🔄 Actualizar</button>
  </div>

  <div class="summary-grid" id="summaryGrid"></div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Comercio</th>
          <th>Ejecutivo</th>
          <th>Fecha</th>
          <th>GPV M0</th>
          <th>TRX M0</th>
          <th>Estado</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
</div>

<script>
// URL de la API - VERIFICADA Y FUNCIONANDO
const URL_API = 'https://script.google.com/macros/s/AKfycbwTIebLiwhrLCrDxbbAatiMjHf1EyRgh5lkZ1d59wq_NbmPv7cFsQsgLf5POxtixJhz/exec';

let DATA = [];
let EXEC_LIST = [];
let MESES_DISPONIBLES = [];
let currentMonth = "";
let currentExec = "TODOS";
const META_VENTAS = 10;

// Función principal de carga
async function cargarDatos(forzar = false) {
  const loading = document.getElementById('loading');
  const loadingText = document.getElementById('loadingText');
  const mainContent = document.getElementById('mainContent');
  
  loading.style.display = 'flex';
  mainContent.style.display = 'none';
  
  try {
    loadingText.textContent = 'Conectando con API...';
    
    const response = await fetch(URL_API);
    const respuesta = await response.json();
    
    if (respuesta.error) throw new Error(respuesta.error);
    
    loadingText.textContent = 'Procesando datos...';
    
    DATA = respuesta.datos;
    EXEC_LIST = respuesta.ejecutivos;
    MESES_DISPONIBLES = respuesta.meses;
    
    // Procesar fechas
    DATA = DATA.map(item => {
      if (item.fecha && item.fecha.includes('GMT')) {
        const fecha = new Date(item.fecha);
        item.fecha = fecha.toISOString().split('T')[0];
      }
      return item;
    });
    
    // Ordenar meses
    const ordenMeses = ['ENERO', 'FEBRERO', 'MARZO', 'ABRIL', 'MAYO', 'JUNIO', 
                       'JULIO', 'AGOSTO', 'SETIEMBRE', 'OCTUBRE', 'NOVIEMBRE', 'DICIEMBRE'];
    MESES_DISPONIBLES.sort((a, b) => ordenMeses.indexOf(a) - ordenMeses.indexOf(b));
    
    // Seleccionar último mes
    currentMonth = MESES_DISPONIBLES[MESES_DISPONIBLES.length - 1];
    
    inicializarFiltros();
    renderizarTodo();
    
    loading.style.display = 'none';
    mainContent.style.display = 'block';
    
  } catch (error) {
    loadingText.textContent = 'Error: ' + error.message;
    console.error(error);
  }
}

function inicializarFiltros() {
  // Tabs de meses
  const monthTabs = document.getElementById('monthTabs');
  monthTabs.innerHTML = '';
  
  MESES_DISPONIBLES.forEach(mes => {
    const btn = document.createElement('button');
    btn.className = `month-tab ${mes === currentMonth ? 'active' : ''}`;
    btn.textContent = mes;
    btn.onclick = () => setMonth(mes);
    monthTabs.appendChild(btn);
  });
  
  // Select de ejecutivos
  const select = document.getElementById('execSelect');
  select.innerHTML = '<option value="TODOS">(TODOS)</option>';
  EXEC_LIST.forEach(exec => {
    select.innerHTML += `<option value="${exec}">${exec}</option>`;
  });
}

function getStatus(row) {
  const gpv = row.mes === currentMonth ? row.gpv_m0 : row.gpv_m1;
  const trx = row.mes === currentMonth ? row.trx_m0 : row.trx_m1;
  
  if (gpv >= 700 && trx >= 5) return 'activo';
  if (gpv >= 700 || trx >= 5) return 'parcial';
  return 'inactivo';
}

function getExecStats(exec) {
  const rows = DATA.filter(r => r.mes === currentMonth && r.exec === exec);
  return {
    count: rows.length,
    activos: rows.filter(r => getStatus(r) === 'activo').length,
    parciales: rows.filter(r => getStatus(r) === 'parcial').length
  };
}

function renderizarTodo() {
  // Renderizar tarjetas
  const grid = document.getElementById('summaryGrid');
  grid.innerHTML = '';
  
  EXEC_LIST.forEach(exec => {
    const stats = getExecStats(exec);
    const pct = Math.min(100, Math.round((stats.count / META_VENTAS) * 100));
    
    let statusClass = 'status-red';
    if (stats.count >= META_VENTAS) statusClass = 'status-green';
    else if (stats.count >= 5) statusClass = 'status-yellow';
    
    const selectedClass = currentExec === exec ? 'selected' : '';
    
    grid.innerHTML += `
      <div class="exec-card ${statusClass} ${selectedClass}" onclick="selectExec('${exec}')">
        <div class="exec-name">${exec}</div>
        <div class="ventas-count">${stats.count}</div>
        <div style="font-size:11px; color:var(--muted)">ventas este mes</div>
        <div style="margin-top:10px">
          <div>Meta: ${pct}%</div>
          <div style="height:5px; background:var(--surface2); border-radius:4px;">
            <div style="width:${pct}%; height:100%; background:var(--green); border-radius:4px;"></div>
          </div>
        </div>
        <div style="display:flex; gap:10px; margin-top:10px; border-top:1px solid var(--border); padding-top:10px;">
          <div>✅ ${stats.activos}</div>
          <div>🟠 ${stats.parciales}</div>
          <div>❌ ${stats.count - stats.activos - stats.parciales}</div>
        </div>
      </div>
    `;
  });
  
  // Renderizar tabla
  let rows = DATA.filter(r => r.mes === currentMonth);
  if (currentExec !== 'TODOS') rows = rows.filter(r => r.exec === currentExec);
  
  const tbody = document.getElementById('tableBody');
  if (rows.length === 0) {
    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; padding:40px;">Sin registros</td></tr>';
    return;
  }
  
  tbody.innerHTML = rows.map((r, i) => {
    const status = getStatus(r);
    const statusColor = status === 'activo' ? 'green' : status === 'parcial' ? 'orange' : 'red';
    const gpvShow = r.mes === currentMonth ? r.gpv_m0 : r.gpv_m1;
    const trxShow = r.mes === currentMonth ? r.trx_m0 : r.trx_m1;
    
    return `<tr>
      <td>${i+1}</td>
      <td>${r.comercio}</td>
      <td>${r.exec}</td>
      <td>${r.fecha.split('-').reverse().join('/')}</td>
      <td class="${gpvShow >= 700 ? 'td-green' : 'td-red'}">S/ ${gpvShow.toFixed(2)}</td>
      <td class="${trxShow >= 5 ? 'td-green' : 'td-red'}">${trxShow}</td>
      <td style="color:var(--${statusColor})">● ${status.toUpperCase()}</td>
    </tr>`;
  }).join('');
}

function setMonth(month) {
  currentMonth = month;
  document.querySelectorAll('.month-tab').forEach(t => {
    t.classList.toggle('active', t.textContent === month);
  });
  renderizarTodo();
}

function setExec(val) {
  currentExec = val;
  renderizarTodo();
}

function selectExec(exec) {
  currentExec = currentExec === exec ? 'TODOS' : exec;
  document.getElementById('execSelect').value = currentExec;
  renderizarTodo();
}

// Iniciar
window.onload = () => cargarDatos();
</script>
</body>
</html>

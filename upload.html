<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Subir Reporte - Panel Ventas con IA</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
  :root {
    --fondo: #0a0e1a;
    --superficie: #111827;
    --superficie2: #1e293b;
    --borde: #1e2d45;
    --acento: #0ea5e9;
    --texto: #e2e8f0;
    --texto-suave: #94a3b8;
    --verde: #22c55e;
    --rojo: #ef4444;
    --amarillo: #eab308;
    --morado: #8b5cf6;
  }

  [data-theme="light"] {
    --fondo: #f8fafc;
    --superficie: #ffffff;
    --superficie2: #f1f5f9;
    --borde: #e2e8f0;
    --acento: #0284c7;
    --texto: #0f172a;
    --texto-suave: #64748b;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    font-family: 'Inter', sans-serif;
    background: var(--fondo);
    color: var(--texto);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .upload-container {
    max-width: 1000px;
    width: 100%;
    background: var(--superficie);
    border: 1px solid var(--borde);
    border-radius: 32px;
    padding: 40px;
  }

  .upload-icon {
    font-size: 80px;
    margin-bottom: 20px;
    text-align: center;
  }

  h1 {
    font-size: 28px;
    font-weight: 800;
    background: linear-gradient(135deg, var(--acento), var(--morado));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 12px;
    text-align: center;
  }

  .desc {
    color: var(--texto-suave);
    margin-bottom: 32px;
    line-height: 1.6;
    text-align: center;
  }

  .ai-badge {
    display: inline-block;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    margin-bottom: 16px;
    text-align: center;
    width: auto;
    margin-left: auto;
    margin-right: auto;
  }

  .drop-area {
    border: 2px dashed var(--borde);
    border-radius: 24px;
    padding: 40px;
    margin-bottom: 24px;
    transition: all 0.3s;
    cursor: pointer;
    text-align: center;
  }

  .drop-area.drag-over {
    border-color: var(--acento);
    background: var(--superficie2);
  }

  .file-input {
    display: none;
  }

  .file-label {
    display: inline-block;
    padding: 12px 24px;
    background: var(--superficie2);
    border-radius: 30px;
    cursor: pointer;
    font-weight: 600;
    margin-top: 16px;
  }

  .file-label:hover {
    background: var(--acento);
    color: white;
  }

  .selected-file {
    margin: 16px 0;
    padding: 12px;
    background: var(--superficie2);
    border-radius: 12px;
    font-size: 14px;
    display: none;
  }

  .selected-file.show {
    display: block;
  }

  .ai-preview {
    margin: 16px 0;
    padding: 20px;
    background: var(--superficie2);
    border-radius: 16px;
    display: none;
    text-align: left;
    max-height: 500px;
    overflow-y: auto;
  }

  .ai-preview.show {
    display: block;
  }

  .ai-preview h4 {
    color: var(--acento);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 18px;
  }

  .ai-stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
    margin-top: 12px;
  }

  .stat-card {
    background: var(--superficie);
    padding: 12px;
    border-radius: 12px;
    border-left: 3px solid var(--acento);
  }

  .stat-label {
    font-size: 11px;
    color: var(--texto-suave);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .stat-value {
    font-size: 20px;
    font-weight: 700;
    color: var(--texto);
    margin-top: 4px;
  }

  .warning-list {
    margin-top: 12px;
    padding-left: 20px;
    color: var(--amarillo);
    font-size: 12px;
  }

  .recommendation-box {
    background: linear-gradient(135deg, rgba(139,92,246,0.1), rgba(14,165,233,0.1));
    border-radius: 12px;
    padding: 12px;
    margin-top: 12px;
    font-size: 13px;
    border: 1px solid var(--morado);
  }

  .btn-upload {
    width: 100%;
    padding: 16px;
    border-radius: 40px;
    font-weight: 700;
    font-size: 16px;
    cursor: pointer;
    background: linear-gradient(135deg, var(--acento), var(--morado));
    color: white;
    border: none;
    margin-top: 16px;
    transition: all 0.3s;
  }

  .btn-upload:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(14,165,233,0.3);
  }

  .btn-upload:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .progress {
    display: none;
    margin-top: 24px;
  }

  .progress.show {
    display: block;
  }

  .progress-bar {
    height: 8px;
    background: var(--superficie2);
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 12px;
  }

  .progress-fill {
    width: 0%;
    height: 100%;
    background: linear-gradient(135deg, var(--acento), var(--morado));
    border-radius: 4px;
    transition: width 0.3s;
  }

  .result {
    margin-top: 24px;
    padding: 20px;
    border-radius: 20px;
    display: none;
  }

  .result.show {
    display: block;
  }

  .result.success {
    background: rgba(34,197,94,0.15);
    border: 1px solid var(--verde);
  }

  .result.error {
    background: rgba(239,68,68,0.15);
    border: 1px solid var(--rojo);
  }

  .result-title {
    font-weight: 700;
    margin-bottom: 12px;
    font-size: 18px;
  }

  .result-details {
    font-size: 13px;
    color: var(--texto-suave);
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .loading-ai {
    animation: pulse 1.5s ease-in-out infinite;
  }

  .preview-table {
    margin-top: 16px;
  }

  .preview-table summary {
    cursor: pointer;
    margin: 12px 0;
    color: var(--acento);
    font-weight: 600;
  }

  .preview-table table {
    width: 100%;
    border-collapse: collapse;
    font-size: 11px;
  }

  .preview-table th, .preview-table td {
    border: 1px solid var(--borde);
    padding: 6px;
    text-align: left;
  }

  .preview-table th {
    background: var(--superficie);
    font-weight: 600;
  }
</style>
</head>
<body>
<div class="upload-container">
  <div class="upload-icon">🤖📤</div>
  <h1>Subir Reporte con IA</h1>
  <div class="ai-badge">✨ Powered by Gemini AI ✨</div>
  <p class="desc">Sube tu archivo Excel (.xlsx, .xls) o CSV<br>La IA validará, limpiará y enriquecerá los datos automáticamente</p>

  <div class="drop-area" id="dropArea">
    <div>📁 Arrastra tu archivo aquí</div>
    <div style="font-size: 12px; margin-top: 8px; color: var(--texto-suave);">Soporta Excel (.xlsx, .xls) y CSV</div>
    <input type="file" id="fileInput" class="file-input" accept=".csv,.xlsx,.xls,.xlsm">
    <label for="fileInput" class="file-label">Seleccionar archivo</label>
  </div>

  <div class="selected-file" id="selectedFile"></div>
  
  <div class="ai-preview" id="aiPreview">
    <h4>🤖 Análisis de IA</h4>
    <div id="aiContent">Cargando análisis...</div>
  </div>

  <button class="btn-upload" id="uploadBtn" disabled>📤 Validar y Subir Datos</button>

  <div class="progress" id="progress">
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div id="progressText">Procesando...</div>
  </div>

  <div class="result" id="result"></div>
</div>

<script>
// Configuración
const URL_API = 'https://script.google.com/macros/s/AKfycbxDPMd_ZEm47Op3CMUZgGKmhamovIiILzPwdPe91YXh9Yw2dAJIJVChtPLKomSmZig/exec';
// API KEY CORRECTA de tu curl
const GEMINI_API_KEY = 'AIzaSyBf_sWcPRhJfbqzwlxrKozgO9Ca-b5KMW4';
// URL CORRECTA de Gemini (usando gemini-flash-latest como en tu curl)
const GEMINI_API_URL = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent';

let selectedFile = null;
let fileDataParsed = null;
let aiAnalysis = null;

// Elementos DOM
const dropArea = document.getElementById('dropArea');
const fileInput = document.getElementById('fileInput');
const selectedFileDiv = document.getElementById('selectedFile');
const uploadBtn = document.getElementById('uploadBtn');
const progress = document.getElementById('progress');
const progressFill = document.getElementById('progressFill');
const progressText = document.getElementById('progressText');
const resultDiv = document.getElementById('result');
const aiPreview = document.getElementById('aiPreview');
const aiContent = document.getElementById('aiContent');

// Eventos de drag & drop
dropArea.addEventListener('dragover', (e) => {
  e.preventDefault();
  dropArea.classList.add('drag-over');
});

dropArea.addEventListener('dragleave', () => {
  dropArea.classList.remove('drag-over');
});

dropArea.addEventListener('drop', (e) => {
  e.preventDefault();
  dropArea.classList.remove('drag-over');
  const files = e.dataTransfer.files;
  if (files.length > 0) {
    handleFile(files[0]);
  }
});

fileInput.addEventListener('change', (e) => {
  if (e.target.files.length > 0) {
    handleFile(e.target.files[0]);
  }
});

async function handleFile(file) {
  const extension = file.name.split('.').pop().toLowerCase();
  if (!['csv', 'xlsx', 'xls', 'xlsm'].includes(extension)) {
    alert('Formato no soportado. Usa CSV o Excel (.xlsx, .xls)');
    return;
  }
  
  selectedFile = file;
  selectedFileDiv.innerHTML = `✅ Archivo seleccionado: ${file.name} (${(file.size / 1024).toFixed(2)} KB)`;
  selectedFileDiv.classList.add('show');
  uploadBtn.disabled = true;
  
  // Mostrar loading en AI preview
  aiPreview.classList.add('show');
  aiContent.innerHTML = '<div class="loading-ai">🤖 Analizando datos con Gemini AI...</div>';
  
  try {
    // Leer y parsear el archivo según su tipo
    if (extension === 'csv') {
      fileDataParsed = await parseCSVFile(file);
    } else {
      fileDataParsed = await parseExcelFile(file);
    }
    
    if (!fileDataParsed || fileDataParsed.length === 0) {
      throw new Error('No se pudieron extraer datos del archivo');
    }
    
    console.log('Datos parseados:', fileDataParsed.length, 'registros');
    console.log('Primer registro:', fileDataParsed[0]);
    
    // Analizar con Gemini
    await analyzeWithGemini(fileDataParsed, file.name);
    
    uploadBtn.disabled = false;
    
  } catch (error) {
    console.error('Error al analizar archivo:', error);
    aiContent.innerHTML = `
      <div style="color: var(--amarillo); margin-bottom: 12px;">
        ⚠️ Error al analizar: ${error.message}<br>
        Mostrando estadísticas básicas del archivo.
      </div>
      ${generateBasicStats(fileDataParsed || [])}
      <div class="warning-list">
        💡 Puedes continuar con la subida manual haciendo clic en "Validar y Subir Datos"
      </div>
    `;
    uploadBtn.disabled = false;
  }
}

function parseCSVFile(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const csvString = e.target.result;
        const lines = csvString.split(/\r?\n/);
        if (lines.length < 2) {
          resolve([]);
          return;
        }
        
        const headers = parseCSVLine(lines[0]).map(h => 
          h.toLowerCase().trim().replace(/["']/g, '').replace(/\s+/g, '_')
        );
        
        const data = [];
        for (let i = 1; i < lines.length; i++) {
          if (!lines[i].trim()) continue;
          const values = parseCSVLine(lines[i]);
          const row = {};
          headers.forEach((h, idx) => {
            row[h] = values[idx] || '';
          });
          data.push(row);
        }
        resolve(data);
      } catch (err) {
        reject(err);
      }
    };
    reader.onerror = reject;
    reader.readAsText(file, 'UTF-8');
  });
}

function parseExcelFile(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const data = new Uint8Array(e.target.result);
        const workbook = XLSX.read(data, { type: 'array' });
        const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
        const jsonData = XLSX.utils.sheet_to_json(firstSheet, { defval: '' });
        
        // Normalizar nombres de columnas
        const normalizedData = jsonData.map(row => {
          const normalized = {};
          Object.keys(row).forEach(key => {
            const newKey = key.toLowerCase().trim().replace(/\s+/g, '_');
            normalized[newKey] = row[key];
          });
          return normalized;
        });
        
        resolve(normalizedData);
      } catch (err) {
        reject(err);
      }
    };
    reader.onerror = reject;
    reader.readAsArrayBuffer(file);
  });
}

function parseCSVLine(line) {
  const result = [];
  let current = '';
  let inQuotes = false;
  
  for (let i = 0; i < line.length; i++) {
    const char = line[i];
    if (char === '"') {
      inQuotes = !inQuotes;
    } else if (char === ',' && !inQuotes) {
      result.push(current);
      current = '';
    } else {
      current += char;
    }
  }
  result.push(current);
  
  return result.map(v => v.trim().replace(/^"|"$/g, ''));
}

function generateBasicStats(data) {
  if (!data || data.length === 0) return '<div>No hay datos para mostrar</div>';
  
  const totalRows = data.length;
  const withNumSerie = data.filter(row => row.num_serie || row.numserie).length;
  
  let totalGPV = 0;
  data.forEach(row => {
    const gpv = parseFloat(row.gpv_m0) || parseFloat(row.gpv) || 0;
    totalGPV += gpv;
  });
  
  return `
    <div class="ai-stats">
      <div class="stat-card">
        <div class="stat-label">📊 Registros</div>
        <div class="stat-value">${totalRows.toLocaleString()}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">🔢 Con Serie</div>
        <div class="stat-value">${withNumSerie}/${totalRows}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">💰 GPV Estimado</div>
        <div class="stat-value">S/ ${totalGPV.toLocaleString()}</div>
      </div>
    </div>
  `;
}

async function analyzeWithGemini(data, filename) {
  const totalRows = data.length;
  const columns = Object.keys(data[0] || {});
  
  // Contar calidad de datos
  const withNumSerie = data.filter(row => {
    const val = row.num_serie || row.numserie;
    return val && val.toString().trim();
  }).length;
  
  const withRUC = data.filter(row => {
    const val = row.identificador_tributario || row.ruc;
    return val && val.toString().trim();
  }).length;
  
  // Calcular métricas
  let totalGPV = 0;
  let totalTRX = 0;
  data.forEach(row => {
    const gpv = parseFloat(row.gpv_m0) || parseFloat(row.gpv) || 0;
    const trx = parseInt(row.trx_m0) || 0;
    totalGPV += gpv;
    totalTRX += trx;
  });
  
  // Preparar prompt conciso para Gemini
  const prompt = `Eres un experto en análisis de datos de ventas. Analiza este archivo "${filename}" y responde en español de forma breve:

DATOS:
- Registros: ${totalRows}
- Con número de serie: ${withNumSerie}/${totalRows}
- Con RUC: ${withRUC}/${totalRows}
- GPV total estimado: S/ ${totalGPV.toLocaleString()}
- Transacciones totales: ${totalTRX}

Columnas: ${columns.slice(0, 12).join(', ')}

PRIMER REGISTRO EJEMPLO:
${JSON.stringify(data[0], null, 2)}

RESPONDE EN ESTE FORMATO EXACTO:
📊 RESUMEN: [2 líneas]
⚠️ PROBLEMAS: [lista de problemas detectados, máximo 3]
💡 RECOMENDACIÓN: [1 recomendación principal]`;

  try {
    console.log('Enviando solicitud a Gemini API...');
    console.log('URL:', GEMINI_API_URL);
    
    const response = await fetch(`${GEMINI_API_URL}?key=${GEMINI_API_KEY}`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({
        contents: [{
          parts: [{
            text: prompt
          }]
        }],
        generationConfig: {
          temperature: 0.7,
          maxOutputTokens: 500,
        }
      })
    });

    if (!response.ok) {
      const errorText = await response.text();
      console.error('Error response:', errorText);
      throw new Error(`HTTP ${response.status}: ${errorText.substring(0, 100)}`);
    }

    const result = await response.json();
    const analysis = result.candidates?.[0]?.content?.parts?.[0]?.text || 'Análisis generado correctamente';
    
    aiAnalysis = analysis;
    
    // Mostrar análisis completo
    displayAIAnalysis(analysis, data, {
      totalRows,
      columns,
      withNumSerie,
      withRUC,
      totalGPV,
      totalTRX
    });
    
  } catch (error) {
    console.error('Error llamando a Gemini:', error);
    aiContent.innerHTML = `
      <div style="color: var(--amarillo); margin-bottom: 12px;">
        ⚠️ No se pudo conectar con Gemini AI: ${error.message}<br>
        Mostrando estadísticas básicas del archivo.
      </div>
      ${generateBasicStats(data)}
      <div class="warning-list">
        💡 Puedes continuar con la subida manual haciendo clic en "Validar y Subir Datos"
      </div>
    `;
  }
}

function displayAIAnalysis(analysis, data, stats) {
  // Mostrar preview de los primeros registros
  const previewRows = data.slice(0, 5);
  const previewColumns = Object.keys(data[0] || {}).slice(0, 6);
  
  const html = `
    <div class="ai-stats">
      <div class="stat-card">
        <div class="stat-label">📊 Registros</div>
        <div class="stat-value">${stats.totalRows.toLocaleString()}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">🔢 Con Serie</div>
        <div class="stat-value">${stats.withNumSerie}/${stats.totalRows}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">🏢 Con RUC</div>
        <div class="stat-value">${stats.withRUC}/${stats.totalRows}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">💰 GPV Estimado</div>
        <div class="stat-value">S/ ${stats.totalGPV.toLocaleString()}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">🛒 Transacciones</div>
        <div class="stat-value">${stats.totalTRX.toLocaleString()}</div>
      </div>
    </div>
    
    <div class="recommendation-box">
      <strong>🤖 Análisis Gemini AI:</strong>
      <div style="margin-top: 8px; white-space: pre-wrap; font-size: 12px; line-height: 1.5;">
        ${escapeHtml(analysis)}
      </div>
    </div>
    
    <div class="warning-list">
      ${stats.withNumSerie < stats.totalRows ? '⚠️ Hay registros sin número de serie. Estos no podrán ser actualizados correctamente.<br>' : ''}
      ${stats.withRUC < stats.totalRows * 0.8 ? '⚠️ Muchos registros sin RUC. Verificar calidad de datos.<br>' : ''}
      ${stats.totalRows > 0 ? '✅ Listo para subir. El sistema actualizará automáticamente la base de datos.' : ''}
    </div>
    
    <details class="preview-table">
      <summary>📋 Vista previa de datos (primeros ${previewRows.length} registros)</summary>
      <div style="overflow-x: auto;">
        <table>
          <thead>
            <tr>
              ${previewColumns.map(col => `<th>${col}</th>`).join('')}
            </tr>
          </thead>
          <tbody>
            ${previewRows.map(row => `
              <tr>
                ${previewColumns.map(col => `<td title="${escapeHtml(String(row[col] || '-'))}">${escapeHtml(String(row[col] || '-').substring(0, 30))}${String(row[col] || '-').length > 30 ? '...' : ''}</td>`).join('')}
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    </details>
  `;
  
  aiContent.innerHTML = html;
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

uploadBtn.addEventListener('click', async () => {
  if (!selectedFile) return;
  
  uploadBtn.disabled = true;
  progress.classList.add('show');
  resultDiv.classList.remove('show');
  progressFill.style.width = '20%';
  progressText.textContent = 'Preparando archivo...';
  
  try {
    const reader = new FileReader();
    
    const fileData = await new Promise((resolve, reject) => {
      reader.onload = () => resolve(reader.result);
      reader.onerror = reject;
      reader.readAsDataURL(selectedFile);
    });
    
    progressFill.style.width = '50%';
    progressText.textContent = 'Enviando a Google Sheets...';
    
    const formData = new FormData();
    formData.append('action', 'upload');
    formData.append('archivo', fileData);
    formData.append('nombre', selectedFile.name);
    formData.append('usuario', 'dashboard_user');
    formData.append('tipo', selectedFile.name.split('.').pop().toLowerCase());
    
    if (aiAnalysis) {
      formData.append('ai_analysis', aiAnalysis.substring(0, 1000));
    }
    
    console.log('Enviando archivo a:', URL_API);
    console.log('Tipo:', selectedFile.name.split('.').pop().toLowerCase());
    
    const response = await fetch(URL_API, {
      method: 'POST',
      body: formData
    });
    
    progressFill.style.width = '80%';
    progressText.textContent = 'Procesando respuesta...';
    
    const result = await response.json();
    console.log('Respuesta:', result);
    
    progressFill.style.width = '100%';
    progressText.textContent = 'Procesamiento completado';
    
    if (result.success) {
      resultDiv.className = 'result success show';
      resultDiv.innerHTML = `
        <div class="result-title">✅ ¡Actualización Exitosa!</div>
        <div class="result-details">
          ${result.mensaje || 'Datos actualizados correctamente'}<br>
          ${result.resultado ? `📊 Nuevas filas: ${result.resultado.nuevas} | Actualizadas: ${result.resultado.actualizadas}` : ''}
          ${result.resultado?.errores > 0 ? `<br>⚠️ Errores: ${result.resultado.errores}` : ''}
          ${aiAnalysis ? '<br>🤖 Análisis de IA incluido en el log' : ''}
        </div>
      `;
      
      // Notificar al dashboard padre
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({ type: 'datos-actualizados' }, '*');
      }
      
      // Limpiar selección después de subida exitosa
      setTimeout(() => {
        selectedFile = null;
        selectedFileDiv.classList.remove('show');
        uploadBtn.disabled = true;
      }, 3000);
      
    } else {
      throw new Error(result.mensaje || result.error || 'Error desconocido');
    }
    
  } catch (error) {
    console.error('Error detallado:', error);
    resultDiv.className = 'result error show';
    resultDiv.innerHTML = `
      <div class="result-title">❌ Error al Actualizar</div>
      <div class="result-details">
        ${error.message}<br>
        Verifica que el archivo tenga el formato correcto y vuelve a intentarlo.
        <br><br>
        <strong>Posibles soluciones:</strong><br>
        • Asegúrate que el archivo tenga la estructura correcta (columnas esperadas)<br>
        • Verifica que el número de serie sea único<br>
        • Intenta con un archivo más pequeño primero
      </div>
    `;
  } finally {
    setTimeout(() => {
      uploadBtn.disabled = false;
      setTimeout(() => {
        progress.classList.remove('show');
        progressFill.style.width = '0%';
      }, 2000);
    }, 1000);
  }
});

// Sincronizar tema
window.addEventListener('message', (e) => {
  if (e.data && e.data.type === 'theme-change') {
    document.documentElement.setAttribute('data-theme', e.data.theme);
  }
});

function aplicarTema(theme) {
  document.documentElement.setAttribute('data-theme', theme);
}

const savedTheme = localStorage.getItem('theme') || 'dark';
aplicarTema(savedTheme);
</script>
</body>

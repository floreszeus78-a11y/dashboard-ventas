<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Subir Reporte - Panel Ventas con IA</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --fondo: #0a0e1a;
    --superficie: #111827;
    --superficie2: #1e293b;
    --borde: #1e2d45;
    --acento: #0ea5e9;
    --texto: #e2e8f0;
    --texto-suave: #94a3b8;
    --verde: #22c55e;
    --rojo: #ef4444;
    --amarillo: #eab308;
    --morado: #8b5cf6;
  }

  [data-theme="light"] {
    --fondo: #f8fafc;
    --superficie: #ffffff;
    --superficie2: #f1f5f9;
    --borde: #e2e8f0;
    --acento: #0284c7;
    --texto: #0f172a;
    --texto-suave: #64748b;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    font-family: 'Inter', sans-serif;
    background: var(--fondo);
    color: var(--texto);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .upload-container {
    max-width: 1000px;
    width: 100%;
    background: var(--superficie);
    border: 1px solid var(--borde);
    border-radius: 32px;
    padding: 40px;
  }

  .upload-icon {
    font-size: 80px;
    margin-bottom: 20px;
    text-align: center;
  }

  h1 {
    font-size: 28px;
    font-weight: 800;
    background: linear-gradient(135deg, var(--acento), var(--morado));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 12px;
    text-align: center;
  }

  .desc {
    color: var(--texto-suave);
    margin-bottom: 32px;
    line-height: 1.6;
    text-align: center;
  }

  .ai-badge {
    display: inline-block;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    margin-bottom: 16px;
    text-align: center;
    width: auto;
    margin-left: auto;
    margin-right: auto;
  }

  .drop-area {
    border: 2px dashed var(--borde);
    border-radius: 24px;
    padding: 40px;
    margin-bottom: 24px;
    transition: all 0.3s;
    cursor: pointer;
    text-align: center;
  }

  .drop-area.drag-over {
    border-color: var(--acento);
    background: var(--superficie2);
  }

  .file-input {
    display: none;
  }

  .file-label {
    display: inline-block;
    padding: 12px 24px;
    background: var(--superficie2);
    border-radius: 30px;
    cursor: pointer;
    font-weight: 600;
    margin-top: 16px;
  }

  .file-label:hover {
    background: var(--acento);
    color: white;
  }

  .selected-file {
    margin: 16px 0;
    padding: 12px;
    background: var(--superficie2);
    border-radius: 12px;
    font-size: 14px;
    display: none;
  }

  .selected-file.show {
    display: block;
  }

  .ai-preview {
    margin: 16px 0;
    padding: 20px;
    background: var(--superficie2);
    border-radius: 16px;
    display: none;
    text-align: left;
  }

  .ai-preview.show {
    display: block;
  }

  .ai-stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
    margin-top: 12px;
  }

  .stat-card {
    background: var(--superficie);
    padding: 12px;
    border-radius: 12px;
    border-left: 3px solid var(--acento);
  }

  .stat-label {
    font-size: 11px;
    color: var(--texto-suave);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .stat-value {
    font-size: 20px;
    font-weight: 700;
    color: var(--texto);
    margin-top: 4px;
  }

  .btn-upload {
    width: 100%;
    padding: 16px;
    border-radius: 40px;
    font-weight: 700;
    font-size: 16px;
    cursor: pointer;
    background: linear-gradient(135deg, var(--acento), var(--morado));
    color: white;
    border: none;
    margin-top: 16px;
    transition: all 0.3s;
  }

  .btn-upload:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(14,165,233,0.3);
  }

  .btn-upload:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .progress {
    display: none;
    margin-top: 24px;
  }

  .progress.show {
    display: block;
  }

  .progress-bar {
    height: 8px;
    background: var(--superficie2);
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 12px;
  }

  .progress-fill {
    width: 0%;
    height: 100%;
    background: linear-gradient(135deg, var(--acento), var(--morado));
    border-radius: 4px;
    transition: width 0.3s;
  }

  .result {
    margin-top: 24px;
    padding: 20px;
    border-radius: 20px;
    display: none;
  }

  .result.show {
    display: block;
  }

  .result.success {
    background: rgba(34,197,94,0.15);
    border: 1px solid var(--verde);
  }

  .result.error {
    background: rgba(239,68,68,0.15);
    border: 1px solid var(--rojo);
  }

  .result-title {
    font-weight: 700;
    margin-bottom: 12px;
    font-size: 18px;
  }

  .result-details {
    font-size: 13px;
    color: var(--texto-suave);
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .loading-ai {
    animation: pulse 1.5s ease-in-out infinite;
    text-align: center;
    padding: 20px;
  }
</style>
</head>
<body>
<div class="upload-container">
  <div class="upload-icon">🤖📤</div>
  <h1>Subir Reporte con IA</h1>
  <div class="ai-badge">✨ Powered by Gemini AI ✨</div>
  <p class="desc">Sube tu archivo Excel (.xlsx, .xls) o CSV<br>La IA procesará, limpiará y actualizará todo automáticamente</p>

  <div class="drop-area" id="dropArea">
    <div>📁 Arrastra tu archivo aquí</div>
    <div style="font-size: 12px; margin-top: 8px; color: var(--texto-suave);">Soporta Excel (.xlsx, .xls) y CSV</div>
    <input type="file" id="fileInput" class="file-input" accept=".csv,.xlsx,.xls,.xlsm">
    <label for="fileInput" class="file-label">Seleccionar archivo</label>
  </div>

  <div class="selected-file" id="selectedFile"></div>
  
  <div class="ai-preview" id="aiPreview">
    <h4 style="color: var(--acento); margin-bottom: 16px;">🤖 Procesando con IA</h4>
    <div id="aiContent"></div>
  </div>

  <button class="btn-upload" id="uploadBtn" disabled>📤 Procesar con IA</button>

  <div class="progress" id="progress">
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div id="progressText">Procesando...</div>
  </div>

  <div class="result" id="result"></div>
</div>

<script>
// ============================================================
// CONFIGURACIÓN - SOLO URL DEL BACKEND
// ============================================================
// ⚠️ REEMPLAZA CON TU URL DE GOOGLE APPS SCRIPT
const URL_API = 'https://script.google.com/macros/s/AKfycbwOtzZX28VEr_WHloVqid7iG0wpHCdFYzh9SlthGKrc7gPtn1RaoQcFSh965h5lYXVD/exec';

let selectedFile = null;

// Elementos DOM
const dropArea = document.getElementById('dropArea');
const fileInput = document.getElementById('fileInput');
const selectedFileDiv = document.getElementById('selectedFile');
const uploadBtn = document.getElementById('uploadBtn');
const progress = document.getElementById('progress');
const progressFill = document.getElementById('progressFill');
const progressText = document.getElementById('progressText');
const resultDiv = document.getElementById('result');
const aiPreview = document.getElementById('aiPreview');
const aiContent = document.getElementById('aiContent');

// ============================================================
// EVENTOS DE ARRASTRE Y SELECCIÓN
// ============================================================
dropArea.addEventListener('dragover', (e) => {
  e.preventDefault();
  dropArea.classList.add('drag-over');
});

dropArea.addEventListener('dragleave', () => {
  dropArea.classList.remove('drag-over');
});

dropArea.addEventListener('drop', (e) => {
  e.preventDefault();
  dropArea.classList.remove('drag-over');
  if (e.dataTransfer.files.length > 0) handleFile(e.dataTransfer.files[0]);
});

fileInput.addEventListener('change', (e) => {
  if (e.target.files.length > 0) handleFile(e.target.files[0]);
});

// ============================================================
// MANEJO DE ARCHIVO
// ============================================================
function handleFile(file) {
  const extension = file.name.split('.').pop().toLowerCase();
  if (!['csv', 'xlsx', 'xls', 'xlsm'].includes(extension)) {
    alert('Formato no soportado. Usa CSV o Excel (.xlsx, .xls)');
    return;
  }
  
  selectedFile = file;
  selectedFileDiv.innerHTML = `✅ Archivo: ${file.name} (${(file.size / 1024).toFixed(2)} KB)`;
  selectedFileDiv.classList.add('show');
  uploadBtn.disabled = false;
  
  // Limpiar preview anterior
  aiPreview.classList.remove('show');
  resultDiv.classList.remove('show');
}

// ============================================================
// ENVÍO AL BACKEND (CON IA)
// ============================================================
uploadBtn.addEventListener('click', async () => {
  if (!selectedFile) return;
  
  uploadBtn.disabled = true;
  progress.classList.add('show');
  resultDiv.classList.remove('show');
  aiPreview.classList.add('show');
  aiContent.innerHTML = '<div class="loading-ai">🤖 La IA está analizando y limpiando tus datos...<br>Esto puede tomar unos segundos</div>';
  
  progressFill.style.width = '20%';
  progressText.textContent = 'Leyendo archivo...';
  
  try {
    // Convertir archivo a Base64
    const fileData = await new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = reject;
      reader.readAsDataURL(selectedFile);
    });
    
    progressFill.style.width = '40%';
    progressText.textContent = 'Enviando a Gemini IA (backend)...';
    
    // Preparar FormData
    const formData = new FormData();
    formData.append('action', 'procesar_con_ia'); // 🔥 NUEVA ACCIÓN
    formData.append('archivo', fileData);
    formData.append('nombre', selectedFile.name);
    formData.append('usuario', 'Admin_Dashboard');
    formData.append('tipo', selectedFile.name.split('.').pop().toLowerCase());
    
    progressFill.style.width = '60%';
    progressText.textContent = 'Procesando con IA en el servidor...';
    
    const response = await fetch(URL_API, {
      method: 'POST',
      body: formData
    });
    
    progressFill.style.width = '80%';
    progressText.textContent = 'Actualizando base de datos...';
    
    const result = await response.json();
    
    progressFill.style.width = '100%';
    progressText.textContent = '¡Completado!';
    
    if (result.success) {
      // Mostrar éxito
      resultDiv.className = 'result success show';
      resultDiv.innerHTML = `
        <div class="result-title">✅ ¡Procesado con Éxito!</div>
        <div class="result-details">
          ${result.mensaje}<br><br>
          <div class="ai-stats">
            <div class="stat-card">
              <div class="stat-label">Filas Procesadas</div>
              <div class="stat-value">${result.resultado?.filas_procesadas || 0}</div>
            </div>
            <div class="stat-card">
              <div class="stat-label">Actualizadas</div>
              <div class="stat-value" style="color: var(--verde);">${result.resultado?.actualizadas || 0}</div>
            </div>
            <div class="stat-card">
              <div class="stat-label">Nuevas</div>
              <div class="stat-value" style="color: var(--acento);">${result.resultado?.nuevas || 0}</div>
            </div>
          </div>
        </div>
      `;
      
      // Actualizar preview de IA
      aiContent.innerHTML = `
        <div style="color: var(--verde); text-align: center;">
          ✅ Gemini IA procesó y limpió los datos correctamente<br>
          <span style="font-size: 12px; color: var(--texto-suave);">
            Los datos fueron cruzados con tu base y actualizados automáticamente
          </span>
        </div>
      `;
      
      // Notificar al dashboard padre
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({ type: 'datos-actualizados' }, '*');
      }
      
    } else {
      throw new Error(result.mensaje || result.error || 'Error del servidor');
    }
    
  } catch (error) {
    console.error('Error:', error);
    resultDiv.className = 'result error show';
    resultDiv.innerHTML = `
      <div class="result-title">❌ Error al Procesar</div>
      <div class="result-details">${error.message}</div>
    `;
    
    aiContent.innerHTML = `
      <div style="color: var(--rojo); text-align: center;">
        ❌ Error: ${error.message}
      </div>
    `;
  } finally {
    setTimeout(() => {
      uploadBtn.disabled = false;
      setTimeout(() => {
        progress.classList.remove('show');
        progressFill.style.width = '0%';
      }, 2000);
    }, 1000);
  }
});

// Sincronizar tema
window.addEventListener('message', (e) => {
  if (e.data && e.data.type === 'theme-change') {
    document.documentElement.setAttribute('data-theme', e.data.theme);
  }
});

function aplicarTema(theme) {
  document.documentElement.setAttribute('data-theme', theme);
}

const savedTheme = localStorage.getItem('theme') || 'dark';
aplicarTema(savedTheme);
</script>
</body>
</html>

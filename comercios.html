<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comercios - Panel Ventas</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --fondo: #0a0e1a;
    --superficie: #111827;
    --superficie2: #1e293b;
    --borde: #1e2d45;
    --acento: #0ea5e9;
    --texto: #e2e8f0;
    --texto-suave: #94a3b8;
    --verde: #22c55e;
    --verde-bg: rgba(34,197,94,0.15);
    --rojo: #ef4444;
    --rojo-bg: rgba(239,68,68,0.15);
    --naranja: #f97316;
    --naranja-bg: rgba(249,115,22,0.15);
    --morado: #a855f7;
    --morado-bg: rgba(168,85,247,0.15);
  }

  [data-theme="light"] {
    --fondo: #f8fafc;
    --superficie: #ffffff;
    --superficie2: #f1f5f9;
    --borde: #e2e8f0;
    --acento: #0284c7;
    --texto: #0f172a;
    --texto-suave: #64748b;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    font-family: 'Inter', sans-serif;
    background: var(--fondo);
    color: var(--texto);
    padding: 24px;
  }

  .contenedor { max-width: 1600px; margin: 0 auto; }

  .header {
    margin-bottom: 28px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 16px;
  }

  .header h1 {
    font-size: 28px;
    font-weight: 800;
    background: linear-gradient(135deg, var(--acento), #7c3aed);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 16px;
    margin-bottom: 28px;
  }

  .stat-card {
    background: var(--superficie);
    border: 1px solid var(--borde);
    border-radius: 20px;
    padding: 20px;
  }

  .stat-number {
    font-size: 32px;
    font-weight: 800;
    color: var(--acento);
  }

  .stat-label {
    color: var(--texto-suave);
    font-size: 13px;
    margin-top: 4px;
  }

  .filtros {
    display: flex;
    gap: 16px;
    margin-bottom: 24px;
    flex-wrap: wrap;
    align-items: center;
  }

  .buscador {
    flex: 1;
    min-width: 250px;
    padding: 12px 20px;
    border-radius: 30px;
    border: 1px solid var(--borde);
    background: var(--superficie2);
    color: var(--texto);
    font-size: 14px;
  }

  .select-filtro {
    padding: 12px 20px;
    border-radius: 30px;
    border: 1px solid var(--borde);
    background: var(--superficie2);
    color: var(--texto);
    font-size: 14px;
    cursor: pointer;
  }

  .tabla-container {
    background: var(--superficie);
    border: 1px solid var(--borde);
    border-radius: 20px;
    overflow-x: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  th {
    background: var(--superficie2);
    padding: 14px 12px;
    text-align: left;
    font-weight: 700;
    color: var(--texto-suave);
    border-bottom: 2px solid var(--borde);
    position: sticky;
    top: 0;
    white-space: nowrap;
  }

  td {
    padding: 14px 12px;
    border-bottom: 1px solid var(--borde);
    vertical-align: top;
  }

  tr:hover td {
    background: var(--superficie2);
  }

  .comercio-nombre {
    font-weight: 700;
    font-size: 15px;
    color: var(--texto);
  }

  .multi-badge {
    display: inline-block;
    background: var(--morado);
    color: white;
    padding: 2px 8px;
    border-radius: 12px;
    font-size: 10px;
    font-weight: 700;
    margin-left: 8px;
  }

  .equipos-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .equipo-item {
    background: var(--superficie2);
    border-radius: 12px;
    padding: 8px 10px;
    font-size: 12px;
  }

  .equipo-serie {
    font-family: monospace;
    font-weight: 600;
    color: var(--acento);
  }

  .timeline-equipo {
    display: flex;
    gap: 8px;
    margin-top: 6px;
    font-size: 10px;
    flex-wrap: wrap;
  }

  .badge-estado {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 8px;
    border-radius: 12px;
    font-size: 10px;
    font-weight: 600;
  }

  .badge-activo { background: var(--verde-bg); color: var(--verde); }
  .badge-regular { background: var(--naranja-bg); color: var(--naranja); }
  .badge-inactivo { background: var(--rojo-bg); color: var(--rojo); }

  .paginacion {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-top: 24px;
    padding: 16px;
  }

  .pag-btn {
    padding: 8px 14px;
    border-radius: 8px;
    border: 1px solid var(--borde);
    background: var(--superficie2);
    color: var(--texto);
    cursor: pointer;
  }

  .pag-btn.active {
    background: var(--acento);
    color: white;
    border-color: var(--acento);
  }

  .loading, .empty {
    text-align: center;
    padding: 60px;
    color: var(--texto-suave);
  }

  .spinner {
    width: 40px;
    height: 40px;
    border: 3px solid var(--superficie2);
    border-top-color: var(--acento);
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: 0 auto 16px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="contenedor">
  <div class="header">
    <div>
      <h1>🏪 Gestión de Comercios</h1>
      <p>Comercios con sus equipos POS y rendimiento detallado</p>
    </div>
  </div>

  <div class="stats-grid" id="statsGrid"></div>

  <div class="filtros">
    <input type="text" class="buscador" id="buscador" placeholder="🔍 Buscar por comercio, RUC, ejecutivo o serie..." onkeyup="filtrarTabla()">
    <select class="select-filtro" id="filtroMulti" onchange="filtrarTabla()">
      <option value="todos">📊 Todos los comercios</option>
      <option value="multi">🔁 Comercios con múltiples equipos</option>
      <option value="single">📌 Comercios con 1 equipo</option>
    </select>
  </div>

  <div class="tabla-container">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Comercio</th>
          <th>RUC</th>
          <th>Ejecutivo</th>
          <th>Equipos POS</th>
          <th>Total GPV</th>
          <th>Total TRX</th>
          <th>Detalle de Equipos</th>
        </tr>
      </thead>
      <tbody id="tablaCuerpo"></tbody>
    </table>
  </div>

  <div class="paginacion" id="paginacion"></div>
</div>

<script>
let datosCompletos = null;
let comerciosAgrupados = [];
let comerciosFiltrados = [];
let paginaActual = 1;
const itemsPorPagina = 15;

window.addEventListener('message', (e) => {
  if (e.data && e.data.type === 'datos-cargados') {
    datosCompletos = e.data.datos;
    procesarComercios();
    renderizarStats();
    filtrarTabla();
  }
  if (e.data && e.data.type === 'theme-change') {
    document.documentElement.setAttribute('data-theme', e.data.theme);
  }
});

function solicitarDatos() {
  window.parent.postMessage({ type: 'solicitar-datos' }, '*');
}

function getEstadoPorGPV(gpv) {
    const valor = limpiarNumero ? limpiarNumero(gpv) : Number(gpv);
    
    if (valor === 0 || valor === null || valor === undefined || isNaN(valor)) return 'INACTIVO';
    if (valor >= 700) return 'ACTIVO';
    if (valor >= 400 && valor <= 699) return 'REGULAR';
    if (valor >= 1 && valor <= 399) return 'SIN TANTO USO';
    return 'INACTIVO';
}

function formatearNumero(num) {
  if (num === null || num === undefined || isNaN(num)) return '0';
  return Number(num).toLocaleString('es-PE', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function procesarComercios() {
  if (!datosCompletos?.equipos) return;
  
  const mapa = new Map();
  
  datosCompletos.equipos.forEach(eq => {
    const key = `${eq.ruc}_${eq.comercio}`;
    if (!mapa.has(key)) {
      mapa.set(key, {
        comercio: eq.comercio,
        ruc: eq.ruc,
        ejecutivo: eq.responsable_real,
        equipos: [],
        totalGPV: 0,
        totalTRX: 0
      });
    }
    const comercio = mapa.get(key);
    const gpvActual = parseFloat(eq.gpv_mes_actual_corriendo) || 0;
    const trxActual = parseInt(eq.trx_mes_actual_corriendo) || 0;
    
    comercio.equipos.push({
      serie: eq.numero_serie,
      gpv: gpvActual,
      trx: trxActual,
      mesActual: eq.etiqueta_mes_actual,
      estado: getEstadoPorGPV(gpvActual),
      gpvM0: eq.gpv_m0 || 0,
      gpvM1: eq.gpv_m1 || 0,
      gpvM2: eq.gpv_m2 || 0,
      trxM0: eq.trx_m0 || 0,
      trxM1: eq.trx_m1 || 0,
      trxM2: eq.trx_m2 || 0,
      fechaActivo: eq.dia_activo,
      ultimaTrx: eq.ultima_transaccion
    });
    comercio.totalGPV += gpvActual;
    comercio.totalTRX += trxActual;
  });
  
  comerciosAgrupados = Array.from(mapa.values())
    .sort((a, b) => b.totalGPV - a.totalGPV);
}

function renderizarStats() {
  const totalComercios = comerciosAgrupados.length;
  const totalEquipos = comerciosAgrupados.reduce((sum, c) => sum + c.equipos.length, 0);
  const totalGPV = comerciosAgrupados.reduce((sum, c) => sum + c.totalGPV, 0);
  const multiEquipos = comerciosAgrupados.filter(c => c.equipos.length > 1).length;
  
  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card"><div class="stat-number">${totalComercios}</div><div class="stat-label">Comercios Únicos</div></div>
    <div class="stat-card"><div class="stat-number">${totalEquipos}</div><div class="stat-label">Equipos POS</div></div>
    <div class="stat-card"><div class="stat-number">S/ ${formatearNumero(totalGPV)}</div><div class="stat-label">GPV Total</div></div>
    <div class="stat-card"><div class="stat-number">${multiEquipos}</div><div class="stat-label">Con Múltiples Equipos</div></div>
    <div class="stat-card"><div class="stat-number">${(totalEquipos / totalComercios).toFixed(1)}</div><div class="stat-label">Promedio Equipos/Comercio</div></div>
  `;
}

function filtrarTabla() {
  const busqueda = document.getElementById('buscador').value.toLowerCase();
  const filtroMulti = document.getElementById('filtroMulti').value;
  
  comerciosFiltrados = comerciosAgrupados.filter(c => {
    if (filtroMulti === 'multi' && c.equipos.length <= 1) return false;
    if (filtroMulti === 'single' && c.equipos.length > 1) return false;
    
    if (busqueda) {
      const texto = `${c.comercio} ${c.ruc} ${c.ejecutivo} ${c.equipos.map(e => e.serie).join(' ')}`.toLowerCase();
      if (!texto.includes(busqueda)) return false;
    }
    return true;
  });
  
  paginaActual = 1;
  renderizarTabla();
  renderizarPaginacion();
}

function renderizarTabla() {
  const tbody = document.getElementById('tablaCuerpo');
  const inicio = (paginaActual - 1) * itemsPorPagina;
  const fin = inicio + itemsPorPagina;
  const paginados = comerciosFiltrados.slice(inicio, fin);
  
  if (paginados.length === 0) {
    tbody.innerHTML = '<tr><td colspan="8" style="text-align:center; padding:40px;">📭 No hay comercios para mostrar</td></tr>';
    return;
  }
  
  tbody.innerHTML = paginados.map((comercio, idx) => {
    const tieneMultiples = comercio.equipos.length > 1;
    
    return `
      <tr>
        <td>${inicio + idx + 1}</td>
        <td>
          <div class="comercio-nombre">
            ${comercio.comercio || 'SIN NOMBRE'}
            ${tieneMultiples ? `<span class="multi-badge">${comercio.equipos.length} equipos</span>` : ''}
          </div>
          <div style="font-size: 11px; color: var(--texto-suave); margin-top: 4px;">${comercio.ejecutivo || 'Sin ejecutivo'}</div>
         </td>
        <td><code>${comercio.ruc || '-'}</code></td>
        <td><strong>${comercio.ejecutivo || 'SIN ASIGNAR'}</strong></td>
        <td>
          <div style="font-size: 20px; font-weight: 700; color: var(--acento);">${comercio.equipos.length}</div>
          <div style="font-size: 10px; color: var(--texto-suave);">equipo(s)</div>
         </td>
        <td>
          <div style="font-weight: 700; font-size: 16px;">S/ ${formatearNumero(comercio.totalGPV)}</div>
          <div style="font-size: 11px; color: var(--texto-suave);">total</div>
         </td>
        <td>${comercio.totalTRX.toLocaleString('es-PE')}</td>
        <td>
          <div class="equipos-list">
            ${comercio.equipos.map(eq => {
              const estado = eq.estado;
              let estadoBadge = '';
              if (estado === 'ACTIVO') estadoBadge = '<span class="badge-estado badge-activo">● Activo</span>';
              else if (estado === 'REGULAR') estadoBadge = '<span class="badge-estado badge-regular">● Regular</span>';
              else estadoBadge = '<span class="badge-estado badge-inactivo">● Inactivo</span>';
              
              return `
                <div class="equipo-item">
                  <div><span class="equipo-serie">📟 ${eq.serie || 'N/A'}</span> ${estadoBadge}</div>
                  <div class="timeline-equipo">
                    <span>M0: S/ ${formatearNumero(eq.gpvM0)}</span>
                    <span>→ M1: S/ ${formatearNumero(eq.gpvM1)}</span>
                    <span>→ M2: S/ ${formatearNumero(eq.gpvM2)}</span>
                  </div>
                  <div style="display: flex; justify-content: space-between; font-size: 10px; color: var(--texto-suave);">
                    <span>💰 Actual: S/ ${formatearNumero(eq.gpv)}</span>
                    <span>🛒 TRX: ${eq.trx}</span>
                    <span>📅 ${eq.mesActual || 'M0'}</span>
                  </div>
                </div>
              `;
            }).join('')}
          </div>
         </td>
       </tr>
    `;
  }).join('');
}

function renderizarPaginacion() {
  const totalPaginas = Math.ceil(comerciosFiltrados.length / itemsPorPagina);
  const container = document.getElementById('paginacion');
  
  if (totalPaginas <= 1) {
    container.innerHTML = '';
    return;
  }
  
  let html = '';
  for (let i = 1; i <= Math.min(totalPaginas, 10); i++) {
    html += `<button class="pag-btn ${paginaActual === i ? 'active' : ''}" onclick="irPagina(${i})">${i}</button>`;
  }
  container.innerHTML = html;
}

function irPagina(pagina) {
  paginaActual = pagina;
  renderizarTabla();
  renderizarPaginacion();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

setTimeout(solicitarDatos, 100);
</script>
</body>
</html>

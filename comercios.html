<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comercios - Panel Ventas</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --fondo: #0a0e1a;
    --superficie: #111827;
    --superficie2: #1e293b;
    --borde: #1e2d45;
    --acento: #0ea5e9;
    --texto: #e2e8f0;
    --texto-suave: #94a3b8;
    --verde: #22c55e;
    --naranja: #f97316;
    --rojo: #ef4444;
  }

  [data-theme="light"] {
    --fondo: #f8fafc;
    --superficie: #ffffff;
    --superficie2: #f1f5f9;
    --borde: #e2e8f0;
    --acento: #0284c7;
    --texto: #0f172a;
    --texto-suave: #64748b;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    font-family: 'Inter', sans-serif;
    background: var(--fondo);
    color: var(--texto);
    padding: 24px;
  }

  .contenedor { max-width: 1400px; margin: 0 auto; }

  .header {
    margin-bottom: 32px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 16px;
  }

  .header h1 {
    font-size: 28px;
    font-weight: 800;
    background: linear-gradient(135deg, var(--acento), #7c3aed);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .buscador {
    padding: 12px 20px;
    border-radius: 30px;
    border: 1px solid var(--borde);
    background: var(--superficie2);
    color: var(--texto);
    width: 300px;
  }

  .stats-cards {
    display: flex;
    gap: 20px;
    margin-bottom: 32px;
    flex-wrap: wrap;
  }

  .stat-card {
    background: var(--superficie);
    border: 1px solid var(--borde);
    border-radius: 20px;
    padding: 20px;
    flex: 1;
    min-width: 180px;
  }

  .stat-number {
    font-size: 32px;
    font-weight: 800;
    color: var(--acento);
  }

  .stat-label {
    color: var(--texto-suave);
    font-size: 14px;
    margin-top: 4px;
  }

  .grid-comercios {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
    gap: 20px;
  }

  .tarjeta-comercio {
    background: var(--superficie);
    border: 1px solid var(--borde);
    border-radius: 20px;
    padding: 20px;
    transition: all 0.2s;
  }

  .tarjeta-comercio:hover {
    border-color: var(--acento);
  }

  .comercio-nombre {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    flex-wrap: wrap;
    gap: 8px;
  }

  .multi-badge {
    background: var(--acento);
    color: white;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 12px;
  }

  .comercio-ruc {
    color: var(--texto-suave);
    font-size: 12px;
    margin-bottom: 16px;
    font-family: monospace;
  }

  .ejecutivo-info {
    background: var(--superficie2);
    padding: 8px 12px;
    border-radius: 12px;
    margin: 12px 0;
    font-size: 13px;
  }

  .equipos-lista {
    margin-top: 16px;
    border-top: 1px solid var(--borde);
    padding-top: 12px;
  }

  .equipo-item {
    display: flex;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px dashed var(--borde);
    font-size: 13px;
  }

  .equipo-item:last-child { border-bottom: none; }

  .gpv-badge {
    font-weight: 600;
  }
  .gpv-activo { color: var(--verde); }
  .gpv-regular { color: var(--naranja); }
  .gpv-inactivo { color: var(--rojo); }

  .loading, .empty {
    text-align: center;
    padding: 60px;
    color: var(--texto-suave);
  }

  .spinner {
    width: 40px;
    height: 40px;
    border: 3px solid var(--superficie2);
    border-top-color: var(--acento);
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: 0 auto 16px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="contenedor">
  <div class="header">
    <div>
      <h1>🏪 Comercios</h1>
      <p>Gestión de comercios y sus equipos POS</p>
    </div>
    <input type="text" class="buscador" id="buscador" placeholder="🔍 Buscar comercio, RUC o ejecutivo..." onkeyup="filtrarComercios()">
  </div>

  <div class="stats-cards" id="statsCards"></div>
  <div class="grid-comercios" id="comerciosGrid"></div>
</div>

<script>
let datosCompletos = null;
let comerciosAgrupados = [];

window.addEventListener('message', (e) => {
  if (e.data && e.data.type === 'datos-cargados') {
    datosCompletos = e.data.datos;
    procesarComercios();
    renderizarTodo();
  }
  if (e.data && e.data.type === 'theme-change') {
    document.documentElement.setAttribute('data-theme', e.data.theme);
  }
});

function solicitarDatos() {
  window.parent.postMessage({ type: 'solicitar-datos' }, '*');
}

function getEstadoPorGPV(gpv) {
  if (gpv === 0) return 'INACTIVO';
  if (gpv < 400) return 'REGULAR';
  return 'ACTIVO';
}

function formatearNumero(num) {
  if (num === null || num === undefined || isNaN(num)) return '0';
  return Number(num).toLocaleString('es-PE', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function procesarComercios() {
  if (!datosCompletos?.equipos) return;
  
  const mapa = new Map();
  
  datosCompletos.equipos.forEach(eq => {
    const key = `${eq.ruc}_${eq.comercio}`;
    if (!mapa.has(key)) {
      mapa.set(key, {
        comercio: eq.comercio,
        ruc: eq.ruc,
        ejecutivo: eq.responsable_real,
        equipos: [],
        totalGPV: 0,
        totalTRX: 0
      });
    }
    const comercio = mapa.get(key);
    const gpvActual = parseFloat(eq.gpv_mes_actual_corriendo) || 0;
    const trxActual = parseInt(eq.trx_mes_actual_corriendo) || 0;
    
    comercio.equipos.push({
      serie: eq.numero_serie,
      gpv: gpvActual,
      trx: trxActual,
      mesActual: eq.etiqueta_mes_actual,
      estado: getEstadoPorGPV(gpvActual),
      gpvM0: eq.gpv_m0 || 0,
      gpvM1: eq.gpv_m1 || 0,
      gpvM2: eq.gpv_m2 || 0
    });
    comercio.totalGPV += gpvActual;
    comercio.totalTRX += trxActual;
  });
  
  comerciosAgrupados = Array.from(mapa.values())
    .sort((a, b) => b.totalGPV - a.totalGPV);
}

function renderizarTodo() {
  renderizarStats();
  renderizarComercios();
}

function renderizarStats() {
  const totalComercios = comerciosAgrupados.length;
  const totalEquipos = comerciosAgrupados.reduce((sum, c) => sum + c.equipos.length, 0);
  const totalGPV = comerciosAgrupados.reduce((sum, c) => sum + c.totalGPV, 0);
  const multiEquipos = comerciosAgrupados.filter(c => c.equipos.length > 1).length;
  
  document.getElementById('statsCards').innerHTML = `
    <div class="stat-card"><div class="stat-number">${totalComercios}</div><div class="stat-label">Comercios únicos</div></div>
    <div class="stat-card"><div class="stat-number">${totalEquipos}</div><div class="stat-label">Equipos POS</div></div>
    <div class="stat-card"><div class="stat-number">S/ ${formatearNumero(totalGPV)}</div><div class="stat-label">GPV Total</div></div>
    <div class="stat-card"><div class="stat-number">${multiEquipos}</div><div class="stat-label">Con múltiples equipos</div></div>
  `;
}

function renderizarComercios(filtro = '') {
  const grid = document.getElementById('comerciosGrid');
  let filtrados = comerciosAgrupados;
  
  if (filtro) {
    const texto = filtro.toLowerCase();
    filtrados = comerciosAgrupados.filter(c => 
      (c.comercio?.toLowerCase() || '').includes(texto) ||
      (c.ruc || '').includes(texto) ||
      (c.ejecutivo?.toLowerCase() || '').includes(texto)
    );
  }
  
  if (filtrados.length === 0) {
    grid.innerHTML = '<div class="empty">📭 No se encontraron comercios</div>';
    return;
  }
  
  grid.innerHTML = filtrados.map(comercio => `
    <div class="tarjeta-comercio">
      <div class="comercio-nombre">
        <span>${comercio.comercio || 'Sin nombre'}</span>
        ${comercio.equipos.length > 1 ? `<span class="multi-badge">${comercio.equipos.length} equipos</span>` : ''}
      </div>
      <div class="comercio-ruc">📋 RUC: ${comercio.ruc || 'No registrado'}</div>
      
      <div class="ejecutivo-info">
        👤 Ejecutivo: <strong>${comercio.ejecutivo || 'Sin asignar'}</strong>
      </div>
      
      <div class="equipos-lista">
        ${comercio.equipos.map(eq => `
          <div class="equipo-item">
            <div>
              📟 ${eq.serie || 'N/A'}
              <span style="font-size: 11px; color: var(--texto-suave); margin-left: 8px;">(${eq.mesActual || '-'})</span>
            </div>
            <div class="gpv-badge ${eq.estado === 'ACTIVO' ? 'gpv-activo' : (eq.estado === 'REGULAR' ? 'gpv-regular' : 'gpv-inactivo')}">
              S/ ${formatearNumero(eq.gpv)}
            </div>
          </div>
        `).join('')}
      </div>
      
      <div style="margin-top: 16px; padding-top: 12px; border-top: 1px solid var(--borde); display: flex; justify-content: space-between; font-size: 13px;">
        <span>💰 Total GPV: <strong>S/ ${formatearNumero(comercio.totalGPV)}</strong></span>
        <span>🛒 TRX: ${comercio.totalTRX}</span>
      </div>
    </div>
  `).join('');
}

function filtrarComercios() {
  const texto = document.getElementById('buscador').value;
  renderizarComercios(texto);
}

setTimeout(solicitarDatos, 100);
</script>
</body>
</html>

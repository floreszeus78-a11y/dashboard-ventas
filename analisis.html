<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Análisis - Panel Ventas</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  :root {
    --fondo: #0a0e1a;
    --superficie: #111827;
    --superficie2: #1e293b;
    --borde: #1e2d45;
    --acento: #0ea5e9;
    --texto: #e2e8f0;
    --texto-suave: #94a3b8;
    --verde: #22c55e;
    --rojo: #ef4444;
    --naranja: #f97316;
    --verde-bg: rgba(34,197,94,0.15);
    --rojo-bg: rgba(239,68,68,0.15);
    --naranja-bg: rgba(249,115,22,0.15);
  }

  [data-theme="light"] {
    --fondo: #f8fafc;
    --superficie: #ffffff;
    --superficie2: #f1f5f9;
    --borde: #e2e8f0;
    --acento: #0284c7;
    --texto: #0f172a;
    --texto-suave: #64748b;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    font-family: 'Inter', sans-serif;
    background: var(--fondo);
    color: var(--texto);
    padding: 24px;
  }

  .contenedor { max-width: 1400px; margin: 0 auto; }

  .header {
    margin-bottom: 32px;
  }

  .header h1 {
    font-size: 28px;
    font-weight: 800;
    background: linear-gradient(135deg, var(--acento), #7c3aed);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .alertas-section {
    background: var(--superficie);
    border: 1px solid var(--borde);
    border-radius: 24px;
    padding: 24px;
    margin-bottom: 32px;
  }

  .alertas-grid {
    display: flex;
    flex-direction: column;
    gap: 16px;
    margin-top: 20px;
  }

  .alerta-card {
    border-left: 4px solid;
    padding: 16px 20px;
    border-radius: 12px;
    background: var(--superficie2);
  }

  .alerta-riesgo { border-left-color: var(--rojo); }
  .alerta-decaimiento { border-left-color: var(--naranja); }
  .alerta-inactividad { border-left-color: var(--verde); }

  .alerta-titulo {
    font-weight: 700;
    font-size: 16px;
    margin-bottom: 8px;
  }

  .alerta-descripcion {
    color: var(--texto-suave);
    font-size: 13px;
    margin-bottom: 12px;
  }

  .alerta-lista {
    font-size: 12px;
    list-style: none;
    padding-left: 0;
  }

  .alerta-lista li {
    padding: 4px 0;
    border-bottom: 1px dashed var(--borde);
  }

  .grid-graficas {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
    gap: 24px;
    margin-bottom: 32px;
  }

  .tarjeta-grafica {
    background: var(--superficie);
    border: 1px solid var(--borde);
    border-radius: 24px;
    padding: 24px;
  }

  .contenedor-grafica { height: 300px; position: relative; }

  .tendencias-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
  }

  .tendencia-card {
    background: var(--superficie);
    border: 1px solid var(--borde);
    border-radius: 20px;
    padding: 20px;
  }

  .tendencia-valor {
    font-size: 32px;
    font-weight: 800;
    color: var(--acento);
  }

  .loading, .empty {
    text-align: center;
    padding: 60px;
    color: var(--texto-suave);
  }

  .spinner {
    width: 40px;
    height: 40px;
    border: 3px solid var(--superficie2);
    border-top-color: var(--acento);
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: 0 auto 16px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="contenedor">
  <div class="header">
    <h1>📊 Análisis y Tendencias</h1>
    <p>Alertas, patrones y comportamiento de ventas</p>
  </div>

  <div id="alertasContainer" class="alertas-section"></div>

  <div class="grid-graficas">
    <div class="tarjeta-grafica">
      <div class="titulo-grafica" style="font-weight: 700; margin-bottom: 16px;">📈 Evolución GPV por Mes</div>
      <div class="contenedor-grafica"><canvas id="chartEvolucion"></canvas></div>
    </div>
    <div class="tarjeta-grafica">
      <div class="titulo-grafica" style="font-weight: 700; margin-bottom: 16px;">🎯 Distribución de Estado de Equipos</div>
      <div class="contenedor-grafica"><canvas id="chartEstado"></canvas></div>
    </div>
  </div>

  <div class="tendencias-grid" id="tendenciasGrid"></div>
</div>

<script>
let datosCompletos = null;
let chartEvolucion = null;
let chartEstado = null;

window.addEventListener('message', (e) => {
  if (e.data && e.data.type === 'datos-cargados') {
    datosCompletos = e.data.datos;
    renderizarTodo();
  }
  if (e.data && e.data.type === 'theme-change') {
    document.documentElement.setAttribute('data-theme', e.data.theme);
    if (chartEvolucion) chartEvolucion.destroy();
    if (chartEstado) chartEstado.destroy();
    renderizarGraficas();
  }
});

function solicitarDatos() {
  window.parent.postMessage({ type: 'solicitar-datos' }, '*');
}

function getEstadoPorGPV(gpv) {
  if (gpv === 0) return 'INACTIVO';
  if (gpv < 400) return 'REGULAR';
  return 'ACTIVO';
}

function renderizarTodo() {
  if (!datosCompletos?.equipos) return;
  
  renderizarAlertas();
  renderizarGraficas();
  renderizarTendencias();
}

function renderizarAlertas() {
  const equipos = datosCompletos.equipos;
  const alertas = [];
  
  // Equipos en riesgo (GPV actual = 0)
  const enRiesgo = equipos.filter(e => (parseFloat(e.gpv_mes_actual_corriendo) || 0) === 0);
  if (enRiesgo.length > 0) {
    alertas.push({
      tipo: 'riesgo',
      titulo: `🚨 ${enRiesgo.length} equipos sin ventas`,
      descripcion: 'No han generado ventas en su mes actual. Requieren atención inmediata.',
      items: enRiesgo.slice(0, 5).map(e => `${e.comercio} (${e.responsable_real})`)
    });
  }
  
  // Equipos con decaimiento (>50% caída)
  const decayendo = equipos.filter(e => {
    const m0 = parseFloat(e.gpv_m0) || 0;
    const m1 = parseFloat(e.gpv_m1) || 0;
    const m2 = parseFloat(e.gpv_m2) || 0;
    if (m2 > 0 && m1 > 0 && ((m2 - m1) / m1) < -0.5) return true;
    if (m1 > 0 && m0 > 0 && ((m1 - m0) / m0) < -0.5) return true;
    return false;
  });
  if (decayendo.length > 0) {
    alertas.push({
      tipo: 'decaimiento',
      titulo: `📉 ${decayendo.length} comercios con caída >50%`,
      descripcion: 'Reducción significativa de ventas entre meses. Revisar causa.',
      items: decayendo.slice(0, 5).map(e => `${e.comercio} (M0:${e.gpv_m0} → M1:${e.gpv_m1} → M2:${e.gpv_m2})`)
    });
  }
  
  // Equipos inactivos >30 días
  const fechaCorte = new Date('2026-03-18');
  const inactivosLargo = equipos.filter(e => {
    if (!e.ultima_transaccion) return false;
    const ultima = new Date(e.ultima_transaccion);
    const dias = Math.ceil((fechaCorte - ultima) / (1000 * 60 * 60 * 24));
    return dias > 30;
  });
  if (inactivosLargo.length > 0) {
    alertas.push({
      tipo: 'inactividad',
      titulo: `⏰ ${inactivosLargo.length} equipos inactivos >30 días`,
      descripcion: 'Sin transacciones por más de un mes. Considerar recuperación.',
      items: inactivosLargo.slice(0, 5).map(e => `${e.comercio} - Última: ${e.ultima_transaccion}`)
    });
  }
  
  const container = document.getElementById('alertasContainer');
  if (alertas.length === 0) {
    container.innerHTML = `
      <div style="text-align: center; padding: 20px;">
        <span style="font-size: 48px;">✅</span>
        <p style="margin-top: 12px;">No hay alertas activas. Todo en orden.</p>
      </div>
    `;
    return;
  }
  
  container.innerHTML = `
    <h3 style="font-size: 18px; font-weight: 700;">⚠️ Alertas del Sistema</h3>
    <div class="alertas-grid">
      ${alertas.map(alerta => `
        <div class="alerta-card alerta-${alerta.tipo}">
          <div class="alerta-titulo">${alerta.titulo}</div>
          <div class="alerta-descripcion">${alerta.descripcion}</div>
          <ul class="alerta-lista">
            ${alerta.items.map(item => `<li>📌 ${item}</li>`).join('')}
            ${alerta.items.length === 5 ? '<li>... y más</li>' : ''}
          </ul>
        </div>
      `).join('')}
    </div>
  `;
}

function renderizarGraficas() {
  const equipos = datosCompletos.equipos;
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  const textColor = isDark ? '#94a3b8' : '#64748b';
  
  // Gráfico de evolución por mes de venta
  const meses = datosCompletos.meses_disponibles || ['ENERO', 'FEBRERO', 'MARZO'];
  const gpvPorMes = meses.map(mes => {
    const equiposMes = equipos.filter(e => e.mes_venta === mes);
    return equiposMes.reduce((sum, e) => sum + (parseFloat(e.gpv_mes_actual_corriendo) || 0), 0);
  });
  
  const ctx1 = document.getElementById('chartEvolucion').getContext('2d');
  if (chartEvolucion) chartEvolucion.destroy();
  chartEvolucion = new Chart(ctx1, {
    type: 'line',
    data: {
      labels: meses,
      datasets: [{
        label: 'GPV Total',
        data: gpvPorMes,
        borderColor: isDark ? '#0ea5e9' : '#0284c7',
        backgroundColor: isDark ? 'rgba(14,165,233,0.1)' : 'rgba(2,132,199,0.1)',
        fill: true,
        tension: 0.3,
        pointRadius: 5,
        pointBackgroundColor: isDark ? '#0ea5e9' : '#0284c7'
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        y: { beginAtZero: true, grid: { color: isDark ? 'rgba(148,163,184,0.1)' : 'rgba(100,116,139,0.1)' }, ticks: { color: textColor } },
        x: { ticks: { color: textColor } }
      }
    }
  });
  
  // Gráfico de estado de equipos
  const estados = { ACTIVO: 0, REGULAR: 0, INACTIVO: 0 };
  equipos.forEach(e => {
    const estado = getEstadoPorGPV(parseFloat(e.gpv_mes_actual_corriendo) || 0);
    estados[estado]++;
  });
  
  const ctx2 = document.getElementById('chartEstado').getContext('2d');
  if (chartEstado) chartEstado.destroy();
  chartEstado = new Chart(ctx2, {
    type: 'doughnut',
    data: {
      labels: ['Activos', 'Regulares', 'Inactivos'],
      datasets: [{
        data: [estados.ACTIVO, estados.REGULAR, estados.INACTIVO],
        backgroundColor: isDark ? ['#22c55e', '#f97316', '#ef4444'] : ['#16a34a', '#ea580c', '#dc2626'],
        borderWidth: 2,
        borderColor: isDark ? '#111827' : '#ffffff'
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { position: 'bottom', labels: { color: textColor } } }
    }
  });
}

function renderizarTendencias() {
  const equipos = datosCompletos.equipos;
  
  // Ticket promedio general
  let totalGPV = 0, totalTRX = 0;
  equipos.forEach(e => {
    totalGPV += (parseFloat(e.gpv_mes_actual_corriendo) || 0);
    totalTRX += (parseInt(e.trx_mes_actual_corriendo) || 0);
  });
  const ticketPromedio = totalTRX > 0 ? totalGPV / totalTRX : 0;
  
  // Equipos que cumplen meta (>=700)
  const metaCumplida = equipos.filter(e => (parseFloat(e.gpv_mes_actual_corriendo) || 0) >= 700).length;
  const pctMeta = equipos.length > 0 ? (metaCumplida / equipos.length * 100).toFixed(1) : 0;
  
  // Mejor desempeño M0→M1
  const mejoresVariaciones = [...equipos]
    .filter(e => e.gpv_m1 > 0 && e.gpv_m0 > 0)
    .map(e => ({ comercio: e.comercio, variacion: ((e.gpv_m1 - e.gpv_m0) / e.gpv_m0 * 100) }))
    .sort((a, b) => b.variacion - a.variacion)
    .slice(0, 3);
  
  document.getElementById('tendenciasGrid').innerHTML = `
    <div class="tendencia-card">
      <div class="tendencia-valor">S/ ${ticketPromedio.toLocaleString('es-PE', { minimumFractionDigits: 2 })}</div>
      <div style="font-weight: 600; margin-top: 8px;">Ticket Promedio</div>
      <div style="color: var(--texto-suave); font-size: 13px;">Valor por transacción</div>
    </div>
    <div class="tendencia-card">
      <div class="tendencia-valor">${pctMeta}%</div>
      <div style="font-weight: 600; margin-top: 8px;">Cumplimiento Meta (≥700)</div>
      <div style="color: var(--texto-suave); font-size: 13px;">${metaCumplida} de ${equipos.length} equipos</div>
    </div>
    <div class="tendencia-card">
      <div class="tendencia-valor" style="font-size: 24px;">🏆</div>
      <div style="font-weight: 600; margin-top: 8px;">Mayor crecimiento M0→M1</div>
      <div style="color: var(--texto-suave); font-size: 13px;">
        ${mejoresVariaciones.map(v => `${v.comercio?.substring(0, 20)}: +${v.variacion.toFixed(0)}%`).join('<br>') || 'No hay datos'}
      </div>
    </div>
  `;
}

setTimeout(solicitarDatos, 100);
</script>
</body>
</html>

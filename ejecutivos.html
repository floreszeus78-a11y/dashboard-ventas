<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ejecutivos - Panel Ventas</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --fondo: #0a0e1a;
    --superficie: #111827;
    --superficie2: #1e293b;
    --borde: #1e2d45;
    --acento: #0ea5e9;
    --texto: #e2e8f0;
    --texto-suave: #94a3b8;
    --verde: #22c55e;
    --verde-bg: rgba(34,197,94,0.15);
    --rojo: #ef4444;
    --rojo-bg: rgba(239,68,68,0.15);
    --naranja: #f97316;
    --naranja-bg: rgba(249,115,22,0.15);
  }

  [data-theme="light"] {
    --fondo: #f8fafc;
    --superficie: #ffffff;
    --superficie2: #f1f5f9;
    --borde: #e2e8f0;
    --acento: #0284c7;
    --texto: #0f172a;
    --texto-suave: #64748b;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    font-family: 'Inter', sans-serif;
    background: var(--fondo);
    color: var(--texto);
    padding: 24px;
  }

  .contenedor { max-width: 1600px; margin: 0 auto; }

  .header {
    margin-bottom: 28px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 16px;
  }

  .header h1 {
    font-size: 28px;
    font-weight: 800;
    background: linear-gradient(135deg, var(--acento), #7c3aed);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .header p {
    color: var(--texto-suave);
    margin-top: 4px;
  }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
    margin-bottom: 28px;
  }

  .stat-card {
    background: var(--superficie);
    border: 1px solid var(--borde);
    border-radius: 20px;
    padding: 20px;
  }

  .stat-number {
    font-size: 32px;
    font-weight: 800;
    color: var(--acento);
  }

  .stat-label {
    color: var(--texto-suave);
    font-size: 13px;
    margin-top: 4px;
  }

  .filtros {
    display: flex;
    gap: 16px;
    margin-bottom: 24px;
    flex-wrap: wrap;
    align-items: center;
  }

  .buscador {
    flex: 1;
    min-width: 250px;
    padding: 12px 20px;
    border-radius: 30px;
    border: 1px solid var(--borde);
    background: var(--superficie2);
    color: var(--texto);
    font-size: 14px;
  }

  .select-filtro {
    padding: 12px 20px;
    border-radius: 30px;
    border: 1px solid var(--borde);
    background: var(--superficie2);
    color: var(--texto);
    font-size: 14px;
    cursor: pointer;
    min-width: 180px;
  }

  .tabla-container {
    background: var(--superficie);
    border: 1px solid var(--borde);
    border-radius: 20px;
    overflow-x: auto;
    box-shadow: 0 4px 20px rgba(0,0,0,0.2);
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  th {
    background: var(--superficie2);
    padding: 16px 12px;
    text-align: left;
    font-weight: 700;
    color: var(--texto-suave);
    border-bottom: 2px solid var(--borde);
    position: sticky;
    top: 0;
    white-space: nowrap;
  }

  td {
    padding: 14px 12px;
    border-bottom: 1px solid var(--borde);
    vertical-align: middle;
  }

  tr:hover td {
    background: var(--superficie2);
  }

  .ejecutivo-nombre {
    font-weight: 700;
    color: var(--acento);
    font-size: 15px;
  }

  .badge-estado {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
  }

  .badge-activo { background: var(--verde-bg); color: var(--verde); }
  .badge-regular { background: var(--naranja-bg); color: var(--naranja); }
  .badge-inactivo { background: var(--rojo-bg); color: var(--rojo); }

  .timeline-mini {
    display: flex;
    gap: 6px;
    font-size: 11px;
    flex-wrap: wrap;
  }

  .timeline-item {
    background: var(--superficie2);
    padding: 2px 8px;
    border-radius: 12px;
    white-space: nowrap;
  }

  .timeline-item.m0 { color: #64748b; }
  .timeline-item.m1 { color: var(--naranja); }
  .timeline-item.m2 { color: var(--verde); }

  .gpv-valor {
    font-weight: 700;
  }
  .gpv-alto { color: var(--verde); }
  .gpv-medio { color: var(--naranja); }
  .gpv-bajo { color: var(--rojo); }

  .paginacion {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-top: 24px;
    padding: 16px;
  }

  .pag-btn {
    padding: 8px 14px;
    border-radius: 8px;
    border: 1px solid var(--borde);
    background: var(--superficie2);
    color: var(--texto);
    cursor: pointer;
    transition: all 0.2s;
  }

  .pag-btn.active {
    background: var(--acento);
    color: white;
    border-color: var(--acento);
  }

  .pag-btn:hover:not(.active) {
    background: var(--superficie);
  }

  .loading, .empty {
    text-align: center;
    padding: 60px;
    color: var(--texto-suave);
  }

  .spinner {
    width: 40px;
    height: 40px;
    border: 3px solid var(--superficie2);
    border-top-color: var(--acento);
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: 0 auto 16px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 768px) {
    body { padding: 16px; }
    th, td { padding: 10px 8px; font-size: 11px; }
    .timeline-mini { flex-direction: column; gap: 4px; }
  }
</style>
</head>
<body>
<div class="contenedor">
  <div class="header">
    <div>
      <h1>👥 Gestión de Ejecutivos</h1>
      <p>Rendimiento detallado por cada asesor comercial</p>
    </div>
  </div>

  <div class="stats-grid" id="statsGrid"></div>

  <div class="filtros">
    <input type="text" class="buscador" id="buscador" placeholder="🔍 Buscar por ejecutivo, comercio o serie..." onkeyup="filtrarTabla()">
    <select class="select-filtro" id="filtroEstado" onchange="filtrarTabla()">
      <option value="todos">📊 Todos los estados</option>
      <option value="ACTIVO">✅ Activos (GPV ≥ 400)</option>
      <option value="REGULAR">🟠 Regulares (1-399)</option>
      <option value="INACTIVO">❌ Inactivos (GPV = 0)</option>
    </select>
  </div>

  <div class="tabla-container">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Ejecutivo</th>
          <th>Comercio</th>
          <th>Serie POS</th>
          <th>RUC</th>
          <th>Fecha Venta</th>
          <th>Activación</th>
          <th>Timeline M0/M1/M2</th>
          <th>GPV Actual</th>
          <th>TRX</th>
          <th>Estado</th>
        </tr>
      </thead>
      <tbody id="tablaCuerpo"></tbody>
    </table>
  </div>

  <div class="paginacion" id="paginacion"></div>
</div>

<script>
// ============================================================
// FUNCIÓN DE LIMPIEZA DE NÚMEROS (FALLBACK LOCAL)
// ============================================================
function limpiarNumero(valor) {
    if (valor === null || valor === undefined || valor === '') return 0;
    if (typeof valor === 'number') return isNaN(valor) ? 0 : valor;
    
    let str = valor.toString().trim();
    if (str === '-' || str === '') return 0;
    
    str = str.replace(/[S\/\$\s]/g, '');
    
    if (str.includes(',') && str.includes('.')) {
        const lastComma = str.lastIndexOf(',');
        const lastDot = str.lastIndexOf('.');
        if (lastComma > lastDot) {
            str = str.replace(/\./g, '').replace(',', '.');
        } else {
            str = str.replace(/,/g, '');
        }
    } else if (str.includes(',') && !str.includes('.')) {
        const partes = str.split(',');
        if (partes.length === 2 && partes[1].length <= 2) {
            str = str.replace(',', '.');
        } else {
            str = str.replace(/,/g, '');
        }
    }
    
    const num = parseFloat(str);
    return isNaN(num) ? 0 : num;
}
let datosCompletos = null;
let equiposFiltrados = [];
let paginaActual = 1;
const itemsPorPagina = 20;

window.addEventListener('message', (e) => {
  if (e.data && e.data.type === 'datos-cargados') {
    datosCompletos = e.data.datos;
    renderizarTodo();
  }
  if (e.data && e.data.type === 'theme-change') {
    document.documentElement.setAttribute('data-theme', e.data.theme);
  }
});

function solicitarDatos() {
  window.parent.postMessage({ type: 'solicitar-datos' }, '*');
}

function getEstadoPorGPV(gpv) {
    const valor = limpiarNumero ? limpiarNumero(gpv) : Number(gpv);
    
    if (valor === 0 || valor === null || valor === undefined || isNaN(valor)) return 'INACTIVO';
    if (valor >= 700) return 'ACTIVO';
    if (valor >= 400 && valor <= 699) return 'REGULAR';
    if (valor >= 1 && valor <= 399) return 'SIN TANTO USO';
    return 'INACTIVO';
}

function getGPVClass(gpv) {
  if (gpv === 0) return 'gpv-bajo';
  if (gpv < 400) return 'gpv-medio';
  return 'gpv-alto';
}

function formatearNumero(num) {
  if (num === null || num === undefined || isNaN(num)) return '0';
  return Number(num).toLocaleString('es-PE', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function formatearFecha(fecha) {
  if (!fecha) return '-';
  if (typeof fecha === 'string' && fecha.includes('-')) {
    const p = fecha.split('-');
    if (p.length === 3) return `${p[2]}/${p[1]}/${p[0]}`;
  }
  return fecha;
}

function renderizarStats() {
  if (!datosCompletos?.equipos) return;
  
  const equipos = datosCompletos.equipos;
  const ejecutivosUnicos = [...new Set(equipos.map(e => e.responsable_real).filter(e => e))];
  let totalGPV = 0, activos = 0, regulares = 0, inactivos = 0;
  
  equipos.forEach(e => {
    const gpv = parseFloat(e.gpv_mes_actual_corriendo) || 0;
    totalGPV += gpv;
    const estado = getEstadoPorGPV(gpv);
    if (estado === 'ACTIVO') activos++;
    else if (estado === 'REGULAR') regulares++;
    else inactivos++;
  });
  
  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card"><div class="stat-number">${ejecutivosUnicos.length}</div><div class="stat-label">Ejecutivos Activos</div></div>
    <div class="stat-card"><div class="stat-number">${equipos.length}</div><div class="stat-label">Equipos Vendidos</div></div>
    <div class="stat-card"><div class="stat-number">S/ ${formatearNumero(totalGPV)}</div><div class="stat-label">GPV Total</div></div>
    <div class="stat-card"><div class="stat-number">${activos}</div><div class="stat-label">Equipos Activos</div></div>
    <div class="stat-card"><div class="stat-number">${regulares}</div><div class="stat-label">Regulares</div></div>
    <div class="stat-card"><div class="stat-number">${inactivos}</div><div class="stat-label">Inactivos</div></div>
  `;
}

function filtrarTabla() {
  if (!datosCompletos?.equipos) return;
  
  const busqueda = document.getElementById('buscador').value.toLowerCase();
  const estadoFiltro = document.getElementById('filtroEstado').value;
  
  equiposFiltrados = datosCompletos.equipos.filter(e => {
    const gpv = parseFloat(e.gpv_mes_actual_corriendo) || 0;
    const estado = getEstadoPorGPV(gpv);
    
    if (estadoFiltro !== 'todos' && estado !== estadoFiltro) return false;
    
    if (busqueda) {
      const texto = `${e.responsable_real} ${e.comercio} ${e.numero_serie} ${e.ruc}`.toLowerCase();
      if (!texto.includes(busqueda)) return false;
    }
    return true;
  });
  
  // Ordenar por ejecutivo y luego por GPV descendente
  equiposFiltrados.sort((a, b) => {
    if (a.responsable_real !== b.responsable_real) {
      return (a.responsable_real || '').localeCompare(b.responsable_real || '');
    }
    return (parseFloat(b.gpv_mes_actual_corriendo) || 0) - (parseFloat(a.gpv_mes_actual_corriendo) || 0);
  });
  
  paginaActual = 1;
  renderizarTabla();
  renderizarPaginacion();
}

function renderizarTabla() {
  const tbody = document.getElementById('tablaCuerpo');
  const inicio = (paginaActual - 1) * itemsPorPagina;
  const fin = inicio + itemsPorPagina;
  const paginados = equiposFiltrados.slice(inicio, fin);
  
  if (paginados.length === 0) {
    tbody.innerHTML = '<tr><td colspan="11" style="text-align:center; padding:40px;">📭 No hay equipos para mostrar</td></tr>';
    return;
  }
  
  tbody.innerHTML = paginados.map((eq, idx) => {
    const gpvActual = parseFloat(eq.gpv_mes_actual_corriendo) || 0;
    const estado = getEstadoPorGPV(gpvActual);
    const gpvClass = getGPVClass(gpvActual);
    const gpvM0 = parseFloat(eq.gpv_m0) || 0;
    const gpvM1 = parseFloat(eq.gpv_m1) || 0;
    const gpvM2 = parseFloat(eq.gpv_m2) || 0;
    const trxActual = parseInt(eq.trx_mes_actual_corriendo) || 0;
    
    let estadoBadge = '';
    if (estado === 'ACTIVO') estadoBadge = '<span class="badge-estado badge-activo">● Activo</span>';
    else if (estado === 'REGULAR') estadoBadge = '<span class="badge-estado badge-regular">● Regular</span>';
    else estadoBadge = '<span class="badge-estado badge-inactivo">● Inactivo</span>';
    
    return `
      <tr>
        <td>${inicio + idx + 1}</td>
        <td><span class="ejecutivo-nombre">${eq.responsable_real || 'SIN ASIGNAR'}</span></td>
        <td><strong>${eq.comercio || '-'}</strong><br><span style="font-size: 11px; color: var(--texto-suave);">${eq.razon_social || ''}</span></td>
        <td><code style="font-size: 11px;">${eq.numero_serie || '-'}</code></td>
        <td><code>${eq.ruc || '-'}</code></td>
        <td class="cell-fecha">${formatearFecha(eq.fecha_venta)}</td>
        <td class="cell-fecha">${formatearFecha(eq.dia_activo) || 'Pendiente'}</td>
        <td>
          <div class="timeline-mini">
            <span class="timeline-item m0">M0: S/ ${formatearNumero(gpvM0)}</span>
            <span class="timeline-item m1">M1: S/ ${formatearNumero(gpvM1)}</span>
            <span class="timeline-item m2">M2: S/ ${formatearNumero(gpvM2)}</span>
          </div>
          <div style="font-size: 10px; color: var(--texto-suave); margin-top: 4px;">${eq.etiqueta_mes_actual || 'M0'}</div>
        </td>
        <td class="gpv-valor ${gpvClass}">S/ ${formatearNumero(gpvActual)}</td>
        <td>${trxActual.toLocaleString('es-PE')}</td>
        <td>${estadoBadge}</td>
      </tr>
    `;
  }).join('');
}

function renderizarPaginacion() {
  const totalPaginas = Math.ceil(equiposFiltrados.length / itemsPorPagina);
  const container = document.getElementById('paginacion');
  
  if (totalPaginas <= 1) {
    container.innerHTML = '';
    return;
  }
  
  let html = '';
  for (let i = 1; i <= Math.min(totalPaginas, 10); i++) {
    html += `<button class="pag-btn ${paginaActual === i ? 'active' : ''}" onclick="irPagina(${i})">${i}</button>`;
  }
  container.innerHTML = html;
}

function irPagina(pagina) {
  paginaActual = pagina;
  renderizarTabla();
  renderizarPaginacion();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderizarTodo() {
  if (!datosCompletos?.equipos) return;
  renderizarStats();
  filtrarTabla();
}

setTimeout(solicitarDatos, 100);
</script>
</body>
</html>

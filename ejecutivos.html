<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ejecutivos - Panel Ventas</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  :root {
    --fondo: #0a0e1a;
    --superficie: #111827;
    --superficie2: #1e293b;
    --borde: #1e2d45;
    --acento: #0ea5e9;
    --texto: #e2e8f0;
    --texto-suave: #94a3b8;
    --verde: #22c55e;
    --verde-bg: rgba(34,197,94,0.15);
    --rojo: #ef4444;
    --rojo-bg: rgba(239,68,68,0.15);
    --naranja: #f97316;
    --naranja-bg: rgba(249,115,22,0.15);
  }

  [data-theme="light"] {
    --fondo: #f8fafc;
    --superficie: #ffffff;
    --superficie2: #f1f5f9;
    --borde: #e2e8f0;
    --acento: #0284c7;
    --texto: #0f172a;
    --texto-suave: #64748b;
    --verde: #16a34a;
    --rojo: #dc2626;
    --naranja: #ea580c;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    font-family: 'Inter', sans-serif;
    background: var(--fondo);
    color: var(--texto);
    padding: 24px;
  }

  .contenedor {
    max-width: 1400px;
    margin: 0 auto;
  }

  .header {
    margin-bottom: 32px;
  }

  .header h1 {
    font-size: 28px;
    font-weight: 800;
    background: linear-gradient(135deg, var(--acento), #7c3aed);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
  }

  .header p {
    color: var(--texto-suave);
  }

  .grid-ejecutivos {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 24px;
    margin-bottom: 40px;
  }

  .tarjeta-ejecutivo {
    background: var(--superficie);
    border: 1px solid var(--borde);
    border-radius: 24px;
    padding: 24px;
    transition: all 0.3s;
    cursor: pointer;
  }

  .tarjeta-ejecutivo:hover {
    transform: translateY(-4px);
    border-color: var(--acento);
    box-shadow: 0 8px 30px rgba(14,165,233,0.2);
  }

  .nombre-ejecutivo {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: var(--texto);
  }

  .badge-total {
    background: var(--superficie2);
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 14px;
    font-weight: 600;
  }

  .metricas-principales {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 20px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--borde);
  }

  .metrica-item {
    text-align: center;
  }

  .metrica-valor {
    font-size: 28px;
    font-weight: 800;
    background: linear-gradient(135deg, var(--acento), #7c3aed);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .metrica-label {
    font-size: 12px;
    color: var(--texto-suave);
    margin-top: 4px;
  }

  .insignias-estado {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
  }

  .insignia {
    flex: 1;
    text-align: center;
    padding: 10px;
    border-radius: 12px;
    font-size: 12px;
    font-weight: 600;
  }

  .insignia-verde { background: var(--verde-bg); color: var(--verde); }
  .insignia-naranja { background: var(--naranja-bg); color: var(--naranja); }
  .insignia-rojo { background: var(--rojo-bg); color: var(--rojo); }

  .detalle-meses {
    display: flex;
    gap: 12px;
    margin-top: 12px;
  }

  .mes-chip {
    flex: 1;
    text-align: center;
    padding: 8px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 600;
    background: var(--superficie2);
  }

  .mes-chip.m0 { color: #64748b; }
  .mes-chip.m1 { color: var(--naranja); }
  .mes-chip.m2 { color: var(--verde); }

  .equipos-lista {
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px solid var(--borde);
    max-height: 200px;
    overflow-y: auto;
  }

  .equipo-item {
    display: flex;
    justify-content: space-between;
    padding: 8px 0;
    font-size: 12px;
    border-bottom: 1px dashed var(--borde);
  }

  .equipo-item:last-child { border-bottom: none; }

  .estado-equipo {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 8px;
  }

  .estado-activo { background: var(--verde); }
  .estado-regular { background: var(--naranja); }
  .estado-inactivo { background: var(--rojo); }

  .loading, .error {
    text-align: center;
    padding: 60px;
    color: var(--texto-suave);
  }

  .spinner {
    width: 40px;
    height: 40px;
    border: 3px solid var(--superficie2);
    border-top-color: var(--acento);
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: 0 auto 16px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="contenedor">
  <div class="header">
    <h1>👥 Ejecutivos Comerciales</h1>
    <p>Rendimiento detallado por cada asesor de ventas</p>
  </div>

  <div id="ejecutivosGrid" class="grid-ejecutivos">
    <div class="loading">
      <div class="spinner"></div>
      <div>Cargando datos de ejecutivos...</div>
    </div>
  </div>
</div>

<script>
// Esperar a que el padre envíe los datos
let datosCompletos = null;

window.addEventListener('message', (e) => {
  if (e.data && e.data.type === 'datos-cargados') {
    datosCompletos = e.data.datos;
    renderizarEjecutivos();
  }
  
  if (e.data && e.data.type === 'theme-change') {
    document.documentElement.setAttribute('data-theme', e.data.theme);
  }
});

// También intentar obtener datos del padre si ya están disponibles
function solicitarDatos() {
  window.parent.postMessage({ type: 'solicitar-datos' }, '*');
}

function getEstadoPorGPV(gpv) {
  if (gpv === 0) return 'INACTIVO';
  if (gpv < 400) return 'REGULAR';
  return 'ACTIVO';
}

function formatearNumero(num) {
  if (num === null || num === undefined || isNaN(num)) return '0';
  return Number(num).toLocaleString('es-PE', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function renderizarEjecutivos() {
  if (!datosCompletos || !datosCompletos.equipos) {
    document.getElementById('ejecutivosGrid').innerHTML = '<div class="error">⚠️ No se pudieron cargar los datos. Intenta recargar la página.</div>';
    return;
  }

  const equipos = datosCompletos.equipos;
  
  // Agrupar por ejecutivo
  const ejecutivosMap = new Map();
  
  equipos.forEach(eq => {
    const exec = eq.responsable_real || 'SIN ASIGNAR';
    if (!ejecutivosMap.has(exec)) {
      ejecutivosMap.set(exec, {
        nombre: exec,
        totalEquipos: 0,
        gpvTotal: 0,
        trxTotal: 0,
        activos: 0,
        regulares: 0,
        inactivos: 0,
        enM0: 0,
        enM1: 0,
        enM2: 0,
        equipos: []
      });
    }
    
    const stats = ejecutivosMap.get(exec);
    stats.totalEquipos++;
    
    const gpvActual = parseFloat(eq.gpv_mes_actual_corriendo) || 0;
    const trxActual = parseInt(eq.trx_mes_actual_corriendo) || 0;
    stats.gpvTotal += gpvActual;
    stats.trxTotal += trxActual;
    
    const estado = getEstadoPorGPV(gpvActual);
    if (estado === 'ACTIVO') stats.activos++;
    else if (estado === 'REGULAR') stats.regulares++;
    else stats.inactivos++;
    
    const mesIdx = eq.mes_actual_idx || 0;
    if (mesIdx === 0) stats.enM0++;
    else if (mesIdx === 1) stats.enM1++;
    else if (mesIdx === 2) stats.enM2++;
    
    stats.equipos.push({
      comercio: eq.comercio,
      serie: eq.numero_serie,
      gpvActual: gpvActual,
      estado: estado,
      mesActual: eq.etiqueta_mes_actual
    });
  });
  
  const ejecutivosArray = Array.from(ejecutivosMap.values())
    .sort((a, b) => b.gpvTotal - a.gpvTotal);
  
  const grid = document.getElementById('ejecutivosGrid');
  
  if (ejecutivosArray.length === 0) {
    grid.innerHTML = '<div class="error">📭 No hay datos de ejecutivos disponibles</div>';
    return;
  }
  
  grid.innerHTML = ejecutivosArray.map(exec => `
    <div class="tarjeta-ejecutivo" onclick="mostrarDetalleEjecutivo('${exec.nombre.replace(/'/g, "\\'")}')">
      <div class="nombre-ejecutivo">
        ${exec.nombre}
        <span class="badge-total">${exec.totalEquipos} equipos</span>
      </div>
      
      <div class="metricas-principales">
        <div class="metrica-item">
          <div class="metrica-valor">S/ ${formatearNumero(exec.gpvTotal)}</div>
          <div class="metrica-label">GPV Total</div>
        </div>
        <div class="metrica-item">
          <div class="metrica-valor">${exec.trxTotal.toLocaleString('es-PE')}</div>
          <div class="metrica-label">Transacciones</div>
        </div>
      </div>
      
      <div class="insignias-estado">
        <div class="insignia insignia-verde">✅ ${exec.activos}</div>
        <div class="insignia insignia-naranja">🟠 ${exec.regulares}</div>
        <div class="insignia insignia-rojo">❌ ${exec.inactivos}</div>
      </div>
      
      <div class="detalle-meses">
        <div class="mes-chip m0">📊 M0: ${exec.enM0}</div>
        <div class="mes-chip m1">🚀 M1: ${exec.enM1}</div>
        <div class="mes-chip m2">🏆 M2: ${exec.enM2}</div>
      </div>
      
      <div class="equipos-lista">
        ${exec.equipos.slice(0, 5).map(eq => `
          <div class="equipo-item">
            <div>
              <span class="estado-equipo ${eq.estado === 'ACTIVO' ? 'estado-activo' : (eq.estado === 'REGULAR' ? 'estado-regular' : 'estado-inactivo')}"></span>
              ${eq.comercio?.substring(0, 25) || 'Sin nombre'}
            </div>
            <div style="color: var(--texto-suave);">S/ ${formatearNumero(eq.gpvActual)}</div>
          </div>
        `).join('')}
        ${exec.equipos.length > 5 ? `<div class="equipo-item" style="color: var(--acento);">... y ${exec.equipos.length - 5} más</div>` : ''}
      </div>
    </div>
  `).join('');
}

function mostrarDetalleEjecutivo(nombre) {
  if (!datosCompletos || !datosCompletos.equipos) return;
  
  const equiposEjecutivo = datosCompletos.equipos.filter(e => e.responsable_real === nombre);
  
  if (equiposEjecutivo.length === 0) return;
  
  // Crear modal con detalle
  const modal = document.createElement('div');
  modal.style.cssText = `
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(4px);
    z-index: 10000;
    display: flex;
    align-items: center;
    justify-content: center;
  `;
  
  modal.innerHTML = `
    <div style="background: var(--superficie); border-radius: 24px; max-width: 800px; width: 90%; max-height: 80vh; overflow: auto; padding: 24px; border: 1px solid var(--borde);">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2 style="font-size: 24px;">👤 ${nombre}</h2>
        <button onclick="this.closest('div').parentElement.remove()" style="background: none; border: none; font-size: 24px; cursor: pointer; color: var(--texto);">&times;</button>
      </div>
      
      <div style="overflow-x: auto;">
        <table style="width: 100%; border-collapse: collapse;">
          <thead>
            <tr style="background: var(--superficie2);">
              <th style="padding: 12px; text-align: left;">Comercio</th>
              <th style="padding: 12px; text-align: left;">Serie</th>
              <th style="padding: 12px; text-align: right;">GPV Actual</th>
              <th style="padding: 12px; text-align: center;">Mes</th>
              <th style="padding: 12px; text-align: center;">Estado</th>
            </tr>
          </thead>
          <tbody>
            ${equiposEjecutivo.map(eq => {
              const gpv = parseFloat(eq.gpv_mes_actual_corriendo) || 0;
              const estado = getEstadoPorGPV(gpv);
              const estadoClass = estado === 'ACTIVO' ? '✅' : (estado === 'REGULAR' ? '🟠' : '❌');
              return `
                <tr style="border-bottom: 1px solid var(--borde);">
                  <td style="padding: 12px;">${eq.comercio || '-'}</td>
                  <td style="padding: 12px;">${eq.numero_serie || '-'}</td>
                  <td style="padding: 12px; text-align: right;">S/ ${formatearNumero(gpv)}</td>
                  <td style="padding: 12px; text-align: center;">${eq.etiqueta_mes_actual || '-'}</td>
                  <td style="padding: 12px; text-align: center;">${estadoClass}</td>
                </tr>
              `;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `;
  
  document.body.appendChild(modal);
  modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
}

// Solicitar datos al cargar
setTimeout(solicitarDatos, 100);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel de Ventas - Menú</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    display: flex;
    height: 100vh;
    overflow: hidden;
    background: #0a0e1a;
  }

  /* Sidebar */
  .sidebar {
    width: 260px;
    background: #111827;
    border-right: 1px solid #1e293b;
    display: flex;
    flex-direction: column;
    z-index: 100;
  }

  .sidebar-header {
    padding: 24px 20px;
    border-bottom: 1px solid #1e293b;
  }

  .sidebar-header h1 {
    font-size: 20px;
    background: linear-gradient(135deg, #0ea5e9, #7c3aed);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 4px;
  }

  .sidebar-header p {
    font-size: 12px;
    color: #64748b;
  }

  .nav-menu {
    flex: 1;
    padding: 16px 12px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    border-radius: 10px;
    color: #94a3b8;
    text-decoration: none;
    font-size: 14px;
    font-weight: 600;
    transition: all 0.2s;
    cursor: pointer;
    border: none;
    background: transparent;
    width: 100%;
    text-align: left;
  }

  .nav-item:hover {
    background: #1e293b;
    color: #e2e8f0;
  }

  .nav-item.active {
    background: rgba(14, 165, 233, 0.15);
    color: #0ea5e9;
  }

  .nav-icon {
    font-size: 20px;
    width: 24px;
    text-align: center;
  }

  .sidebar-footer {
    padding: 20px;
    border-top: 1px solid #1e293b;
    color: #64748b;
    font-size: 12px;
    text-align: center;
  }

  /* Contenido Principal */
  .main-content {
    flex: 1;
    position: relative;
    display: flex;
    flex-direction: column;
  }

  .mobile-header {
    display: none;
    padding: 16px;
    background: #111827;
    border-bottom: 1px solid #1e293b;
    align-items: center;
    gap: 16px;
  }

  .menu-toggle {
    background: none;
    border: none;
    color: #e2e8f0;
    font-size: 24px;
    cursor: pointer;
    padding: 4px;
  }

  /* Iframe Container */
  .iframe-container {
    flex: 1;
    position: relative;
    background: #0a0e1a;
  }

  iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }

  /* Mensaje de error */
  .error-msg {
    display: none;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    color: #94a3b8;
    padding: 20px;
  }

  .error-msg a {
    color: #0ea5e9;
    text-decoration: none;
    font-weight: 600;
  }

  /* Responsive */
  @media (max-width: 768px) {
    .sidebar {
      position: fixed;
      left: -260px;
      height: 100vh;
      transition: left 0.3s;
      box-shadow: 4px 0 20px rgba(0,0,0,0.5);
    }
    
    .sidebar.open {
      left: 0;
    }
    
    .mobile-header {
      display: flex;
    }
    
    .overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5);
      z-index: 99;
    }
    
    .overlay.active {
      display: block;
    }
  }
</style>
</head>
<body>

<!-- Overlay móvil -->
<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<!-- Sidebar -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h1>📊 Panel Ventas</h1>
    <p>Punto de Venta</p>
  </div>
  
  <nav class="nav-menu">
    <button class="nav-item active" onclick="loadPage('dashboard.html', this)">
      <span class="nav-icon">📈</span>
      <span>Dashboard</span>
    </button>
    
    <button class="nav-item" onclick="loadPage('ejecutivos.html', this)">
      <span class="nav-icon">👥</span>
      <span>Ejecutivos</span>
    </button>
    
    <button class="nav-item" onclick="loadPage('comercios.html', this)">
      <span class="nav-icon">🏪</span>
      <span>Comercios</span>
    </button>
    
    <button class="nav-item" onclick="loadPage('mapa.html', this)">
      <span class="nav-icon">🗺️</span>
      <span>Mapa</span>
    </button>
    
    <button class="nav-item" onclick="loadPage('reportes.html', this)">
      <span class="nav-icon">📑</span>
      <span>Reportes</span>
    </button>
    
    <div style="margin-top: auto; border-top: 1px solid #1e293b; padding-top: 16px;">
      <button class="nav-item" onclick="alert('Configuración - Próximamente')">
        <span class="nav-icon">⚙️</span>
        <span>Configuración</span>
      </button>
    </div>
  </nav>
  
  <div class="sidebar-footer">
    <div>v2.0 · GitHub Pages</div>
  </div>
</aside>

<!-- Main Content -->
<div class="main-content">
  <div class="mobile-header">
    <button class="menu-toggle" onclick="toggleMenu()">☰</button>
    <h2 style="color: #e2e8f0; font-size: 18px;">Panel de Ventas</h2>
  </div>
  
  <div class="iframe-container">
    <iframe id="contentFrame" src="dashboard.html" onload="onFrameLoad()" onerror="onFrameError()"></iframe>
    
    <div class="error-msg" id="errorMsg">
      <div style="font-size: 48px; margin-bottom: 16px;">⚠️</div>
      <h3 style="color: #e2e8f0; margin-bottom: 8px;">No se pudo cargar</h3>
      <p>Verifica que el archivo <code>dashboard.html</code> esté en la misma carpeta.</p>
      <p style="margin-top: 12px;">
        <a href="dashboard.html" target="_blank">Abrir Dashboard directamente →</a>
      </p>
    </div>
  </div>
</div>

<script>
let currentPage = 'dashboard.html';

function toggleMenu() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('active');
}

function loadPage(url, btn) {
  // Si el archivo no existe, muestra mensaje
  if (url !== 'dashboard.html') {
    // Por ahora solo dashboard existe, los otros muestran alerta
    alert('🚧 Módulo "' + url.replace('.html', '') + '" en construcción.\n\nCrea el archivo ' + url + ' en tu repositorio para habilitarlo.');
    return;
  }
  
  currentPage = url;
  const frame = document.getElementById('contentFrame');
  const errorMsg = document.getElementById('errorMsg');
  
  // Reset
  errorMsg.style.display = 'none';
  frame.style.display = 'block';
  
  // Cargar
  frame.src = url;
  
  // Actualizar botón activo
  document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
  if (btn) btn.classList.add('active');
  
  // Cerrar menú en móvil
  if (window.innerWidth <= 768) {
    toggleMenu();
  }
}

function onFrameLoad() {
  console.log('✅ Dashboard cargado correctamente');
  // Ocultar error si estaba visible
  document.getElementById('errorMsg').style.display = 'none';
}

function onFrameError() {
  console.error('❌ Error al cargar iframe');
  document.getElementById('errorMsg').style.display = 'block';
}

// Verificar si carga después de 3 segundos
setTimeout(() => {
  try {
    const frame = document.getElementById('contentFrame');
    // Si el iframe está vacío o no accesible
    if (!frame.contentWindow || !frame.contentWindow.document) {
      console.warn('⚠️ Posible problema de carga');
    }
  } catch(e) {
    // Error de cross-origin es normal si el contenido es de otro dominio
    // pero como es el mismo repo, no debería pasar
  }
}, 3000);

// Responsive check
if (window.innerWidth <= 768) {
  document.body.classList.add('mobile');
}
</script>

</body>
</html>

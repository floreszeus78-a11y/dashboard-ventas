<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard Ventas - Punto de Venta</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0e1a;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .header {
            background: linear-gradient(135deg, #0f172a 0%, #0a1628 100%);
            border-bottom: 1px solid #1e2d45;
            padding: 15px 20px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 18px;
            font-weight: 700;
            background: linear-gradient(90deg, #0ea5e9, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 10px;
        }
        
        .iframe-container {
            flex: 1;
            background: #111827;
            border-radius: 12px;
            border: 1px solid #1e2d45;
            overflow: hidden;
            position: relative;
        }
        
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            min-height: 80vh;
        }
        
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #64748b;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #1e2d45;
            border-top-color: #0ea5e9;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .btn-externo {
            display: block;
            margin: 10px auto;
            padding: 12px 24px;
            background: linear-gradient(135deg, #0ea5e9, #0369a1);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            text-align: center;
            font-weight: 600;
            font-size: 14px;
        }
        
        .footer {
            padding: 10px;
            text-align: center;
            font-size: 12px;
            color: #64748b;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📊 Dashboard de Ventas</h1>
    </div>
    
    <div class="container">
        <a href="https://script.google.com/macros/s/AKfycbxQxMcvmVCmS5fMp0mHrK-uJ-9pUi0YR9cXaWMiJ-cAD3sHy6fFlNM5yBo6o8_-6g2f/exec" 
           class="btn-externo" 
           target="_blank">
            🔗 Abrir Dashboard en Pantalla Completa
        </a>
        
        <div class="iframe-container">
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Cargando dashboard...</p>
            </div>
            <iframe src="https://script.google.com/macros/s/AKfycbxQxMcvmVCmS5fMp0mHrK-uJ-9pUi0YR9cXaWMiJ-cAD3sHy6fFlNM5yBo6o8_-6g2f/exec?mobile=true" 
                    onload="document.getElementById('loading').style.display='none'">
            </iframe>
        </div>
    </div>
    
    <div class="footer">
        Actualizado: Marzo 2026 | Punto de Venta
    </div>
</body>
</html>

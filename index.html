<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel de Ventas - Menú</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #0a0e1a;
    color: #e2e8f0;
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  /* Sidebar */
  .sidebar {
    width: 260px;
    background: #111827;
    border-right: 1px solid #1e293b;
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }

  .sidebar-header {
    padding: 24px 20px;
    border-bottom: 1px solid #1e293b;
  }

  .sidebar-header h1 {
    font-size: 20px;
    background: linear-gradient(135deg, #0ea5e9, #7c3aed);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 4px;
  }

  .sidebar-header p {
    font-size: 12px;
    color: #64748b;
  }

  .nav-menu {
    flex: 1;
    padding: 16px 12px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    border-radius: 10px;
    color: #94a3b8;
    font-size: 14px;
    font-weight: 600;
    transition: all 0.2s;
    cursor: pointer;
    border: none;
    background: transparent;
    width: 100%;
    text-align: left;
    text-decoration: none;
  }

  .nav-item:hover {
    background: #1e293b;
    color: #e2e8f0;
  }

  .nav-item.active {
    background: rgba(14, 165, 233, 0.15);
    color: #0ea5e9;
  }

  .nav-icon {
    font-size: 20px;
    width: 24px;
    text-align: center;
  }

  .sidebar-footer {
    padding: 20px;
    border-top: 1px solid #1e293b;
    color: #64748b;
    font-size: 12px;
    text-align: center;
  }

  /* Main Content */
  .main-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0; /* Evita overflow */
    background: #0a0e1a;
  }

  .mobile-header {
    display: none;
    padding: 16px;
    background: #111827;
    border-bottom: 1px solid #1e293b;
    align-items: center;
    gap: 16px;
  }

  .menu-toggle {
    background: none;
    border: none;
    color: #e2e8f0;
    font-size: 24px;
    cursor: pointer;
  }

  /* Iframe */
  .iframe-container {
    flex: 1;
    position: relative;
    width: 100%;
    height: 100%;
  }

  iframe {
    width: 100%;
    height: 100%;
    border: none;
    background: #0a0e1a;
  }

  /* Error message */
  .error-fallback {
    display: none;
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: #0a0e1a;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px;
  }

  .error-fallback.show {
    display: flex;
  }

  .btn-link {
    margin-top: 16px;
    padding: 12px 24px;
    background: #0ea5e9;
    color: white;
    text-decoration: none;
    border-radius: 8px;
    font-weight: 600;
  }

  /* Responsive */
  @media (max-width: 768px) {
    .sidebar {
      position: fixed;
      left: -260px;
      height: 100vh;
      transition: left 0.3s;
      z-index: 1000;
      box-shadow: 4px 0 20px rgba(0,0,0,0.5);
    }
    
    .sidebar.open {
      left: 0;
    }
    
    .mobile-header {
      display: flex;
    }
    
    .overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7);
      z-index: 999;
    }
    
    .overlay.active {
      display: block;
    }
  }
</style>
</head>
<body>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<!-- Sidebar -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h1>📊 Panel Ventas</h1>
    <p>Sistema de Gestión</p>
  </div>
  
  <nav class="nav-menu">
    <button class="nav-item active" onclick="loadPage('dashboard.html', this)">
      <span class="nav-icon">📈</span>
      <span>Dashboard Principal</span>
    </button>
    
    <button class="nav-item" onclick="mostrarMensaje('Ejecutivos')">
      <span class="nav-icon">👥</span>
      <span>Ejecutivos</span>
    </button>
    
    <button class="nav-item" onclick="mostrarMensaje('Comercios')">
      <span class="nav-icon">🏪</span>
      <span>Comercios</span>
    </button>
    
    <button class="nav-item" onclick="mostrarMensaje('Análisis')">
      <span class="nav-icon">📊</span>
      <span>Análisis</span>
    </button>
    
    <button class="nav-item" onclick="mostrarMensaje('Reportes')">
      <span class="nav-icon">📑</span>
      <span>Reportes</span>
    </button>
    
    <div style="margin-top: auto; padding-top: 16px; border-top: 1px solid #1e293b;">
      <a href="https://github.com/floreszeus78-a11y/dashboard-ventas" target="_blank" class="nav-item" style="text-decoration: none;">
        <span class="nav-icon">⚙️</span>
        <span>Configuración</span>
      </a>
    </div>
  </nav>
  
  <div class="sidebar-footer">
    <div>v2.0 · 2026</div>
  </div>
</aside>

<!-- Main Content -->
<div class="main-content">
  <div class="mobile-header">
    <button class="menu-toggle" onclick="toggleMenu()">☰</button>
    <h2 style="font-size: 18px;">Panel de Ventas</h2>
  </div>
  
  <div class="iframe-container">
    <!-- El iframe carga tu dashboard.html -->
    <iframe 
      id="contentFrame" 
      src="dashboard.html"
      sandbox="allow-same-origin allow-scripts allow-forms allow-popups"
      onload="this.style.opacity='1'"
      style="opacity: 0; transition: opacity 0.3s;">
    </iframe>
    
    <!-- Fallback si no carga -->
    <div class="error-fallback" id="errorFallback">
      <div style="font-size: 48px; margin-bottom: 16px;">⚠️</div>
      <h3 style="margin-bottom: 8px;">No se pudo cargar el Dashboard</h3>
      <p style="color: #94a3b8; margin-bottom: 20px;">
        El archivo dashboard.html no se encuentra en la misma carpeta que index.html
      </p>
      <a href="dashboard.html" class="btn-link">Abrir Dashboard Directamente →</a>
    </div>
  </div>
</div>

<script>
// Detectar URL base automáticamente
const baseURL = window.location.href.replace('index.html', '');
console.log('Base URL:', baseURL);

function toggleMenu() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('active');
}

function loadPage(page, btn) {
  // Actualizar botón activo
  document.querySelectorAll('.nav-item').forEach(item => {
    item.classList.remove('active');
  });
  if (btn) btn.classList.add('active');
  
  // Si es dashboard, cargar en iframe
  if (page === 'dashboard.html') {
    const frame = document.getElementById('contentFrame');
    frame.src = 'dashboard.html';
    document.getElementById('errorFallback').classList.remove('show');
  }
  
  // Cerrar menú en móvil
  if (window.innerWidth <= 768) {
    toggleMenu();
  }
}

function mostrarMensaje(modulo) {
  alert(`🚧 Módulo "${modulo}"\n\nEsta sección está en desarrollo.\nPor ahora solo está disponible el Dashboard Principal.`);
}

// Verificar si el iframe cargó correctamente después de 2 segundos
setTimeout(() => {
  const frame = document.getElementById('contentFrame');
  
  // Intentar acceder al contenido (puede fallar por seguridad, es normal)
  try {
    const frameDoc = frame.contentDocument || frame.contentWindow.document;
    if (!frameDoc || frameDoc.body.innerHTML === '') {
      showError();
    }
  } catch(e) {
    // Si hay error de cross-origin pero el iframe tiene src, probablemente cargó bien
    // Solo mostramos error si está realmente vacío
    if (frame.src === '' || frame.src === 'about:blank') {
      showError();
    }
  }
}, 2000);

function showError() {
  document.getElementById('errorFallback').classList.add('show');
}

// Cargar dashboard al inicio
window.onload = () => {
  console.log('Cargando dashboard desde:', baseURL + 'dashboard.html');
};
</script>

</body>
</html>

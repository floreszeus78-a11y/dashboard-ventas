<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Panel de Ventas - Menú</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --fondo: #0a0e1a;
    --superficie: #111827;
    --superficie2: #1e293b;
    --borde: #1e293b;
    --acento: #0ea5e9;
    --texto: #e2e8f0;
    --texto-suave: #94a3b8;
    --gradiente: linear-gradient(135deg, #0ea5e9, #7c3aed);
  }

  [data-theme="light"] {
    --fondo: #f1f5f9;
    --superficie: #ffffff;
    --superficie2: #f8fafc;
    --borde: #e2e8f0;
    --acento: #0284c7;
    --texto: #0f172a;
    --texto-suave: #64748b;
    --gradiente: linear-gradient(135deg, #0284c7, #7c3aed);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; transition: background-color 0.3s, color 0.3s, border-color 0.3s; }
  
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--fondo);
    color: var(--texto);
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  /* SIDEBAR - Ahora siempre oculto por defecto en todos los dispositivos */
  .sidebar {
    position: fixed;
    top: 0;
    left: -280px;
    width: 280px;
    height: 100vh;
    background: var(--superficie);
    border-right: 1px solid var(--borde);
    display: flex;
    flex-direction: column;
    transition: left 0.3s ease;
    z-index: 1001;
    box-shadow: 4px 0 30px rgba(0, 0, 0, 0.5);
  }

  .sidebar.open {
    left: 0;
  }

  .sidebar-header {
    padding: 28px 24px;
    border-bottom: 1px solid var(--borde);
    background: var(--superficie2);
  }

  .sidebar-header h1 {
    font-size: 24px;
    font-weight: 800;
    background: var(--gradiente);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .sidebar-header p {
    font-size: 13px;
    color: var(--texto-suave);
    font-weight: 500;
  }

  .nav-menu {
    flex: 1;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    overflow-y: auto;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 18px;
    border-radius: 12px;
    color: var(--texto-suave);
    font-size: 15px;
    font-weight: 600;
    transition: all 0.25s;
    cursor: pointer;
    border: none;
    background: transparent;
    width: 100%;
    text-align: left;
    text-decoration: none;
    position: relative;
    overflow: hidden;
  }

  .nav-item:hover {
    background: var(--superficie2);
    color: var(--texto);
    transform: translateX(4px);
  }

  .nav-item.active {
    background: linear-gradient(135deg, rgba(14, 165, 233, 0.15), rgba(124, 58, 237, 0.15));
    color: var(--acento);
    box-shadow: 0 0 0 1px rgba(14, 165, 233, 0.3);
  }

  [data-theme="light"] .nav-item.active {
    background: rgba(2, 132, 199, 0.15);
    box-shadow: 0 0 0 1px rgba(2, 132, 199, 0.3);
  }

  .nav-item.active::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 4px;
    background: var(--gradiente);
    border-radius: 0 4px 4px 0;
  }

  .nav-icon {
    font-size: 22px;
    width: 26px;
    text-align: center;
    filter: grayscale(100%);
    transition: filter 0.25s;
  }

  .nav-item:hover .nav-icon,
  .nav-item.active .nav-icon {
    filter: grayscale(0%);
  }

  .sidebar-footer {
    padding: 20px;
    border-top: 1px solid var(--borde);
    color: var(--texto-suave);
    font-size: 12px;
    text-align: center;
    background: var(--superficie2);
  }

  .main-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
    background: var(--fondo);
    position: relative;
  }

  /* HEADER - Siempre visible en todos los dispositivos */
  .mobile-header {
    display: flex;
    padding: 16px 20px;
    background: var(--superficie);
    border-bottom: 1px solid var(--borde);
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .menu-toggle {
    background: var(--superficie2);
    border: 1px solid var(--borde);
    color: var(--texto);
    font-size: 24px;
    cursor: pointer;
    padding: 8px 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 44px;
    height: 44px;
    border-radius: 12px;
    transition: all 0.2s;
  }

  .menu-toggle:hover {
    background: var(--acento);
    color: white;
    border-color: var(--acento);
  }

  .mobile-title {
    color: var(--texto);
    font-size: 18px;
    font-weight: 700;
    flex: 1;
  }

  /* Overlay para cerrar menú al hacer clic fuera */
  .overlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0, 0, 0, 0.7);
    backdrop-filter: blur(4px);
    z-index: 1000;
    cursor: pointer;
  }

  .overlay.active {
    display: block;
  }

  .iframe-container {
    flex: 1;
    position: relative;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: var(--fondo);
  }

  iframe {
    width: 100%;
    height: 100%;
    border: none;
    background: var(--fondo);
    display: block;
  }

  .loading-overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: var(--fondo);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 50;
    transition: opacity 0.3s;
  }

  .loading-overlay.hidden {
    opacity: 0;
    pointer-events: none;
  }

  .spinner {
    width: 50px;
    height: 50px;
    border: 4px solid var(--superficie2);
    border-top-color: var(--acento);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }

  @keyframes spin { 
    to { transform: rotate(360deg); } 
  }

  .loading-text {
    margin-top: 16px;
    color: var(--texto-suave);
    font-size: 14px;
    font-weight: 500;
  }

  .error-fallback {
    display: none;
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: var(--fondo);
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px;
    z-index: 60;
  }

  .error-fallback.show {
    display: flex;
  }

  .error-icon {
    font-size: 64px;
    margin-bottom: 20px;
    opacity: 0.8;
  }

  .error-title {
    font-size: 24px;
    font-weight: 700;
    color: var(--texto);
    margin-bottom: 12px;
  }

  .error-desc {
    color: var(--texto-suave);
    margin-bottom: 24px;
    max-width: 400px;
    line-height: 1.6;
  }

  .btn-group {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .btn {
    padding: 12px 24px;
    border-radius: 12px;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    border: 1px solid var(--borde);
    background: var(--superficie);
    color: var(--texto);
    transition: all 0.2s;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }

  .btn:hover {
    background: var(--superficie2);
    border-color: var(--acento);
    transform: translateY(-2px);
  }

  .btn-primary {
    background: var(--gradiente);
    color: white;
    border: none;
  }

  .btn-primary:hover {
    box-shadow: 0 8px 25px rgba(14, 165, 233, 0.4);
  }

  .nav-menu::-webkit-scrollbar {
    width: 6px;
  }
  
  .nav-menu::-webkit-scrollbar-track {
    background: transparent;
  }
  
  .nav-menu::-webkit-scrollbar-thumb {
    background: var(--borde);
    border-radius: 3px;
  }
</style>
</head>
<body>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h1>📊 Panel Ventas</h1>
    <p>Sistema de Gestión Comercial</p>
  </div>
  
  <nav class="nav-menu">
    <button class="nav-item active" onclick="loadDashboard('dashboard.html')">
      <span class="nav-icon">📈</span>
      <span>Dashboard Principal</span>
    </button>
    
    <button class="nav-item" onclick="mostrarMensaje('Ejecutivos')">
      <span class="nav-icon">👥</span>
      <span>Ejecutivos</span>
    </button>
    
    <button class="nav-item" onclick="mostrarMensaje('Comercios')">
      <span class="nav-icon">🏪</span>
      <span>Comercios</span>
    </button>
    
    <button class="nav-item" onclick="mostrarMensaje('Análisis')">
      <span class="nav-icon">📊</span>
      <span>Análisis</span>
    </button>
    
    <button class="nav-item" onclick="mostrarMensaje('Reportes')">
      <span class="nav-icon">📑</span>
      <span>Reportes</span>
    </button>
    
    <div style="margin-top: auto; padding-top: 20px; border-top: 1px solid var(--borde); margin-top: 20px;">
      <a href="https://github.com/floreszeus78-a11y/dashboard-ventas" target="_blank" class="nav-item" style="text-decoration: none; color: inherit;">
        <span class="nav-icon">⚙️</span>
        <span>Configuración</span>
      </a>
    </div>
  </nav>
  
  <div class="sidebar-footer">
    <div>© 2026 · Dashboard Ventas</div>
    <div style="margin-top: 4px; font-size: 11px; opacity: 0.7;">v2.0</div>
  </div>
</aside>

<div class="main-content">
  <div class="mobile-header">
    <button class="menu-toggle" onclick="toggleMenu()" aria-label="Abrir menú">
      ☰
    </button>
    <div class="mobile-title">Panel de Ventas</div>
    <div style="width: 44px;"></div>
  </div>
  
  <div class="iframe-container">
    <div class="loading-overlay" id="loadingOverlay">
      <div class="spinner"></div>
      <div class="loading-text">Cargando dashboard...</div>
    </div>
    
    <iframe id="contentFrame"></iframe>
    
    <div class="error-fallback" id="errorFallback">
      <div class="error-icon">⚠️</div>
      <h3 class="error-title">No se pudo cargar el Dashboard</h3>
      <p class="error-desc">
        No se encontró el archivo del dashboard en el repositorio.
      </p>
      <div class="btn-group">
        <button class="btn btn-primary" onclick="window.open('dashboard.html', '_blank')">
          Abrir en nueva pestaña →
        </button>
        <button class="btn" onclick="location.reload()">
          🔄 Reintentar
        </button>
      </div>
    </div>
  </div>
</div>

<script>
// SINCRONIZACIÓN DE TEMA
function initTheme() {
  const savedTheme = localStorage.getItem('theme') || 'dark';
  aplicarTema(savedTheme);
  
  window.addEventListener('storage', (e) => {
    if (e.key === 'theme') {
      aplicarTema(e.newValue);
    }
  });
  
  window.addEventListener('message', (e) => {
    if (e.data && e.data.type === 'theme-change') {
      aplicarTema(e.data.theme);
    }
  });
}

function aplicarTema(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  localStorage.setItem('theme', theme);
}

let currentLoad = null;

function loadDashboard(filename) {
  const iframe = document.getElementById('contentFrame');
  const loading = document.getElementById('loadingOverlay');
  const error = document.getElementById('errorFallback');
  
  // Actualizar clase activa
  document.querySelectorAll('.nav-item').forEach(item => {
    item.classList.remove('active');
  });
  if (event && event.currentTarget) {
    event.currentTarget.classList.add('active');
  }
  
  loading.classList.remove('hidden');
  error.classList.remove('show');
  
  if (currentLoad) clearTimeout(currentLoad);
  
  iframe.src = filename;
  
  currentLoad = setTimeout(() => {
    checkIframeLoaded();
  }, 5000);
  
  iframe.onload = () => {
    if (currentLoad) clearTimeout(currentLoad);
    loading.classList.add('hidden');
    error.classList.remove('show');
    const currentTheme = localStorage.getItem('theme') || 'dark';
    try {
      iframe.contentWindow.postMessage({ type: 'theme-change', theme: currentTheme }, '*');
    } catch(e) {
      console.log('No se pudo enviar mensaje al iframe');
    }
  };
  
  iframe.onerror = () => {
    if (currentLoad) clearTimeout(currentLoad);
    showError();
  };
  
  // Cerrar menú después de seleccionar (en todos los dispositivos)
  toggleMenu();
}

function checkIframeLoaded() {
  const iframe = document.getElementById('contentFrame');
  const loading = document.getElementById('loadingOverlay');
  
  try {
    const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
    if (iframeDoc && iframeDoc.readyState === 'complete') {
      loading.classList.add('hidden');
    } else if (iframe.src && iframe.src !== 'about:blank') {
      loading.classList.add('hidden');
    } else {
      showError();
    }
  } catch(e) {
    loading.classList.add('hidden');
  }
}

function showError() {
  document.getElementById('loadingOverlay').classList.add('hidden');
  document.getElementById('errorFallback').classList.add('show');
}

function toggleMenu() {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('overlay');
  
  sidebar.classList.toggle('open');
  overlay.classList.toggle('active');
  
  if (sidebar.classList.contains('open')) {
    document.body.style.overflow = 'hidden';
  } else {
    document.body.style.overflow = '';
  }
}

function mostrarMensaje(modulo) {
  document.querySelectorAll('.nav-item').forEach(item => {
    item.classList.remove('active');
  });
  if (event && event.currentTarget) {
    event.currentTarget.classList.add('active');
  }
  
  alert(`🚧 Módulo "${modulo}"\n\nEsta sección está en desarrollo.\nPor ahora solo está disponible el Dashboard Principal.`);
  
  setTimeout(() => {
    document.querySelectorAll('.nav-item').forEach(item => {
      item.classList.remove('active');
    });
    const dashboardBtn = document.querySelector('.nav-item');
    if (dashboardBtn) dashboardBtn.classList.add('active');
  }, 100);
  
  // Cerrar menú después de mostrar mensaje
  toggleMenu();
}

// Cerrar menú con tecla ESC
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    const sidebar = document.getElementById('sidebar');
    if (sidebar.classList.contains('open')) {
      toggleMenu();
    }
  }
});

// Inicializar
document.addEventListener('DOMContentLoaded', () => {
  initTheme();
  setTimeout(() => {
    loadDashboard('dashboard.html');
  }, 100);
});
</script>

</body>
</html>

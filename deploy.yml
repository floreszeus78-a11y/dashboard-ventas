name: Deploy GitHub Pages

on:
  push:
    branches: [ "main" ]           # cambia si tu rama principal es otra
  workflow_dispatch:               # permite correr manual desde Actions

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false        # ← Esto evita que cancele jobs anteriores

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # No necesitas build (es sitio estático)
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .                     # todo el repositorio

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reportes - Panel Ventas</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --fondo: #0a0e1a;
    --superficie: #111827;
    --superficie2: #1e293b;
    --borde: #1e2d45;
    --acento: #0ea5e9;
    --texto: #e2e8f0;
    --texto-suave: #94a3b8;
    --verde: #22c55e;
  }

  [data-theme="light"] {
    --fondo: #f8fafc;
    --superficie: #ffffff;
    --superficie2: #f1f5f9;
    --borde: #e2e8f0;
    --acento: #0284c7;
    --texto: #0f172a;
    --texto-suave: #64748b;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    font-family: 'Inter', sans-serif;
    background: var(--fondo);
    color: var(--texto);
    padding: 24px;
  }

  .contenedor { max-width: 1200px; margin: 0 auto; }

  .header {
    margin-bottom: 32px;
  }

  .header h1 {
    font-size: 28px;
    font-weight: 800;
    background: linear-gradient(135deg, var(--acento), #7c3aed);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .panel-reportes {
    background: var(--superficie);
    border: 1px solid var(--borde);
    border-radius: 24px;
    padding: 32px;
  }

  .grupo-opciones {
    margin-bottom: 28px;
  }

  .grupo-opciones label {
    display: block;
    font-weight: 600;
    margin-bottom: 12px;
    color: var(--texto);
  }

  select, .btn-group {
    width: 100%;
    padding: 14px;
    border-radius: 16px;
    border: 1px solid var(--borde);
    background: var(--superficie2);
    color: var(--texto);
    font-size: 15px;
    cursor: pointer;
  }

  .btn-group {
    display: flex;
    gap: 12px;
    background: transparent;
    padding: 0;
  }

  .btn {
    flex: 1;
    padding: 14px;
    border-radius: 16px;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid var(--borde);
    background: var(--superficie2);
    color: var(--texto);
    text-align: center;
    transition: all 0.2s;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--acento), #7c3aed);
    color: white;
    border: none;
  }

  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(14,165,233,0.3);
  }

  .opcion-adicional {
    margin-top: 12px;
    padding: 12px;
    background: var(--superficie2);
    border-radius: 12px;
    display: none;
  }

  .opcion-adicional.active {
    display: block;
  }

  .checkbox-group {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    margin-top: 12px;
  }

  .checkbox-group label {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    font-weight: normal;
  }

  hr {
    border-color: var(--borde);
    margin: 24px 0;
  }

  .preview-area {
    background: var(--superficie2);
    border-radius: 16px;
    padding: 20px;
    margin-top: 20px;
    font-family: monospace;
    font-size: 12px;
    max-height: 400px;
    overflow: auto;
    display: none;
  }

  .preview-area.show {
    display: block;
  }

  .loading, .empty {
    text-align: center;
    padding: 40px;
    color: var(--texto-suave);
  }

  .spinner {
    width: 40px;
    height: 40px;
    border: 3px solid var(--superficie2);
    border-top-color: var(--acento);
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: 0 auto 16px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="contenedor">
  <div class="header">
    <h1>📑 Generador de Reportes</h1>
    <p>Exporta datos personalizados de equipos Culqi</p>
  </div>

  <div class="panel-reportes">
    <div class="grupo-opciones">
      <label>📄 Formato de exportación</label>
      <select id="formato">
        <option value="excel">Excel (CSV)</option>
        <option value="txt">Texto Plano (TXT)</option>
      </select>
    </div>

    <div class="grupo-opciones">
      <label>🎯 Rango de datos</label>
      <select id="rango">
        <option value="todos">Todos los equipos</option>
        <option value="ejecutivo">Por ejecutivo específico</option>
        <option value="mes">Por mes de venta</option>
        <option value="estado">Por estado de equipo</option>
        <option value="etapa">Por etapa (M0/M1/M2)</option>
      </select>
      
      <div id="opcionEjecutivo" class="opcion-adicional">
        <select id="ejecutivoSelect"></select>
      </div>
      <div id="opcionMes" class="opcion-adicional">
        <select id="mesSelect"></select>
      </div>
      <div id="opcionEstado" class="opcion-adicional">
        <select id="estadoSelect">
          <option value="ACTIVO">Activos (GPV ≥ 400)</option>
          <option value="REGULAR">Regulares (GPV 1-399)</option>
          <option value="INACTIVO">Inactivos (GPV = 0)</option>
        </select>
      </div>
      <div id="opcionEtapa" class="opcion-adicional">
        <select id="etapaSelect">
          <option value="0">M0 (Prueba)</option>
          <option value="1">M1 (Mes 1)</option>
          <option value="2">M2 (Mes 2)</option>
        </select>
      </div>
    </div>

    <div class="grupo-opciones">
      <label>📊 Contenido del reporte</label>
      <div class="checkbox-group">
        <label><input type="checkbox" id="incluirResumen" checked> Incluir resumen (KPIs)</label>
        <label><input type="checkbox" id="incluirTabla" checked> Incluir tabla detallada</label>
        <label><input type="checkbox" id="incluirTimeline"> Incluir timeline completo M0/M1/M2</label>
      </div>
    </div>

    <hr>

    <div class="btn-group">
      <button class="btn" onclick="generarVistaPrevia()">👁️ Vista Previa</button>
      <button class="btn btn-primary" onclick="exportarReporte()">📥 Exportar Reporte</button>
    </div>

    <div id="previewArea" class="preview-area"></div>
  </div>
</div>

<script>
let datosCompletos = null;

window.addEventListener('message', (e) => {
  if (e.data && e.data.type === 'datos-cargados') {
    datosCompletos = e.data.datos;
    cargarOpcionesSelectores();
  }
  if (e.data && e.data.type === 'theme-change') {
    document.documentElement.setAttribute('data-theme', e.data.theme);
  }
});

function solicitarDatos() {
  window.parent.postMessage({ type: 'solicitar-datos' }, '*');
}

function getEstadoPorGPV(gpv) {
  if (gpv === 0) return 'INACTIVO';
  if (gpv < 400) return 'REGULAR';
  return 'ACTIVO';
}

function formatearNumero(num) {
  if (num === null || num === undefined || isNaN(num)) return '0';
  return Number(num).toLocaleString('es-PE', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function cargarOpcionesSelectores() {
  if (!datosCompletos) return;
  
  const ejecutivos = [...new Set(datosCompletos.equipos.map(e => e.responsable_real).filter(e => e))];
  const meses = datosCompletos.meses_disponibles || [];
  
  const ejecutivoSelect = document.getElementById('ejecutivoSelect');
  ejecutivoSelect.innerHTML = '<option value="">Seleccionar ejecutivo...</option>' + 
    ejecutivos.map(exec => `<option value="${exec}">${exec}</option>`).join('');
  
  const mesSelect = document.getElementById('mesSelect');
  mesSelect.innerHTML = '<option value="">Seleccionar mes...</option>' + 
    meses.map(mes => `<option value="${mes}">${mes}</option>`).join('');
}

function getEquiposFiltrados() {
  if (!datosCompletos?.equipos) return [];
  
  const rango = document.getElementById('rango').value;
  let equipos = [...datosCompletos.equipos];
  
  switch(rango) {
    case 'ejecutivo':
      const ejecutivo = document.getElementById('ejecutivoSelect').value;
      if (ejecutivo) equipos = equipos.filter(e => e.responsable_real === ejecutivo);
      break;
    case 'mes':
      const mes = document.getElementById('mesSelect').value;
      if (mes) equipos = equipos.filter(e => e.mes_venta === mes);
      break;
    case 'estado':
      const estadoFiltro = document.getElementById('estadoSelect').value;
      equipos = equipos.filter(e => {
        const gpv = parseFloat(e.gpv_mes_actual_corriendo) || 0;
        const estado = getEstadoPorGPV(gpv);
        return estado === estadoFiltro;
      });
      break;
    case 'etapa':
      const etapa = parseInt(document.getElementById('etapaSelect').value);
      equipos = equipos.filter(e => (e.mes_actual_idx || 0) === etapa);
      break;
  }
  return equipos;
}

function generarVistaPrevia() {
  const equipos = getEquiposFiltrados();
  const previewDiv = document.getElementById('previewArea');
  
  if (equipos.length === 0) {
    previewDiv.innerHTML = '⚠️ No hay datos para mostrar con los filtros seleccionados.';
    previewDiv.classList.add('show');
    return;
  }
  
  const incluirResumen = document.getElementById('incluirResumen').checked;
  const incluirTabla = document.getElementById('incluirTabla').checked;
  
  let html = '<div style="font-weight: 700; margin-bottom: 12px;">📋 Vista Previa del Reporte</div>';
  
  if (incluirResumen) {
    let totalGPV = 0, totalTRX = 0, activos = 0, regulares = 0, inactivos = 0;
    let enM0 = 0, enM1 = 0, enM2 = 0;
    
    equipos.forEach(e => {
      const gpv = parseFloat(e.gpv_mes_actual_corriendo) || 0;
      totalGPV += gpv;
      totalTRX += (parseInt(e.trx_mes_actual_corriendo) || 0);
      const estado = getEstadoPorGPV(gpv);
      if (estado === 'ACTIVO') activos++;
      else if (estado === 'REGULAR') regulares++;
      else inactivos++;
      
      const etapa = e.mes_actual_idx || 0;
      if (etapa === 0) enM0++;
      else if (etapa === 1) enM1++;
      else enM2++;
    });
    
    html += `
      <div style="margin-bottom: 16px; padding: 12px; background: var(--superficie); border-radius: 12px;">
        <div><strong>Total registros:</strong> ${equipos.length}</div>
        <div><strong>GPV Total:</strong> S/ ${formatearNumero(totalGPV)}</div>
        <div><strong>Transacciones:</strong> ${totalTRX.toLocaleString('es-PE')}</div>
        <div><strong>Activos:</strong> ${activos} | <strong>Regulares:</strong> ${regulares} | <strong>Inactivos:</strong> ${inactivos}</div>
        <div><strong>M0:</strong> ${enM0} | <strong>M1:</strong> ${enM1} | <strong>M2:</strong> ${enM2}</div>
      </div>
    `;
  }
  
  if (incluirTabla) {
    html += `
      <table style="width: 100%; border-collapse: collapse; font-size: 10px;">
        <thead>
          <tr style="background: var(--superficie);">
            <th style="padding: 6px;">#</th>
            <th style="padding: 6px;">Serie</th>
            <th style="padding: 6px;">Comercio</th>
            <th style="padding: 6px;">RUC</th>
            <th style="padding: 6px;">Ejecutivo</th>
            <th style="padding: 6px;">GPV M0</th>
            <th style="padding: 6px;">GPV M1</th>
            <th style="padding: 6px;">GPV M2</th>
            <th style="padding: 6px;">GPV Act</th>
            <th style="padding: 6px;">Estado</th>
           </tr>
        </thead>
        <tbody>
          ${equipos.slice(0, 15).map((e, i) => {
            const gpv = parseFloat(e.gpv_mes_actual_corriendo) || 0;
            const estado = getEstadoPorGPV(gpv);
            return `
              <tr style="border-bottom: 1px solid var(--borde);">
                <td style="padding: 6px;">${i+1}</td>
                <td style="padding: 6px;"><code>${e.numero_serie || '-'}</code></td>
                <td style="padding: 6px;">${e.comercio?.substring(0, 25) || '-'}</td>
                <td style="padding: 6px;">${e.ruc || '-'}</td>
                <td style="padding: 6px;">${e.responsable_real || '-'}</td>
                <td style="padding: 6px;">S/ ${formatearNumero(e.gpv_m0)}</td>
                <td style="padding: 6px;">S/ ${formatearNumero(e.gpv_m1)}</td>
                <td style="padding: 6px;">S/ ${formatearNumero(e.gpv_m2)}</td>
                <td style="padding: 6px;">S/ ${formatearNumero(gpv)}</td>
                <td style="padding: 6px;">${estado}</td>
              </tr>
            `;
          }).join('')}
        </tbody>
      </table>
      ${equipos.length > 15 ? '<div style="margin-top: 8px; color: var(--texto-suave);">... y ' + (equipos.length - 15) + ' registros más</div>' : ''}
    `;
  }
  
  previewDiv.innerHTML = html;
  previewDiv.classList.add('show');
}

function exportarReporte() {
  const equipos = getEquiposFiltrados();
  const formato = document.getElementById('formato').value;
  const incluirResumen = document.getElementById('incluirResumen').checked;
  const incluirTabla = document.getElementById('incluirTabla').checked;
  const incluirTimeline = document.getElementById('incluirTimeline').checked;
  
  if (equipos.length === 0) {
    alert('No hay datos para exportar');
    return;
  }
  
  if (formato === 'excel') {
    exportarExcel(equipos, incluirResumen, incluirTabla, incluirTimeline);
  } else if (formato === 'txt') {
    exportarTXT(equipos, incluirResumen, incluirTabla, incluirTimeline);
  }
}

function exportarExcel(equipos, incluirResumen, incluirTabla, incluirTimeline) {
  let csv = [];
  const fecha = new Date().toISOString().split('T')[0];
  
  if (incluirResumen) {
    let totalGPV = 0, totalTRX = 0, activos = 0, regulares = 0, inactivos = 0;
    equipos.forEach(e => {
      const gpv = parseFloat(e.gpv_mes_actual_corriendo) || 0;
      totalGPV += gpv;
      totalTRX += (parseInt(e.trx_mes_actual_corriendo) || 0);
      const estado = getEstadoPorGPV(gpv);
      if (estado === 'ACTIVO') activos++;
      else if (estado === 'REGULAR') regulares++;
      else inactivos++;
    });
    csv.push('=== REPORTE DE VENTAS CULQI ===');
    csv.push(`Fecha Generación,${new Date().toLocaleString()}`);
    csv.push(`Total Registros,${equipos.length}`);
    csv.push(`GPV Total,${totalGPV}`);
    csv.push(`Transacciones Totales,${totalTRX}`);
    csv.push(`Equipos Activos,${activos}`);
    csv.push(`Equipos Regulares,${regulares}`);
    csv.push(`Equipos Inactivos,${inactivos}`);
    csv.push('');
  }
  
  if (incluirTabla) {
    const headers = ['#', 'Serie POS', 'Comercio', 'RUC', 'Ejecutivo', 'Fecha Venta', 'GPV M0', 'TRX M0', 'GPV M1', 'TRX M1', 'GPV M2', 'TRX M2', 'GPV Actual', 'TRX Actual', 'Etapa Actual', 'Estado'];
    if (incluirTimeline) {
      headers.push('Variación M0→M1', 'Variación M1→M2');
    }
    csv.push(headers.join(','));
    
    equipos.forEach((e, i) => {
      const gpvActual = parseFloat(e.gpv_mes_actual_corriendo) || 0;
      const estado = getEstadoPorGPV(gpvActual);
      const row = [
        i + 1,
        `"${e.numero_serie || ''}"`,
        `"${(e.comercio || '').replace(/"/g, '""')}"`,
        e.ruc || '',
        e.responsable_real || '',
        e.fecha_venta || '',
        e.gpv_m0 || 0,
        e.trx_m0 || 0,
        e.gpv_m1 || 0,
        e.trx_m1 || 0,
        e.gpv_m2 || 0,
        e.trx_m2 || 0,
        gpvActual,
        e.trx_mes_actual_corriendo || 0,
        e.etiqueta_mes_actual || 'M0',
        estado
      ];
      if (incluirTimeline) {
        const varM0M1 = e.gpv_m0 > 0 ? (((e.gpv_m1 - e.gpv_m0) / e.gpv_m0) * 100).toFixed(1) : 0;
        const varM1M2 = e.gpv_m1 > 0 ? (((e.gpv_m2 - e.gpv_m1) / e.gpv_m1) * 100).toFixed(1) : 0;
        row.push(varM0M1 + '%');
        row.push(varM1M2 + '%');
      }
      csv.push(row.join(','));
    });
  }
  
  const blob = new Blob(['\ufeff' + csv.join('\n')], { type: 'text/csv;charset=utf-8;' });
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = `reporte_culqi_${fecha}.csv`;
  link.click();
  URL.revokeObjectURL(link.href);
}

function exportarTXT(equipos, incluirResumen, incluirTabla, incluirTimeline) {
  let txt = [];
  const separador = '='.repeat(80);
  const fecha = new Date().toISOString().split('T')[0];
  
  txt.push(separador);
  txt.push('REPORTE DE VENTAS - EQUIPOS CULQI');
  txt.push(`Fecha: ${new Date().toLocaleString()}`);
  txt.push(`Total equipos: ${equipos.length}`);
  txt.push(separador);
  txt.push('');
  
  if (incluirResumen) {
    let totalGPV = 0, totalTRX = 0, activos = 0, regulares = 0, inactivos = 0;
    equipos.forEach(e => {
      const gpv = parseFloat(e.gpv_mes_actual_corriendo) || 0;
      totalGPV += gpv;
      totalTRX += (parseInt(e.trx_mes_actual_corriendo) || 0);
      const estado = getEstadoPorGPV(gpv);
      if (estado === 'ACTIVO') activos++;
      else if (estado === 'REGULAR') regulares++;
      else inactivos++;
    });
    txt.push('RESUMEN GENERAL');
    txt.push('-'.repeat(40));
    txt.push(`GPV Total: S/ ${formatearNumero(totalGPV)}`);
    txt.push(`Transacciones Totales: ${totalTRX.toLocaleString('es-PE')}`);
    txt.push(`Activos: ${activos} | Regulares: ${regulares} | Inactivos: ${inactivos}`);
    txt.push('');
  }
  
  if (incluirTabla) {
    txt.push('LISTADO DETALLADO DE EQUIPOS');
    txt.push('-'.repeat(100));
    txt.push(`# | Serie | Comercio | Ejecutivo | GPV M0 | GPV M1 | GPV M2 | GPV Act | Estado`);
    txt.push('-'.repeat(100));
    
    equipos.forEach((e, i) => {
      const gpv = parseFloat(e.gpv_mes_actual_corriendo) || 0;
      const estado = getEstadoPorGPV(gpv);
      txt.push(`${i+1} | ${e.numero_serie || '-'} | ${(e.comercio || '-').substring(0, 30)} | ${e.responsable_real || '-'} | ${e.gpv_m0 || 0} | ${e.gpv_m1 || 0} | ${e.gpv_m2 || 0} | ${gpv} | ${estado}`);
    });
    
    if (incluirTimeline) {
      txt.push('');
      txt.push('TIMELINE COMPLETO (Primeros 15 equipos)');
      txt.push('-'.repeat(80));
      equipos.slice(0, 15).forEach((e, i) => {
        txt.push(`${i+1}. ${e.numero_serie} - ${e.comercio}`);
        txt.push(`   M0: S/ ${e.gpv_m0 || 0} (${e.trx_m0 || 0} trx)`);
        txt.push(`   M1: S/ ${e.gpv_m1 || 0} (${e.trx_m1 || 0} trx) | Var: ${e.gpv_m0 > 0 ? (((e.gpv_m1 - e.gpv_m0) / e.gpv_m0 * 100).toFixed(1)) : 0}%`);
        txt.push(`   M2: S/ ${e.gpv_m2 || 0} (${e.trx_m2 || 0} trx) | Var: ${e.gpv_m1 > 0 ? (((e.gpv_m2 - e.gpv_m1) / e.gpv_m1 * 100).toFixed(1)) : 0}%`);
        txt.push(`   Actual: ${e.etiqueta_mes_actual || 'M0'} - S/ ${parseFloat(e.gpv_mes_actual_corriendo) || 0}`);
        txt.push('');
      });
    }
  }
  
  const blob = new Blob([txt.join('\n')], { type: 'text/plain;charset=utf-8;' });
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = `reporte_culqi_${fecha}.txt`;
  link.click();
  URL.revokeObjectURL(link.href);
}

// Mostrar/ocultar opciones según rango
document.getElementById('rango').addEventListener('change', function() {
  document.querySelectorAll('.opcion-adicional').forEach(el => el.classList.remove('active'));
  if (this.value === 'ejecutivo') document.getElementById('opcionEjecutivo').classList.add('active');
  if (this.value === 'mes') document.getElementById('opcionMes').classList.add('active');
  if (this.value === 'estado') document.getElementById('opcionEstado').classList.add('active');
  if (this.value === 'etapa') document.getElementById('opcionEtapa').classList.add('active');
});

setTimeout(solicitarDatos, 100);
</script>
</body>
</html>
